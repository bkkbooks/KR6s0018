body:
  text: 比丘尼名第十二沙彌名第十三沙彌尼名第十四聲聞德行名第十五雜觀行名第十六罪障名第十七迦絺那衣法第十八比丘尼名第十二比丘尼譯曰比丘者破惡亦云怖魔亦云乞士尼者女也大智論第三卷瞿曇彌亦云憍曇彌譯曰瞿曇者姓彌者女也第二卷阿羅婆比丘尼譯曰不得第八卷翅舍佉橋曇比丘尼譯曰翅舍佉者多髮橋者曇姓也鬱鉢羅華比丘尼亦云鬱波羅譯曰黛色第十三卷耶輸陀羅亦云耶首也譯曰耶輸者名聞陀羅者持也第十七卷跋羅亦云跋陀羅譯曰賢也第二十四卷須彌陀比丘尼譯曰好聰睿也第三十卷摩偷婆尸他比丘尼譯曰摩偷者密婆尸他者殘亦云勝也第三十八卷優波難陀譯曰大喜大涅槃經第一卷波闍波提瞿曇彌譯曰波闍者世波提者主瞿曇者如上說第五卷瘦瞿曇彌譯曰瘦者好也瞿曇彌如上說第二十四卷讖摩譯曰忍也增一阿含第二卷機梨舍瞿曇彌亦云吉離舍瞿曇彌譯曰機梨舍者瘦瞿曇彌者姓奢摩譯曰寂靜波頭蘭那應云波肘蘭闍那譯曰波肘者辨了蘭闍那者可樂波羅遮那應云波羅闍那譯曰波羅者他闍那者人拔陀毗離譯曰拔陀者大也迦毗離者姓醯摩闍應云𮠴摩闍譯曰雪生輸那譯曰江也曇摩提那亦云曇摩塵那亦云達摩提那譯曰法與優多羅譯曰勝也禪頭應云善兜譯曰蟲也檀多譯曰調伏瞿卑譯曰牛女是守牛女兒拔陀波羅譯曰賢力須陀摩譯曰好鬘華也優迦羅譯曰優者大亦云勝迦羅者時亦云黑也阿奴波摩譯曰無辟優伽摩譯曰大悟解也素摩亦云修摩譯曰月也摩陀利應云摩多利譯曰御乘迦羅伽譯曰時行提婆修應云提婆婆藪譯曰天寶末那婆應云摩那婆譯曰少淨行毗摩達應云毗摩達多譯曰畏與曇摩摩提應云曇摩摩帝譯曰法意須夜摩譯曰妙光因提闍應云因陀羅闍譯曰主兒也拘那羅譯者云鳥名也婆須譯曰寶也遮婆羅譯曰墮落守迦譯曰鸚鴰拔陀軍陀羅拘夷譯曰拔陀者賢軍陀羅者可𨼴拘夷者細茅舍鳩利應云舍仇利譯曰上也第十八卷輸盧尼譯曰好形貌也第二十一卷君荼羅繫頭應云荼羅翅舍譯曰君荼羅者捲翅舍者髮差摩譯曰安隱第二十九卷基利施譯曰煩惱亦云苦也波羅拓羅譯曰波羅者彼柘羅者動波陀譯曰論議窮鼻經曰極端正也波羅遮羅譯曰波羅者守遮羅者行雜阿含經第一卷摩羅娑譯曰莫懶阿羅毗迦譯曰小語闍知羅譯曰縈髮第二十卷迦羅跋叱應云迦羅跋嗟譯曰迦羅者黑跋嗟者犢優波羅譯曰勝亦云大亦云華第二十二卷密多羅譯曰親友第三十七卷阿毗比丘尼譯曰國名也第三十五卷毗闍耶比丘尼譯曰無勝優波遮羅比丘尼譯曰大動尸利沙遮羅比丘尼譯曰尸利沙者頭遮羅者動叔迦羅比丘尼應云叔歌羅譯曰好時第五十卷掘多比丘尼譯曰護也十誦律初誦第六卷周那難陀比丘尼應云周羅難陀譯曰周羅者小也難陀者歡喜八法第二卷頻頭比丘尼譯曰頻頭者滯修目佉比丘尼譯曰修者好也目佉者面雜誦第四卷施羅比丘尼譯曰名山波梨比丘尼譯曰護也善誦第二卷蘇毗提應云蘇毗陀譯曰蘇者好也毗陀者智僧祇律第二十四卷跋陀尸利比丘尼譯曰賢吉蘇毗提夷比丘尼譯者曰國名也跋陀羅比丘尼譯曰賢也跋陀羅伽毗梨比丘尼應云跋陀體毗梨譯曰跋陀羅者賢體毗梨者大德第三十九卷須耶帝比丘尼譯曰好威儀也提舍瞿曇彌比丘尼譯曰提舍者說亦云郭外瞿曇彌者姓四分律第十卷波利遮羅夷比丘尼譯曰波利者護遮羅夷者茶事數那比丘尼應云數屢那譯曰聞也蘇羅比丘尼應云首羅譯曰勇也尼遮羅夷比丘尼譯曰不動婆遮羅比丘尼譯曰極動亦云能語尸羅婆遮那比丘尼譯曰尸羅者戒也婆遮那者語阿難婆比丘尼應云阿羅陀譯曰阿難陀者歡喜也摩羅毗比丘尼譯者曰國名也婆泥比丘尼應云婆那譯曰林也提舍難陀比丘尼譯曰提舍者說難陀者喜第二分第二卷蘇摩比丘尼譯曰月也栴檀輸那比丘尼譯曰月愛迦羅跋陀迦毗羅比丘尼譯曰迦羅者黑跋陀羅者賢迦毗羅者蒼伽羅栴陀輸比丘尼譯曰伽羅者頸旃陀月輸者好也第八卷舍夷物梨譯曰舍夷者眂拘梨者織亦云姓也第三分第十四卷偷羅難陀比丘尼譯曰偷羅者大難陀者喜彌沙塞律第三卷私伽羅母比丘尼譯曰山苟第十四卷優蹉比丘尼應云鬱嗟呵譯曰勤也第十五卷旃荼修摩那比丘尼應云旃荼羅修摩那譯曰旃荼羅者月修者好也云摩那者意阿夷應云阿私多譯曰不白跋陀毗羅比丘尼應云跋陀羅迦比羅譯曰跋陀羅者賢迦比羅者蒼第十八卷摩訶彼闍婆提比丘尼譯曰大世主也阿夷梨譯曰聖女生經第三卷波和提比丘尼應云婆羅婆提譯曰勝語法句第三卷父陀尼子譯曰莊嚴女也普超三昧經第二卷摩訶卑耶惒題俱曇彌譯曰摩訶卑耶惒題者大世主俱曇彌者姓大愛道泥洹經摩訶波惒提比丘尼應云摩訶婆羅婆提譯曰大勝語也般舟三昧經曇摩埤比丘尼譯曰法念歷國傳第一卷僧伽難提比丘尼譯曰衆喜沙彌名第十三沙彌譯曰沙彌者息慈亦云淨養亦云擬淨命大智論第一卷須陀沙彌亦云須陀耶譯曰須者好陀耶者起增一阿含經第十三卷周那沙彌譯曰碎也長阿含經第十三卷摩伽沙彌譯曰道也十誦律第三誦第二卷阿婆迦譯曰不諂曲也僧祇律第二十三卷波羅迦譯曰彼岸摩佉譯者曰星名也四分律第二分第十三卷罽那應云𦋺剌那譯曰耳也泥瞿陀沙彌應云尼瞿盧陀譯曰無節亦云縱橫善見律毗婆沙第一卷修摩那沙彌譯曰好意第二卷須波迦沙彌譯曰可愛諄那沙彌應云唯陀譯曰問也生經第二卷跋提奢彌譯曰賢也興起行經上卷沙彌尼名第十四沙彌尼譯曰沙彌者息慈亦云淨養亦云擬淨命尼者女也大智論十卷式叉摩那譯曰學也第十三卷脂梨彌尼譯曰脂梨者衣十誦律八法第二卷支梨譯曰小也僧祇律第六卷聲聞德行名第十五須陀洹亦云須呵洹亦云須陀般那禪經曰流入涅槃譯曰入流大智論第一卷斯陀含應云斯已理陀伽𥧌亦云息忌陀迦禪經曰往來譯曰往來阿那含亦云阿那伽𥧌亦云訶那迦速禪經曰不來譯曰不還阿羅漢亦云阿蘭那禪經曰無譯曰不生亦云殺賊亦云應供摩訶那伽論曰摩訶者大那者不加者罪又那伽者龍亦云象也第三卷頭陀應云偷多求那譯曰偷多者棄亦云動也求那者功德也羯摩譯曰事亦云作維那應云毗訶羅波羅譯曰毗訶邏者寺波羅者護也第十一卷阿闍梨亦云阿遮梨譯曰應可作亦云應第十三卷布薩譯曰增長功德論云善宿波羅提木叉譯曰波羅提者彼彼木叉者解脫大涅槃經第三卷三摩跋提應云三摩鉢低譯曰善定第十卷阿那波那亦云阿那波那亦云般那譯曰阿那者米亦云八波那者去亦云出第十九卷分衛應云賓荼波陀譯曰乞食增一阿含第一卷摩那埵譯曰齊量十誦律序第二卷婆利婆娑譯曰別住阿浮訶羯摩磨善見律云阿浮訶那者喚入譯曰喚來第三卷僧跋應云僧鉢𭁞哆譯曰等至七法第六卷咿寧亦云禋倿亦云豆佉律曰咿寧者苦諦鞞婆沙曰禋倿者苦也同卷彌寧亦云彌倿亦云三牟提耶律曰彌寧者習諦鞞婆沙曰彌樓者習也多咜陀辟亦云陀破亦云尼樓陀律曰多陀譬者盡諦鞞婆沙曰陀破者盡阿羅辟支亦云陀羅破亦云末伽律曰陀羅辟支者道諦鞞婆沙曰陀羅破者道也闍婆那律曰分別心譯曰疲智善見律毗婆沙第一卷毗婆舍那應云毗鉢舍那律曰觀苦空無我譯曰觀見波薩提應云波羅薩提律曰寂靜無疲極也譯曰猗樂和上律曰知罪知無罪也第十七卷半多俱置迦譯曰半者俱置迦者種阿毗曇毗婆沙第五十七卷三婆羅佉故譯曰律儀式也雜阿毗曇心第十二卷達摩經曰法謂世間第一法禪經下卷摩那斯伽羅經曰謂經心義言思誰三般具足戒譯曰足具遺教三昧經上卷三摩提譯曰一心成實論第一卷雜觀行名第十六三昧譯曰一心大智論第一卷四禪應云那論曰思惟修譯曰思惟也三摩提論曰正心行處譯曰一心第二十九卷梵行譯曰梵者淨也華嚴經第十卷奢摩亦云舍摩他亦云奢摩他譯曰寂靜大涅槃經第二十八卷毗婆舍那應云毗鉢舍那譯曰見也憂畢叉譯曰捨也拘羅羅吒譯曰拘羅者種姓剌吒者國也雜阿含第二十卷繁耆迦應云明嗜迦譯曰曲也第三十卷迦師那阿攬摩那律曰三十八禪定譯曰迦那者明阿欖摩那者境界亦云塵善見律毗婆沙第十四卷安闍三昧應云安左闍三昧鉢低譯曰不動定也第十二卷三術闍經曰三禪修行本起第一卷伊羅鉢三昧應云伊羅鉢多羅譯曰霍葉香也四百三昧經鎮頭迦三昧譯者曰樹名也婆羅那香象三昧譯曰婆羅耶者象也婆羅墮楉譯曰彼通佛說安般經罪障名第十七突吉羅譯曰惡作大智論第一卷偷蘭遮譯曰私偷刺者大底罪也大涅槃經第七卷波羅夷譯曰不如波夜提譯曰燒煮第十一卷僧伽婆尸沙譯曰泉殘亦云僧餘十誦律序第一卷波羅提舍尼譯曰向彼栴也尼薩耆波夜提譯曰捨墮憂多羅殺譯曰憂多羅者勝也初誦第二卷頭多殺譯曰不好毗陀羅殺譯曰破也提舍迦羅尼罪譯曰提舍者發露迦羅尼者應作七法第二卷阿跋提罪應云何鉢諦譯曰犯也折多利耶陀那應云質多波利耶跋私陀那譯曰質多者意波利耶跋私陀者使垢善見律毗婆沙第一卷頭婆私多律曰微細罪也婆傍伽律曰心羸弱心眼也第十卷首盧數譯曰好瞋阿毗曇毗波沙第一卷拘律陀聚譯曰瞋也八揵度第十八卷波羅提伽論曰重瞋成實論第九卷違欣婆論曰中瞋拘盧陀論曰下瞋憂婆耶呵論曰報頂婆羅陀舍論曰專執伊舍論曰疾姤三監披應云伊履沙論曰忿諍頭和遮論曰輝捩阿羼應云阿羼摩論曰不忍阿娑詰略論曰不悅阿𭫂羅沽論曰不調登單那陀論曰難可羅披那應云羅波那論曰悅人意單致利論曰睡眠因緣譯曰懶也迦絺那衣法第十八迦絺那衣舊譯曰功德聲論者曰迦絺那是外國音衣是此間語具存外國音應言迦絺那指婆羅迦絺那翻為功德指婆邏翻為衣謂功德衣桑祗陀國舊譯曰應云桑祗哆翻為聚會說聲論者云桑祗陀是外國音國是此間語具正外國音應言僧枳多毗屣耶僧枳多翻為期毗屣耶為國謂斯國迦提月舊譯曰時月持律者云功德月亦云望衣月謂應言時月即是三月安居竟功德滿足時以功德滿足故所以得望衣衣法阿梨陀羅色持律者云五大色聲論者云阿梨陀羅是外國音也是此間語具正外國音應云尼羅跋羅尼羅翻為青跋那翻為色謂青色黔蛇色持律者云五大色聲論者云黔蛇是外國音色是此間語具正外國音應云柯羅跋那柯羅翻為黑跋那色謂黑色泥尼外國翻為葛陀摩那翻為泥色穹伽色舊譯曰應云穹求翻為黃色持律者云五大色聲論者穹伽是外國音色是此間語具正在外國音應云比多跋那比多翻為黃跋那翻為色謂黃色盧耶那色持律者云五大色聲論者云盧耶那是外國音色是此間語具正外國音應盧喜多跋那盧喜哆翻為赤跋那翻為色謂赤色嵯梨多色持律者云五大色聲論者云嵯梨多是外國音色是此間語具正外國音應云阿婆多跋那阿婆多翻為白跋那翻為色謂白色曼提吒色持律者云五大色聲論者云正外國音應言曼提都私反哆那跋那曼提哆那翻為好跋那翻為好跋那翻為色謂好色雖云好色不知是何方好色胡僧云應言曼實瑟陀跋蘭那為不赤不黃色案此好色即應是黃中好色謂非輕色非重色案五大色謂青黃赤白黑此中有六種色不應謂為五大色若案色為論紅赤紫重黃輕好色唯有赤黃二種是大色餘四種非大也抲休比丘舊譯曰應云婆休難提翻為多喜瓶沙王舊譯曰應云頻毗式娑羅亦云頻婆羅頻毗者言無式娑羅者言實聲論者云瓶沙是外國音王是此間語具正外國音應言頻毗娑邏何邏闍頻毗頻為無娑邏翻為實何羅闍翻為王謂無實王梵志舊譯曰梵者淨案梵志是此間語非外國音梵是訓淨如猶寂訓靜非異國音聲論者云外國呼梵為婆羅摩呼志為婆他刺深摩根衣持律者云是上價衣聲論者云正外國音應言數欽摩牟羅藪欽摩翻為細衣牟羅翻為根為細衣優婆難陀比丘舊譯曰大喜聲論者云優婆翻為大難陀翻為喜摩訶亦云大優波亦大此恐當是國語不同比喜陀比丘舊譯曰覆聲論者云正外國音應言比喜他反他翻為密覆是義翻密是正翻泥洹僧舊譯曰方衣持律者云解脫衣聲論者云正外國音應言尼婆那翻為君衣阿羅毗國舊譯曰少語聲論者云阿羅毗是外國音國是此間語具正胡音應言阿羅毗屣耶阿毗羅分翻為不聲毗屣耶翻國為少語非無語是語少不聲則應無聲多以手語示相非令無言得翻為少語以手示相亦得翻為不聲僧祇支舊譯曰偏袒持律者曰助身衣聲論者云正外國音應言僧割侈僧割翻為肩侈翻為覆肩衣總說無非助身衣分別應以覆肩衣為正沙尼衣持律者云土衣聲論者云應言沙師我反尼翻為樹皮衣此非土衣應云樹皮衣䩭由羅欽婆羅衣聲論者云正外國音應言枳由羅甘婆羅枳由羅翻為細甘婆羅翻為毛衣謂細毛衣趐彌樓欽婆羅衣持律者云絳色衣聲論者云正外國音應言靃邏甘婆羅靃邏翻為白衣半甘婆羅翻為毛衣謂白羊毛衣表裏𩊐俱執持律者云是茸古具聲論者云衣裏𩊐俱執五字悉是此間語具外國音呼為喜蘭哆盧摩婆摩伽羅呵那婆喜翻為表蘭哆翻為裏胡盧摩翻為𩊐婆摩翻為俱伽羅呵翻為執婆羅彌利衣持律者云有前襜衣蔍毛欽跋具裩衣持律者云許衣舍勒衣舊譯曰內衣持律者云前後襜衣聲論者云正外國音應言安多羅舍多柯此衣四方縫作最在裏著即世僧尼所著舍勒阿拘草衣持律者云是䔋衣胡僧其形似此土芑外國之人用此草時先內水中竟槌令細然後用之跋拘草衣持律者云䔋衣胡僧云應云阿仿伽是劫寶國所出似此云麻亦用作衣拘賒草衣舊譯曰細弟持律者云䔋衣聲論者云正外國音應言釣奢底履那釣奢翻為芳底履那翻為草謂弟草衣文若草衣舊譯曰應云文闍謂虎鬚持律者云䔋衣聲論者云正外國語應言文闍翻為出即是虎鬚草胡僧云以此土龍鬚草其色少多黃亦可作席亦可作衣婆娑草衣舊譯曰應言婆跋闍謂麁弟持律者云䔋衣持律者從阿拘草衣至婆娑草衣五種草皆呼為草衣謂此不然所以名為䔋衣者以䔋草作衣故名䔋衣不容是草皆名䔋衣髮欽婆羅持律者云鹿毛衣案髮是此間語欽婆羅是外國音聲論者云甘外國音不正外國呼髮為枳舍呼衣為甘婆羅應言枳舍甘婆羅謂為髮衣織髮為衣不應謂為鹿毛也角鵄翅衣持律者云鳥毛衣案角鵄是鴝鵒以鴝鵒翅為衣故云角鵄翅衣波加羅衣聲論者云正外國音應言跋柯邏指婆邏翻為樹皮衣優羅提那舊譯曰優羅者胸提那者與謂胸與塔舊譯曰云外國謂為塔此謂為方墳持律者云墳聲論者云塔是此間語外國音肆偷波為塔頭陀持律者云抖藪聲論者云正外國音應言偷多翻為除塵斗藪是譬翻除塵是正翻鉢法頗梨舊譯曰應言頗致杆謂白珠水精火珠聲論云正外國音應言肆頗底柯翻為水精案白珠水精火珠不容多物共一名嘗聞頗梨珠一物有多色鉢他持律云小鉢聲論者云正外國音應言波刺肆他翻為一諡跋難陀比丘舊譯曰賢聲論者云正外國音應言髮陀羅難陀跋陀羅翻為賢難陀翻為歡喜謂賢喜歡尼師檀法尼師檀舊譯曰坐具聲論者正外國音應言尼師檀耶翻為坐衣維耶離國舊譯曰亦云毗耶離亦云毗舍離謂博廣聲論者云正外國音應言鞞舍利翻為廣迦留陀夷比丘舊譯曰亦云迦樓陀夷迦留者持陀夷者起聲論者云正外國音應柯盧陀夷柯盧翻為早亦云黑陀夷翻為生亦云起謂早生亦謂黑起以日初出時生故名早生有優陀夷比丘色白柯盧陀夷色黑故以起黑受稱修伽陀舊譯曰修言好伽陀云去亦云說亦云善誓持律者云善說聲論者云正外國音應言修伽多修翻為善伽多翻去謂善去出要律儀卷第八結界法羅閲城聲論者云正外國音應云何羅闍那伽邏阿羅闍那翻為王伽邏翻為城謂王城拘盧舍持律者云五百弓弓長中人肘耆闍崛山舊譯曰應言耆闍言鷲崛多言頭為鷲頭也解界法迦蘭陀國舊譯曰好聲論者云正外國音應言迦蘭陀柯是鳥名此無對翻出要律儀卷第九三滅法跋耆色舊譯曰聚聲論者云跋耆是外國音色是此間語具正外國音應云跋耆尼伽摩跋耆翻為裙尼伽摩翻為色謂裙也孫陀羅難陀比丘舊譯曰孫陀羅者可愛亦云好難陀者歡喜聲論者云孫陀羅翻為好難陀翻為喜謂好喜陀驃力士子舊譯曰茅草聲論者云陀驃是外國音力士子是此間語具正天竺音應云陀臘毗夜備邏婆分弗多羅陀臘毗夜翻為物備邏翻為力婆分翻為士弗多羅翻為子謂物力士子此士子是多財物家之子故名物力士子彌多羅浮摩比丘聲論者云正外國音應言來跢邏部摩來跢邏翻為慈部摩翻為地謂慈地彌多羅比丘尼聲論者云正外國音應言來跢邏翻為慈四儐法摩伽沙彌舊譯曰道聲論者云正外國音應言摩勒伽翻為道亦云路俱舍彌國舊譯曰應云物睒毗亦云物睒彌謂不甚靜亦云藏有聲論者云正外國音應言高杉毗翻為吉祥草是仙人名以人名國謂吉祥草國車匿比丘舊譯曰應云閳懶反陀亦云闍那謂應作亦云覆藏聲論者云正外國音應云羼陀翻為欲令覆旃陀羅舊譯曰又云旃荼羅謂瞋亦云惡持律者云下賤惡人聲論者云外國音應云旃陀羅翻為惡人旃陀羅謂是屠殺惡人加此屠肉五兵等類央伽國舊譯曰又云鴦伽謂體聲論者云外國音應言鴦伽毗屣耶鴦伽翻為分毗屣耶翻為國謂分國亦云身國槃提國聲論者云正外國音應言阿槃底翻為護阿梨吒比丘舊譯曰亦云阿梨吒亦云阿利瑟吒亦云阿栗吒謂無患樹聲論者云正外國音應言阿栗瑟跢翻為無患樹此比丘因樹得名謂無患比丘梵檀法梵檀持律者云默儐聲論者云外國呼為婆羅摩私摩翻為梵壇波羅國舊譯曰勝闡弩比丘舊譯曰覆聲論者云正外國音應言闡那翻為蜜那陀迦旃延經舊譯曰應云那剌陀迦旃延那剌陀言信迦旃延言性聲論者云正外國音應云那陀葛多耶那那陀翻為長聲葛多耶那翻為性出要律儀卷第十四羯摩法槃荼比丘舊譯曰又云般特陀迦謂路聲論者云正外國音應槃陀翻為論盧伽比丘舊譯曰盧伽謂央色病聲論者云盧伽翻為患亦云病施越比丘聲論者云施越是此間語正外國音呼施為檀那呼越為波底梁言施越馬宿比丘聲論者云是此間語正外國音應言阿輸實梁言馬宿滿宿比丘聲論者云滿宿是此間語正外國音應言爺律那實梁言滿宿優樓伽居士聲論者云優樓伽是外國音居士是此間語具正胡音應言郁伽羅漚婆塞分郁伽羅翻為威德漚婆塞分翻為居士謂威德居士質多羅居士舊譯曰種種聲論者閉居士如前說摩摩帝帝陀羅本云知法人舊譯曰寺主持律者云知法寺主聲論者正外國音應言摩末底哿彌陀他摩末底翻為寺主哿彌陀他翻為治謂治寺主比丘悔僧殘法僧伽婆尸沙舊譯曰衆殘亦云衆餘持律者云僧殘亦僧救聲論者云僧伽翻為衆婆尸沙翻為餘案此翻譯曰僧殘是合胡梁語云僧救亦是合胡梁語若客云衆殘正是此音若云衆餘亦是此音殘之與餘義無有異摩那埵舊譯曰齊量持律者云折伏下意亦云治僧殘罪聲論者云正外國音應言摩捺埵翻為慢埵翻為除慢案折伏下意除慢法治僧殘罪是說對名亦非正翻譯延應二年四月十六日申時於醍醐寺地藏院書寫了同八月二日令交合了道成寬保初元醉年秋八月二十二日令宮野常新遂書寫余於東窗校考了僧正賢賀五十八
