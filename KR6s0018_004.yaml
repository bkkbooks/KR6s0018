body:
  text: 婆羅門名第十九剎利名第二十婆羅門名第十九婆羅門善見律曰淨行又婆羅者智門者聞也譯曰心出俗外大智論第一卷栴闍婆羅門應云栴陀譯曰栴陀者惡性也阿耆達多婆羅門應云阿耆尼達多譯曰阿耆尼火達多者與第九卷貫夷羅婆羅門譯曰貫夷羅者山第三十四卷摩伽婆羅門譯曰星名也第五十六卷毗沙陀耶譯曰毗沙者毒陀耶者與長阿含第六卷婆悉咤譯曰最勝第六卷婆羅墮譯者曰姓佛伽羅婆羅應云弗伽羅婆羅譯曰佛加羅者一人婆羅者力第十三卷究羅檀頭譯曰究羅者姓檀頭者罰亦云治也第十五卷阿咤摩應云阿私吒摩譯曰第八第十六卷婆摩譯曰梪亦云太婆摩提婆應云婆羅木多提婆譯曰放逸天也毗波審吒應云毗波斬哆譯曰不思惟也阿樓那譯曰曉也瞿曇摩譯者曰姓首脂譯曰淨也損他譯曰象鼻露遮譯曰眼亦云樂五教反第十七卷毗迦多魯迦婆羅門應云毗伽多魯今譯曰去光亦云暗也雜阿含第二卷優婆迦婆羅門應云優婆伽譯曰近行第四卷鬱闍迦譯曰無畏豆摩譯曰烟也嚕醯遮婆羅門應云魯醯熙多譯曰鯉魚亦云國名毗紐迦亶延氏婆羅門應云毗履紐迦旃延那第二十九卷賓耆迦婆羅門譯曰賓耆迦者聚第四十二卷闍提弗多羅譯曰生子第四十三卷婆四吒婆羅門尼譯曰最勝淨行女也第四十四卷毗尼耶婆羅豆婆遮婆羅門譯曰毗利耶者精進婆羅者力豆波遮羅者惡語第四十六卷那陵迦婆羅門譯曰那者無也陵伽者道四分律第三分第一卷耶若達婆羅門譯曰耶若切德達多者與第四分第九卷斯那婆羅門譯曰軍也彌沙塞律第十九卷修婆那婆羅門譯曰修婆那者好林善見律毗婆沙第一卷阿嗜婆羅門應云阿嗜膩譯曰火也第二卷車多摩耶婆羅門應云利多摩譯曰淨心第五卷斯樓婆羅門譯曰斯樓者名山也第七卷婆夜羅尼婆羅門應云波羅耶那譯曰度彼毗羅摩婆羅門應云鞞羅摩譯曰無時功德梵摩瑜婆羅門應云梵摩瑜尼譯曰梵摩者淨瑜尼者生阿毗曇毗婆沙第一卷闍提輸那婆羅門應云闍底輸那譯曰闍底者生輸那者聞叔迦摩納婆應云叔迦摩那摩譯曰叔迦者鸚鵡摩那婆者年少淨行第三卷優仇吒婆羅門譯曰好瞋第二十卷優多羅摩納婆譯曰優多羅者勝摩納婆如上說第三十九卷瞿頻陀羅婆羅門譯曰生智第五十五卷難陀難陀婆羅門譯曰難陀者歡喜第五十六卷梵摩波羅門譯曰梵摩者淨鞞婆沙第一卷娑羅婆羅門譯曰娑羅者實㥯鶴名第七卷閲叉婆羅門譯曰能噉出曜經第五卷摩檀提婆羅門應云摩檀陀譯曰水青婆須密經第二卷那羅陀婆羅門譯曰人與百句喻經第四卷鞞蘭若婆羅門譯曰不著為苗竹園老婆門說學經第一卷跋陀羅尼波羅門應云跋陀羅耶尼譯曰賢行過去現在因果經第一卷摩訶那摩譯曰大名跋波譯曰種也第四卷阿捨婆耆應云阿首婆耆譯曰𮩹語跋陀羅耆應云跋陀羅婆耆譯曰賢論薩遮尼楗婆羅門譯曰薩遮者實尼揵者無繫法句經第三卷那梨鴦伽婆羅門譯曰那梨者涉刻鴦伽婆者體子喪念不離經鬱闍迦婆羅門譯曰勤也弗為婆羅門說四法經羞桓師梨婆羅門應云修槃那師利譯曰修槃那者金師利者吉三摩震諟婆羅門譯曰三摩者平等震諟者思惟三陂奢應云三陂離舍譯曰遣使摩訶迦婁那譯曰大悲牟梨師梨婆羅門譯曰牟梨者有根師梨者吉也𠚼陀柁應云留那他譯曰滿樂術闍師利譯曰術闍者相應師利者吾也阿惟末真應云阿利耶真多譯曰聖思惟也難頭多羅譯曰歡喜勝也栴鬱多沙利應云栴陀羅鬱多羅師利譯曰栴陀羅者月鬱多羅者勝師利者吉迦羅越亦云迦羅利譯曰有時閻荷師利譯者曰閻荷者樹名師利者吉苻沙漫應云前沙漫譯曰無等梵婆羅門譯曰淨也彌勒成佛經僧迦羅婆羅門譯曰計數豆摩種姓婆羅門譯曰豆摩者煙弗跡見千輻輪相經都多耶弗多羅婆羅門應云提都耶弗多羅譯曰子罪業報應經鞞藍大婆羅門譯曰種種功德豆婆遮種姓婆羅門譯曰豆婆遮者惡語豆遮婆羅門論議經闍提疏婆羅門應云闍提輸盧耶譯曰生聞名稱經雞頭婆羅門譯曰幢幢梵天詣婆羅門講堂經鬱多羅婆羅門子譯曰勝也為憍慢婆羅門說偈經婆羅豆婆舍遮婆羅門譯曰婆羅者勝豆婆舍者惡語雜經阿叔羅婆羅門譯曰不勇成實論第一卷邏闍桑彌婆羅門應云羅闍桑彌多譯曰王所重也歷國傳第二卷剎利名第二十剎利亦云剎帝利譯曰田主亦云田護大智論第四卷瓶沙王應云頻毗羅亦云頻婆沙羅譯曰頻毗者謨或娑羅者實也第一卷頻浮娑羅應云頻頭娑羅譯曰頻頭者諦娑羅者實第二卷阿闍貰應云阿闍多沙兜樓譯曰阿闍哆者未生沙兜樓者怨波斯匿應云波斯那實譯曰勝軍闍那迦藥王譯曰成事第三卷尸毗王亦云涅鞞亦云尸比譯曰有安隱也第四卷迦梨王亦云迦梨王亦云歌利譯曰黑也毗樓流王應云毗流他譯曰增長第九卷摩訶羅亦云摩訶羅闍譯曰摩訶者大羅闍者王婆薩婆王譯曰天曰第十一卷阿輸伽王亦云阿育王亦云阿輸迦譯曰阿輸迦者無憂亦云木華須提拏太子應云須地那論曰好譯曰好與第十二卷薩婆達王應云薩梵馱䭾譯曰一切施也梵摩達王應云梵摩達多譯曰淨與第十六卷憂填王譯者曰國名第十七卷弗迦羅婆王應云弗迦羅婆底譯曰佛迦羅者蓮花婆底者有第二十四卷栴陀婆殊提王應栴施鉢剌樹多亦云栴陀波周他譯曰栴陀者惡性鉢剌樹多者明亦云華也第二十五卷迦羅婆利王譯曰自在語也波竭王亦云波耆舍譯者曰王姓也薩婆達多王譯曰薩婆者一切達多者與第三十三卷利唱應云利唱毗第五十八卷離車應云離車毗亦云犁車毗王譯者曰銅滑𧢻也大般涅槃第一之內羅摩王譯曰戲也第十七卷拔提王亦云拔提迦亦云跋提譯曰跋提者長毗樓真王譯曰多樂那睺沙王譯曰不事火也迦帝迦王譯曰幾也毗舍佉王譯者曰星名也毗流離王亦云毗樓勒樓亦云惟樓勒譯曰長也優陀耶王亦云優陀延亦云優陀羅延譯曰日初出也須毗羅王譯曰好勇耶耶帝王譯曰妓行第二十五之內一叉鳩王譯曰一叉者甘蔗阿鳩者鼠也毗沙王譯曰入也增一阿含第一之內祇陀太子應云視多譯曰勝第十八之內頰鞞王應云劫鞞譯曰久章中阿含第十二之內多羅葉應云波多葉譯曰童也長阿含第二十二之內瞻波譯曰日花名也般遮羅譯曰五能迦陵伽譯者曰國名也渠羅婆應云渠隻羅婆譯曰恭敬尼求羅應云呢求羅譯曰防備拘舍婆提王譯曰藏說雜阿含第十之內摩偷羅王譯曰美也第二十之內修師摩王子譯曰好堺第二十三之內摩因陀羅西那王應云應顯陀羅西那譯曰天主軍也第二十五之內鉢羅婆王譯曰軟葉兜沙羅王譯曰霜也耶般那王譯曰邊地亦云國名王波提王應云波低譯曰主也毗梨訶波低王譯曰大王亦云太白星毗梨訶西那王譯曰毗梨訶者大西那者軍佛沙須摩王譯曰星月沸沙密多羅王譯曰沸沙者星密多羅者友陀舍羅訶應云陀舍羅他譯曰陀舍者十羅陀者車第三十七卷拘屢陀王譯曰真心也第三十九卷薩婆王譯曰一切十誦十法第五卷波摩達王應云波羅摩馱達多譯曰波羅摩馱者放逸達如上說七法第六卷米尼剎利應云彌尼剎利譯曰彌尼者輪剎利者姓僧祇律第十一卷波那王譯曰林也第二十卷菴於甘反婆羅離車子譯曰菴婆羅者樹名離車者細滑第二十三卷梨那王譯曰勤也四分律第二分第九卷輸徒檀那王亦云輸頭檀那譯曰白飯第十三之內鴦伽王譯曰體也第三分第四卷波羅殊提王譯曰波羅者彼亦云怨殊提多勝亦云大第四分第二卷鬱摩王應云鬱馱摩譯曰熱也彌沙塞律第十九卷尼樓王者應云尼樓闍譯曰尼者無也樓闍者病迦夷王譯曰有體第二十四卷迦夷王名梵達應云梵摩達多譯曰迦夷如上說梵摩達多者淨與第二十八之內婆樓王譯曰沙也第二十九之內毗竭婆王譯曰無藏第三十二卷賓頭河王譯曰賓頭者聚善見律毗婆沙第一卷摩哂陀王應云摩顯陀羅亦云摩醯陀譯曰天主鬱陀耶跋陀羅王譯曰起賢第二之內半頭婆修提婆王譯曰波修者寶提婆者天阿婆耶王譯曰無時修修佛那伽王譯曰極好覺龍迦羅育王應云迦羅由伽譯曰黑時栴陀掘多王應云旃陀羅堀多亦云栴陀堀譯曰月護那迦逮婆迦王應云那歌逮婆歌譯曰天堂大改難陀王應云牟尼難陀譯曰仙喜木叉伽摩尼阿婆耶王譯曰木叉伽者晚行摩尼者珠也阿婆耶者無時第三之內拘婆羅王譯曰巧也慢他多王譯曰我持第八之內瞿貪陀王應云瞿頻陀譯曰天得亦曰說知留陀羅王譯曰威猛婆帝耶王譯曰婆帝者母耶者子也婆婆王譯曰生亦云有第十一卷尼彌轉輪聖王譯曰尼彌者眴亦云火也阿毗曇毗婆沙第七之內無崘茶王譯曰天子等也第十一卷毗提希子應云鞞提希上云韋提希譯曰四惟陀羅達多譯曰陀羅者童達多者與第三十八卷闍那利沙譯曰闍那者入也利沙者牛主多羅蠰佉王應云多羅商佉譯者多羅者上商佉者阿第五十五卷遮迦越應云遮迦羅跋帝譯曰輪轉八揵度第一卷迦藍浮王譯曰雜也鞞波沙第九卷耆波醫王譯曰命亦云壽大方等大集經第九卷修陀奢那王應云修陀梨奢那譯曰好見且云善見第二十一卷婆耆利王譯曰語也出曜經第五卷阿狗嵐王應云阿拘樓譯曰不作第十五卷修樓婆王譯曰好也賢愚經第一卷虔闍尼婆梨王應云竭闍尼婆梨譯曰竭闍尼者雷婆梨者有力曇摩鉗太子經曰法行摩呵羅檀曩王經曰大寶摩訶富那寧王子譯曰大滿面也摩訶提婆王子經曰大天恆伽達應云恆伽達多譯者曰恆伽者阿多達多者與提婆王譯曰天也第二卷修闍提太子經曰善住譯曰善生彌羅拔羅王應云彌多羅婆羅經曰慈力因陀婆彌王應云因陀羅那譯曰天主林也第三卷提陀羅尼王應施多陀羅尼譯曰施多者自陀羅尼者持那波羅滿王子經曰福增第四卷栴阿婆羅脾應云栴陀羅波羅脾經曰月光第五之內毗摩斯那王譯曰勇軍須提羅王經曰快目第六卷修涅羅王應云修涅多羅譯曰好服劫賓寧王譯曰分別時也第七卷摩呵劫賓寧王譯曰大分別時也設頭羅健寧王應云設頭羅歌羅那譯曰虎耳婆羅門提婆王經曰梵天譯曰淨天剎羅伽利太子應云剎多羅歌剎那經曰蓋事摩呵令奴王應云摩訶剌那譯曰大寶提摩令奴太子應云提婆剌那譯曰天寶勒那跋彌王譯曰寶鎧迦良那伽梨太子經曰善事波婆伽梨王子應云波斯歌梨耶譯曰波斯者惡歌梨耶者事梨師跋陀王應云梨師跋陀羅譯曰梨事者仙跋陀羅者賢摩訶波羅婆修王經曰大光明譯曰大護寶第十卷機黑毗王應云機黑𥧌譯曰有次第第十一卷波羅摩達王應云波羅摩達多譯曰淨與迦摩沙波陀王經曰駭足須陀素彌王譯曰須陀者聞素彌者月阿波羅提目佉王經曰端正勒那識祇太子經曰寶經彌勒王子譯曰慈也第十二卷勝伽王經曰具也譯曰師子曇摩留支王譯曰法樂五教反提毗王應云毗提毗譯者曰國名也第十三卷般頭王譯曰黃萎色也瞿薩離王譯曰巧也文陀竭王應云文荼伽經曰頂生譯曰頂也無訶羅闍譯曰大王花首經第一卷摩闍婆王子應云末闍梨譯曰和軟大悲蓮花經第五之內摩羅太子譯曰花也婆婆密經第六卷優婆尸摩王譯曰大堺第十卷羅闍王譯曰王也報恩經第一卷須閻提太子譯曰隨意僧伽羅剎所集經序第一卷迦藍浮王譯曰雜也須陀摩王譯曰好繩亦云好花摩訶提披王應云摩訶提波譯曰大夫大須達施那王應云須逮多斯那譯曰好與軍也瞿頻陀王譯曰瞿者牛也頻陀者智沙盧樹王應云婆羅譯者曰樹名也第二卷迦鄰王譯者曰國名也生經第三卷阿脂王應云阿譯曰阿者細滑也般頭王譯曰親也第四卷蘇摩王譯曰月也為黃園老婆羅門說學經第四卷優留王譯曰火也佛所行讚經第一卷卑偷王譯曰大也曼陀王譯曰最勝迦叉王譯曰不好毗也伽提那王譯者曰國名也安低牒王應云安低提婆譯曰後天頭留磨光王譯者曰頭留磨者樹名也毗森摩王子譯曰無堺菴婆梨王譯曰空也湮羅轉輪王譯曰湮羅者爾弗迦羅王譯曰蓮花薩婆悉達應云菩薩他悉達譯曰一切事驗頻毗娑羅譯曰頻毗者誤式娑羅者勝也拘臘婆譯曰不好聲也鬱陀羅延譯曰獺行拘羅婆譯者曰姓乾提羅王子譯曰香也弗迦沙王譯曰蓮華實也法句經第一卷優勒迦沙羅王應云優羅伽婆羅譯曰胸行實也嚴淨經第一卷拘利剎帝應云拘利剎帝利譯曰拘利者姓也剎帝利者田主修行本起經一卷悉達太子經曰𧴰吉譯曰一切成也須波佛王應云修波羅佛陀經曰善覺遺摩羅應云毗摩羅涅多羅譯曰毗摩者無垢涅多羅者眼純真陀羅經一卷毗尼羅翅王應云毗尼羅翅舍譯曰好黑髮也摩訶摩耶經上卷阿耶致王譯曰行也毗羅三昧經上卷阿遮太子應云阿羅羅遮譯曰供也下卷難提斯那王譯軍喜軍法鼓經下卷因陀羅譯曰天主五濁經尼婆盧譯曰無力尸伽殊譯曰無𠌵羅睺質多羅譯曰月障種種羅摩質多羅譯曰羅摩者戲質多羅者種種羅耶輸應云羅闍耶輸譯曰王多聞也焰磨譯曰縛也拘那耶國王譯曰不明了也波若得道經他摩尸利王子譯曰他摩者華髮尸利者吉也摩醯斯那應云摩訶斯部譯曰大軍求衣談耶致國王譯曰求衣談者姓耶致者行毗羅三昧經須曼王亦云須曼那譯曰好意頻頭王譯曰諦也決定羅福經分陂檀王應云分尼耶陵剌低夜陀那譯曰分尸耶者功德陂賴低夜者緣陀那者施三摩竭經鬱羅卑王應云鬱鞞羅譯曰薄也九傷經憂達那王譯曰大施雜藏經弗舍達王譯曰星與栴陀越國王法迦沙王譯曰明也情離有羅經迦羅王譯曰黑也太子五夢經不羅王譯曰城也闍耶王譯曰勝也藍達王應云藍婆達多譯曰垂與學經薩和達王亦云薩和檀經曰一切施一切王所學楠波羅密經栴頭王譯曰息也佛說光花梵志經耶槃那王譯曰邊地商人子經鉢羅婆王譯曰軟也句留阿迦那譯曰句留者不厚阿迦那者破善王皇帝經阿迦那譯曰不破善王皇帝功德經憂慎耶那王譯曰起也雜經修陀奢那王應云修陀利奢那譯曰好見栴茶弗羅𮉘王譯曰月城弗伽羅娑羅王譯曰人實栴荼婆羅儲提王譯曰栴茶婆羅者月力儲提者心由乾陀山王譯曰雙時衆經尼民陀羅山王譯曰地持摩訶三摩應云摩訶三摩哆譯曰大正㟓成實論第十四卷僧伽達傳曰僧奴王譯曰衆與外國傳第四卷摩賢王子譯曰化也歷國傳第三卷弗他達王應云佛他達多譯曰覺與大般涅槃經第一卷毗舍應云鞞舍譯曰一切作也首陀羅譯曰下事大智論第二十五卷本云延應二年四月二十八日午時於醍醐寺地藏院書寫了道成仁治元壬十月三日一交了寬保元辛酉年八月二十三日以地藏院本遂書功校雙了僧正賢賀五十八
