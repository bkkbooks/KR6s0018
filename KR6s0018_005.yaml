body:
  text: 優婆塞名第二十一優婆夷名第二十二仙人名第二十三外道名第二十四大臣名第二十五長者名第二十六居士名第二十七夫人名第二十八女人名第二十九優婆塞名第二十一優婆塞釋曰清信大智論第三卷須達多譯曰須者好也達多達與第二卷樹提伽譯曰樹提者大亦云明亦星伽者行第三卷難提伽優婆塞譯曰歡喜第十三之內尼迦咤譯曰曲脚雜阿含第四之內佉慢伽羅譯曰惡體梨色咤譯曰歡喜阿梨色咤譯曰不歡喜也耶舍輸陀譯曰名聞與也耶舍欝多耶譯曰名聞勝也毘舍佉優婆塞譯者曰星名也阿毘曇毘婆沙第四十八卷郁伽恒佉優婆塞應云郁伽羅垣伽譯曰郁伽羅者大功德恒伽者河名也壇持陀羅尼經第一卷郁伽帝優婆塞應云郁伽羅摩耶譯曰大功德也阿須利清信譯曰不勇義足經上卷優婆夷名第二十二優婆夷亦云優婆斯譯曰清信女也大智論第三卷毘舍佉母譯者曰星名也第八卷彌佉羅母譯曰金帶譯也跋陀羅優婆夷譯曰跋陀羅者賢華嚴經第四十八卷休捨優婆夷應云物捨譯曰拘捨者弟第三十九之內難陀譯曰歡喜增一阿含第一之內難陀婆羅譯曰歡喜力也久壽多羅應云堀述多羅譯曰堀述者軀多羅者勝毘浮應云毘覆譯曰自在鴦竭闍譯曰生事跋陀婆羅譯曰賢勝亦云賢力波安脩陀譯曰寶與婆羅陀譯曰願與摩呵先應云摩訶斯那譯曰大軍毘提應云毘提訶羅譯者曰國名也毘𩀕光應云毘𩀕斯那譯曰毘𩀕者殿斯那者軍優那陀譯曰大聲鴦竭摩應云鴦求利摩羅譯曰鴦求利者拍摩羅者華鬘泥羅譯曰兩舌脩摩迦提應云脩摩伽提譯曰可愛脩摩提應云修摩迦提譯曰好慢第十三之內須摩那譯曰好意婆陀譯曰論義第十四卷舍彌論曰寂靜第十五卷摩訶𤿺羅闍鉢提應云摩訶波闍婆底譯曰大世主也中阿含第四十七之內摩耶譯曰他也長阿含第四卷須卑優婆夷應云須卑誰耶譯曰好愛亦云好念彌沙塞律第二十之內阿菟留陀憂婆夷應云阿莬律陀譯曰无障善見律毘婆沙第十八之內難陀迦母優婆斯譯曰難陀者歡喜優婆斯如上說阿毘曇毘婆沙第二十之內難陀摩陀優婆夷譯曰難陀者喜摩陀者母婆須密經第二之內毘舍佉達多優婆夷譯曰毘舍佉者星名達多者與思益經第一之內仙人名第二十三跋伽婆仙人譯者曰仙人姓大智論第一之內婆藪亦云波數譯曰物亦云寶亦云地第三卷闍梨仙人譯曰教法第四卷欝陀羅伽仙人應云憂陀羅伽譯曰大腹第十七卷阿私仙人亦云阿私哆亦云阿私陀譯曰不白第二十一卷毘目多羅仙人應云毘目欝多羅譯曰毘目者脫欝多羅者勝亦云比也華嚴經第四十卷欝陀伽阿羅羅譯曰欝陀伽者水阿羅羅者流大般涅槃經第十九之內呵竭多仙應云阿伽多譯曰阿伽多者來第三十五之內耆菟仙人應云時莬譯曰勝也羅羅伽人譯曰流近阿私羅譯曰非名中阿含第三十七卷提鞞羅譯曰提鞞者天羅者除者加那那譯曰計數長阿含第二十二卷伊尼耶仙人應云猗尼耶譯曰鹿𨄔雜阿含第二十一卷波羅延摩納婆等應云婆羅耶那摩那婆譯婆羅耶那者度被摩羅波者年少淨行阿毘曇毘婆沙第三卷傍摩提婆應云婆摩提婆譯曰婆摩者短亦云由也提婆者天第八卷毘婆密哆應云毘摩密多羅譯曰毘摩者威德密多羅者明友婆羅陀殊應云波羅墮闍譯者曰姓毘浮譯曰能勝婆脩提婆天生譯曰實天第九卷菴婆羅吒應云菴婆瑟吒亦云菴摩羅陀譯曰八母第三十四卷摩沙譯曰分亦云豆優陀羅摩子應云優陀羅羅摩譯曰獺戱提波延那仙人譯曰提婆者洲延那者生佉盧吒仙人譯曰強鵒鴻也第五十五卷欝多羅仙人譯曰勝也賢愚經第一卷奢摩子義仙人譯曰寂靜第十三卷八迦梨仙譯曰樹皮摩得勒伽經第四之內那賴仙人經曰无樂生經第一卷薩羅薩仙人應云婆羅娑譯曰白鶴佛所讚第一卷毘耶娑仙譯曰无名聞也駒尸仙譯者曰姓闍那駒仙人應云闍那歌譯曰能生阿伽陀仙人譯曰几藥婆羅墮仙人譯者曰姓婆羅舍仙人譯者曰姓跋伽仙人譯者曰姓第二卷婆私書牟尼應云婆私吒牟尼譯曰最勝仙人材祇沙仙人譯曰樂勝第三卷迦毘羅仙譯曰蒼色第四卷跋伽譯者曰姓過去現在因果經阿羅邏迦蘭應云阿羅邏歌譯者懈怠跋彌迦仙人譯者曰虫名竭伽仙人譯者曰姓逮波耶那譯曰逮波者洲耶那者生摩訶摩耶上卷毘失波密多羅應云毘首波密多羅譯曰毘首婆者一切密多羅者周旋波羅舍邏譯曰波羅者波舍羅者箭應祁羅舍應云央祁羅娑譯曰央祁者體邏娑者味波薩應云波舍譯曰繩也波梨仙人譯曰護也思惟略要法迦羅那譯者曰仙人經雜經阿周陀仙人譯曰不落外道名第二十四尼楗子亦云尼楗陀亦云尼楗若子譯曰尼者无也楗者繫大智論第一卷梵志譯曰梵者淨也先尼婆蹉衢多羅譯曰先尼者文婆蹉者子衢多羅者姓薩遮迦摩楗提譯曰遮薩迦者實摩楗提者求道富羅那譯曰滿也第三卷梵志婆蹉姓拘迦那應云婆蹉迦拘陀譯者曰婆蹉者姓迦拘陀者順亦云護也須跋梵志亦云跋須陀羅亦云須跋譯者曰須者好也跋陀者賢也那闍耶譯曰那者正也闍耶者勝第十一卷須尸摩梵志亦云須私摩譯曰須尸摩者好堺第二十二卷尼楗子薩遮祇應云尼楗連駄薩遮外譯曰尼楗連駄者无繫薩遮外者實第二十六卷先尼應云斯尼譯曰運也第三十二卷婆蹉梵亦云和差譯曰婆蹉者積第三十七卷不蘭迦葉譯曰富蘭那者滿迦葉者姓也第四十二卷末伽梨拘舍離子亦云末伽梨瞿舍梨大般涅槃經第十七卷毘羅胝子譯曰不作阿耆多翅舍亦云阿夷哆鷄舍欽婆羅譯曰阿耆多者不勝翅舍者欽婆羅者覆迦羅鳩駄迦旃延亦云波渡迦旃譯曰迦鳩羅駄者領迦旃延者姓優樓迦毘羅譯者曰優樓迦者鳥名迦毘者姓也第二十三卷闍提首那應云闍底首羅譯曰闍底者醒首羅者蒙第三十五卷婆闍吒譯曰最勝富那譯曰更也欝頭藍弗應云欝陀羅摩弗多羅譯曰欝陀羅者嬾摩者戱弗多羅者子第三十六卷優多羅摩納應云優多羅摩納娑譯曰優多羅者勝摩納婆者年少淨行中阿含第十之內婆羅婆譯曰婆羅者力婆者有也第三十九卷阿和那楗尼應云阿婆那楗尼譯曰阿婆那者无林楗尼者眾第四十卷旃荼羅譯曰瞋亦云惡阿伽羅訶那應云阿他訶那譯曰无熱娑羅末梨譯曰娑羅者實末梨者華第四十七卷鞞摩那脩應云鞞摩那寫譯曰總思第五十七卷摩息迦梨瞿舍利子譯者曰摩息迦利者國名瞿舍利者牛廐波若鞞羅遲子應云那闍耶鞞慢耆尼楗子譯曰那闍耶等勝鞞慢耆者不好色尼楗如上說瞿曇阿夷哆應云瞿多摩訶耆多譯者曰瞿多摩者姓阿耆多者不勝那利鴦伽譯曰大體第六十卷尼俱陀譯曰无瞋波遮羅譯曰極動頭摩譯曰直木波梨譯曰護也布咤婆樓應云放咤婆樓譯曰放咤者戰格婆樓者沙也第十七卷薩區譯曰地也雜阿含第五卷突目佉譯曰惡面阿支羅迦葉譯曰无衣第十五卷治牟留應云治浮留譯者曰樹名也佉提羅葉譯曰破空曇摩葉譯曰法也摩樓迦葉譯曰木也閻浮車應云閻浮車毘譯者曰閻浮者樹名車毘者皮第十八之內阿耆毘譯曰火也第二十一卷俱迦那應云俱迦那駄譯者曰天樹名第三十四卷舍羅步應云舍羅破譯曰舍者箭破爨第三十五卷尸婆譯曰安隱梨師達亦云乚師達多譯曰梨師者仙達多者與闍祇羅應云闍低羅譯曰螺髻第四十二卷豆婆遮譯曰惡語肆吒譯曰聰了波羅延低舍彌德勒譯曰波羅延者度彼低舍者光彌德勒者慈第四十三卷孫陀槃利應云彌陀羅婆利譯曰彌陀羅者好婆利者勝遮羅迦外道譯曰行食第四十六卷鞞提醯子譯曰四惟亦種種體薩子闍摩納應云薩摩那婆譯曰薩闍者實摩那者年少淨行彌沙塞律十四卷尼楗陀子闍跋應云尼楗陀子闍跋私吒譯曰尼楗陀者如上說闍跋私陀者八母善見毘婆沙四卷阿寅婆迦應云阿時婆迦譯曰无命求也第七卷多婆須譯曰苦道婆利婆闍應云波立波羅闍分譯曰出家乾陀賊譯曰𠃵陀者香跋闍子應云跋闍羅譯曰金剛都提夜子譯者曰文名也阿毘曇毘婆沙第三之內安仇利應云鴦仇利摩羅譯曰指鬘彌多羅達子應云彌多羅達多亦云彌多達譯曰彌多羅者慈達多者與第四卷闍那應云若那譯曰智也第五卷毘闍那應云毘若那譯曰識也迦毘羅弟子應云迦比羅譯曰蒼也第八卷藍婆周羅譯曰藍婆者垂周羅者須髻第十六卷欝陀迦子應云欝陀羅迦譯曰獺也阿蘭迦譯者曰鳥名也阿羅欝陀迦子應云阿羅羅欝陀羅迦譯曰无戱獺也第二十三卷阿羅荼欝陀迦譯曰阿羅荼者靜欝陀迦者獺第二十五卷蘇尼哆弟子譯曰血也第三十五卷阿耆婆梵志譯曰有火第五十卷尼楗陀若提子譯曰尼楗陀者无繫若提者親友第五十六卷頭陀梵志應云頭多譯曰擲鞞婆沙第八卷波肆吒女梵志應云婆肆吒譯曰最勝第十一卷檀提梵志譯曰罰也欝鞞羅迦葉譯曰欝鞞羅者過時雜阿毘曇心第五卷須那剎多羅等譯曰好星第六卷摩訶迦譯曰大身欝毘梨梵志譯曰大精進也出曜經第六卷憂毘梵志譯曰地也第十四卷摩竭檀提梵志應云審力伽檀提譯曰密力迦者庶檀提者罰婆須密經第二之內復波伽梵志應云優波伽譯曰近行頭多胡梵志應云頭多求那譯曰功德也難陀婆咾譯曰歡喜犢也第九卷訖梨舍譯曰瘦也僧訖惡姤譯曰安瞿舍盧譯曰名也味迦梨子譯曰覓道醯頭摩納應云醯兜摩那婆譯曰醯兜者因摩那婆者少年淨行百句譬喻經第八之內薩支禪尼應云薩遮闍尼譯曰薩遮者實闍尼者生第九卷迦羅無提應云薩羅无駄譯曰迦羅者時无駄者喜闍提蘇尼梵志應云闍蘇提盧尼譯曰閻提者生發廬尼者聞僧伽羅剎所集經第三之內阿闍羅翅舍欽婆羅譯曰阿闍羅者不光翅舍者髮欽婆羅者覆菩薩所胎經五之內梵志優婆迦亦云憂波迦譯曰近行佛所讚第三卷波羅延梵志譯曰徃彼第四卷多波楗尼釰應云陀婆楗尼譯曰山火阿耆尼毘舍譯曰阿耆尼者火毘舍者入首迦阿低梨犁譯曰首迦者鸚鵡阿低梨犁者无油弗迦羅婆梨應云迦羅婆底譯曰蓮花有也汲闍欝多羅應云鴿闍欝多羅譯曰合闍者曲頸欝多羅者勝那闍夜毘羅胝子譯曰那闍夜者等勝毘羅胝者不作維摩詰經第一之內迦羅鳩馱迦栴延譯曰迦羅鳩駄者黑領迦栴延者姓斯那道志譯曰軍也脩行本起第二卷摩因提梵志應云摩頭陀羅譯曰大天主也義足經上卷盡陀譯曰㓨也梵志颰經迦夷譯曰有體求曇譯者曰姓迦葉譯者曰姓波利譯曰護也鴦崛梵志應云鴦堀魔羅譯曰捐鬘華也佛本行經闍提尼梵志應云闍提舒尼分譯曰闍提者生舒尼分者姓菩薩受齋經摩竭梵志應云摩伽他譯者曰星名也觀無常得解脫經頞波羅延梵志譯者曰姓梵志頞婆羅延問種尊經闍提弗多羅譯曰生子灰河經摩耶利梵志譯曰有他乳光經須卑應云須比履譯曰好念梵網六十二見經梵達摩納摩應云梵摩達多摩那浮譯曰梵摩達多者淨與摩羅婆者年少淨行阿耆毘譯曰有火外道誘質多長者經阿耆婆外道應云阿耆尼娑訶譯曰大葉薄俱羅經阿耆尼達多譯曰火與婆羅門通達經欽快盧梵志譯者曰樹名也成實論第一卷迦羅摩譯者曰姓第十六卷優樓迦譯者曰鳥名也百論第一卷勒沙婆弟子譯曰有護欝陀羅伽譯曰獺也睒摩道士譯曰寂靜歷國傳第二卷欝卑羅迦葉譯曰大薄大臣名第二十五毘闍大臣譯曰種種僧祇律第二十一卷摩竭大臣應云摩伽他譯者曰星名也彌沙塞律第二卷遮那伽臣譯曰閑事阿毘曇毘婆沙第三十四卷留支大臣譯曰樂五教反鞞婆沙第十一卷羅睺大臣譯曰鄣月賢愚經第二卷優持迦羅那子譯曰大臣婆須密經第四卷憂婆吉大臣應云優婆吉利底譯曰優婆者大吉利底者名聞菩薩所胎經第五之內細那大臣應云斯那譯曰軍也生經第三卷阿薩陀臣譯曰不信法句經第二卷長者名第二十六耶闍長者子亦云夜輸譯曰耶闍者聞也大智論第四十九卷法寶周羅長子譯曰周羅者小華嚴第四十一卷瞿波羅長者譯曰瞿者牛也婆羅者守第三十八卷郁伽長者亦云憂伽譯曰威德大涅槃經第十七卷婆熙伽長者譯曰婆熈伽者部外第二十四之內把吒羅長者譯曰重佇就反疊第三十卷阿那邠長者應云阿那他邠他譯曰阿那他者孤邠陀者給增一阿含第十二卷脩跋長者應云修跋陀羅譯曰好賢第十三卷阿羅咃吱大長者經曰財幢第三十二卷阿菟羅陀譯者曰星名也雜阿含第三卷那物羅長者譯曰不姓第五卷質多羅長者譯曰種種亦云星名第二十一卷梨師達多長者譯曰仙典第三十卷波藪長者譯曰實也第三十七卷達摩提那譯曰法與摩那提那譯曰摩那者慢亦云意也提那者與郁伽蘇跋那長者譯曰郁伽者威德蘇跋那者好色十誦律雜誦第四卷拘睒毘長者子譯曰有藏四分律第三第四卷迦樓長者譯曰作也彌沙塞律第三之內瞿師羅長者譯曰聲也第十四卷優陀延長者譯曰起也第二十三卷沙門億耳長者譯曰沙門者息心亦云聞說第二十五卷首樓那長者譯曰閉也文荼長者譯曰无髮第二十六卷跋提長者譯曰賢也第三十卷迦蘭陀長者律曰迦蘭陀者山鼠譯者曰鳥名善見律毘婆沙第二卷須達長者亦云須達那譯曰好與阿毘曇毘婆沙第五十三卷散陀𭓶長者譯曰漏也賢愚經第五卷曇摩美長者應云瞿摩斯那經曰法軍第六卷羡那長者應云斯那經曰軍曇摩世質長者譯曰法律第十二卷優波梨長者譯曰大護婆須密經第六卷難提長者譯曰歡喜百句譬喻經第八卷波羅密多羅長者譯曰波羅者彼密多者知識僧伽羅剎所集經第三之內脾闍耶密多羅長者譯曰不勝知識尸利崛長者應云尸利堀多譯曰吉護菩薩所胎經第五卷和利長者應云波利譯曰護也生經第二卷央伽長者子譯曰體也佛所行讚第四卷脩羅陀長者譯曰好得法句經第一卷此守陀宋長者子經曰淨意弘道廣顯經第四卷阿具利長者應云阿瞿羅譯曰不白蛇陀長者子經曰寶稱須檀長者應云須檀那譯曰好物興起行經下卷郁迦長者應云私那迦譯曰少也郁迦長者經上卷摩訶那摩陀譯曰大名與也菩薩藏經披羅密多羅長者譯曰薄大菩薩受齋經脾闍耶密多羅譯曰勝大那舍長者譯曰失也決定罪福經僧迦羅摩長者譯曰眾園六過出家經私呵昧長者應云私呵昧底譯曰師子意也私呵昧經質多長者譯曰心也外道誘質多長者經拘舍密多羅長者譯曰第友弗賖密多羅長者譯曰弗賖者星名密多羅者友罪閱城人民請佛經私呵末長者應云私訶摩𬾙亦云私呵昧譯曰師子意也居士名第二十七欝伽陀居士譯曰起也大智論第二十三卷伽羅譯曰頸也加陵伽譯者曰國名也毘伽陀譯曰已喜伽梨輸應云伽利喜瘦譯曰憎惡遮樓譯曰可愛亦云光藪婆頭樓應云藪跋陀羅譯曰好賢陀梨舍菟應云陀梨舍那譯曰見也藪達利舍菟譯曰極好見也耶輸譯曰名聞耶輸多樓譯曰耶輸者名聞多樓者樹也散陀那應云婆陀那譯曰有物首陀羅譯曰下事布薩多居士應云布殺他譯曰增長功德十誦律八法第二卷脩聞多居士譯曰姓生摩訶先那居士譯曰大軍阿毘曇毘婆沙第四十六之內翅跋名居士子譯曰聚魚第五十六卷阿羅婆居士譯曰少語出曜經第八卷聞利居譯曰納也質多居士譯曰心也賢愚經第三卷摩訶檀居士應云摩訶陀那譯曰大施佛說大意經夫人名第二十八摩耶夫人譯曰他也華嚴經第四十六卷毘提夫人應云毘提伽譯曰種種身也亦云四惟大般涅槃經第三十一卷摩利夫人亦云末利譯曰華也增一阿含第一卷須賴娑夫人譯曰好味捨彌夫人譯曰寂靜尸利夫人譯曰勝亦云吉婆留居提鼻譯曰婆留居者酒提鼻者天人中阿含第五十三之內提鼻伽羅提應云提毘婆羅提譯曰提毘者夫人低舍羅絺多應云低舍落絺哆譯曰低舍者光亦云火落絺哆者護雜阿含第二十三之內摩訶摩耶夫人譯曰大華賢愚經第一卷須利波羅滿夫人應云脩梨耶婆羅僈譯曰脩梨耶者曰耶婆羅墁者增上第二卷須摩壇夫人經曰華把第五卷提婆跋提夫人譯曰提婆者天跋提者賢第九卷蘇摩夫人譯曰月也弗已夫人應云弗已理賊譯曰華陀惟檀夫人應云育多陀檀那譯曰相應施也太子五夢經女人名第二十九梨羅譯曰妍雅大智論第三卷須曼那譯曰好意第七卷優鉢羅槃那譯曰優鉢華黛色華槃那者林菴羅婆利亦云菴烏甘反婆羅婆利亦云𭪅羽烏甘婆利譯者曰菴婆羅者樹名婆利者護孫陀利女亦云須陀利亦云酸陀利譯曰好容貌也第九卷阿梵婆羅應云阿梵婆羅譯曰非淨護也第十七卷扇陀譯曰隨流梵摩類弗亦云梵摩尼弗尼羅譯曰淨行女也第二十五卷瞿毘耶譯曰瞿者牛毘耶者女兒第三十三卷須羅婆女譯曰須者好也羅婆者得第三十五卷恒提婆女應云恒伽提婆譯曰恒伽者天堂來提婆者天第七十五卷跋陀羅童女譯曰賢也華嚴經第三十八卷婆須密多女譯曰婆須者寶密多者友第四十二卷拘陀羅女譯曰非好腹也大涅槃經卷第一藍婆女譯曰垂也欝婆尼女譯曰大自在也帝路沾女譯曰摩勝毘舍佉女譯者曰星名也難陀譯曰歡喜難陀婆羅譯曰歡喜力也迦不多樹女譯曰極完第三十卷槃頭波提譯曰槃頭者親屬婆提者語也長阿含第一卷摩楗提譯曰員道僧祇律第三卷阿㝹婆磨譯曰無以為喻頻頭摩邏譯曰渧垢尸婆離應云陀婆羅譯曰薀藻第三十一卷拘利女譯曰織也魔羅女譯曰華鬘利車女應云彌利車譯曰樂五教反垢齊憂婆私應云齊耶優婆私譯曰齊耶者勝優婆私者清信女也四分律第五卷坻舍難陀譯曰坻舍者光亦云大也難陀者喜也第二第一卷欝婆羅羅譯曰欝者大也婆羅者力第九卷婆羅跋提應云婆羅跋也羅譯曰勝賢第三第四卷婆羅淫女譯曰勝也第四第七卷黑離車女應云離車毘譯曰細滑波也彌沙塞律第十五卷拔提應云跋提利譯曰賢女第十九卷須聞陀女人譯曰好生摩利尼女人譯曰有華鬘也第三十卷半迦尸女譯者曰口迦尸者國名也第三十三卷摩㔁伽女譯曰下姓阿毘曇毘婆沙第十一卷瞿毘迦釋女譯曰地至第十七卷栴遮女孫陀利譯曰動可愛也第二十五卷婆肆吒譯曰最勝第四十六卷摩訶先尼譯曰大軍女也彌伽羅女譯曰金帶第五十卷波翅多女譯曰計數波梨女應云波利譯曰護亦云守第五十四卷栴陀利亦云遮陀利譯曰下姓女也出曜經第七卷摩那祗譯曰慢行女也波闍羅女應云跋闍羅經曰金剛賢愚經第二卷叔離女應云首陀經曰白也檀膩伽女應云陀膩伽譯曰物也陀膩𮧝女譯曰有物毘梨女應云毘利耶譯曰精進第七卷差摩女經曰安隱牟尼女譯曰葉滿也第十一卷蘇曼女譯曰可愛第十三卷毘摩羅達女亦云惟摩達譯曰無垢與無十住斷結經第四卷彌迦女人譯曰雲也觀佛三昧經第二卷毘低羅譯曰無油第六卷栴遮摩那耆女應云栴遮摩那毘歌譯曰動淨行女菩薩處胎經第五卷酸陀難提應云彌陀羅難提譯曰可愛歡喜舊犁尼應云舊利尼譯曰重女提婆跋提譯曰天喜十善十惡經須羅陀女經曰鮮潔譯曰善得梵摩婆提女譯曰淨論彌勒成佛經舍彌婆帝寶女譯曰舍彌者寂婆者長三摩竭女應云三摩竭多譯曰相會三摩竭經瞿曇夷經曰月女譯曰姓女太子五夢經優披洹女應云優婆槃那譯曰近林般舟三昧經栴陀應云栴陀羅譯曰月也佛說大意經曼坻譯曰智也須太拏經罽拏延譯曰黑也摩伽羅母譯曰覓道成實論第二卷本云延應二年五月二十三日申時於醍醐寺地藏院書寫了道成寬保元辛酉年八月二十五日以地藏院書寫校合等了僧正賢賀
