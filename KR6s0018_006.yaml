天王薩闍多譯曰子力婆須蜜菩薩所集楗度首第一卷鬱陀羅耶應云鬱陀羅耶那譯曰好髻觀佛三昧經第七卷何周那人譯曰不碎優婆塞戒經第五卷鳩那羅譯曰惡人賢劫經第三卷阿蘭迦蘭譯者曰國名也僧伽羅剎所集經第一卷布賴多學士應云布賴他譯曰淨住鉢摩迦譯曰蓮花第三卷弗尼應云分尼譯曰滿也大哀經第四卷須那羅譯曰好人虛空藏經第三卷毗裘譯曰日妹佛所行讚第一卷央耆羅譯者曰姓毗利訶鉢低譯曰大主跋彌譯曰鎧也阿低離譯曰無油那羅鳩婆應云那鳩婆四譯曰可愛舍那鳩摩羅譯曰舍那者樹名鳩摩羅者童子迦賓闍羅譯曰鳩鳥阿菟闍阿沙應云阿菟闍阿賖譯曰阿莬闍者茅阿賖者樂五教反跋闍羅婆休譯曰跋闍羅者金剛婆休者肩毗提訶闍那譯曰毗提訶者國名闍那者人亦云聚那羅濕波羅譯曰那羅者人濕波羅者巧頭樓摩譯者曰樹名也安低疊應云安低提婆譯曰安坻者後婆提者天阿濕波譯曰不巧闍延多譯曰勝也富那波藪譯曰滿賢彌伽迦利譯曰彌迦者雲迦利者黑亦云時也第三卷毗陀波羅沙譯曰毗陀者智波羅沙者波樂阿漯波誓譯曰不巧生也樹提迦耆婆譯曰樹提伽者大耆婆者命第四卷首羅輸盧那譯曰首羅者勇輸盧那者聞尼瞿屢陀譯曰無節亦云四惟尸利掘多迦譯曰吉護娑多耆利譯曰樂山鳩吒檀耽應云鳩吒檀多譯曰鳩吒者曲檀多者齒富那跋陀譯曰滿賢瞿曇摩譯者曰姓瞿師羅譯曰磬名跋陀羅斯那譯曰賢軍過去現在國呆經第三卷跋陀羅梨譯曰賢良摩訶羅陀譯曰大命金光明經第四卷摩訶波羅那譯曰大護摩訶薩埵譯曰大天摩訶提婆譯曰大衆生也摩訶加賴奢譯曰大苦檀持陀羅尼經第一卷摩訶離婆帝譯曰大星毗伽陀羅譯曰無持須陀那羅譯曰好施人也毗羅陀譯曰薄也法句經第一卷波利譯曰護也第二卷分那譯曰滿也摩訶男應云摩訶那摩譯曰大名大雲經第三卷波利摩陀應云波羅摩陀譯曰彼醉佛藏經下卷摩訶那摩陀那應云摩訶那摩多陀那譯曰摩訶那摩多者大歸敬也陀那者施那羅陀譯曰人典中本起經第一卷須達經曰善溫第二卷那利繩譯曰那羅者阿耆達譯曰大與優多羅摩納經曰上志譯曰勝淨行也善卷經下卷迦羅蜜應云迦羅蜜多羅譯曰時友純真陀羅經下卷阿比羅提譯曰無勇與也阿閦佛國經下卷須摩提應云須摩底譯曰好意興起行經下卷修耶舍摩提應云修耶舍摩底多履反譯曰好名聞意迦羅越子譯曰有時無量平等覺經上卷惟摩羅惒應云毗摩羅婆譯曰無垢有也阿闍世王經上卷摩訶若那譯曰大智下卷羅耶譯曰行也都伽長者經下卷迦羅起應云迦羅婆譯曰有時比守陀未應云毗守陀摩低經曰淨意阿耨達經下卷維摩羅𮞨移經曰離垢威也等集衆德經上卷輸提陀應云久持陀經曰淨除五百弟子自說本起經須夢經曰善念輸論經曰明聽凡耆經曰可善夜耶經曰名聞尼利羅譯曰無可愛也薄拘盧經曰賣姓摩呵經曰大長貨竭經曰善來樹提衢應云樹提伽譯曰大行諸跋離譯曰動也迦葉過尼乾經毗樓指譯曰不樂五教反十善十惡經鞞留羅譯曰長子喪念不離經迦尸人譯者曰國名也鬱陀羅譯曰破也佛本行經羅旬襦應云羅旬若摩呵敢應云摩呵敢摩譯曰大事文殊師利問菩薩經呵難提和應云阿難多提婆譯曰阿難多者無邊提婆者天慧上經離提和經曰歡𭛊栴遮摩尼譯曰栴遮者動摩尼者珠須多和譯曰好慶諸迦羅蜜應云遮迦羅蜜多羅譯曰輪友三蔓陀颰陀羅菩薩經提婆娑那應云提婆婆娑那譯曰天愛彌勒成佛經須摩提應云須摩耶譯曰好意亦云好智沙訶調應云娑訶提婆譯曰忍天決定罪福經鳩摩迦葉應云鳩摩罪迦葉譯曰鳩摩羅者童迦葉者姓迦羅那譯曰作也颰陀應云跋羅譯曰仁賢經曰賢也幻七仁賢經賴吒惒羅應云剌吒婆羅譯曰國護所問德光太子經鳩摩羅迦葉譯曰童子鳩摩迦葉經私訶昧應云私訶摩底譯曰師子意也道樹三昧經梵摩諭譯曰淨命梵摩渝經栴提羅譯曰摩作勝鬘經薩和菩應云薩婆多羅經曰一切度也薩和第薩伽拘羅應云歌拘羅譯者曰樹名也灰河經鏗荼陀婆譯曰行也調達問佛經修陀那譯曰好物婆羅門通達經修羅陀譯曰好車浮彌譯曰地也浮彌經耆婆先童子譯曰耆婆先者壽軍釋䩭底譯曰天主幢也苦陰目事經莫楗應云莫楗陀譯曰覓首十二因緣經曇摩經曰法也阿竭經曰當來曇摩鉢應云曇摩波羅譯曰法護阿育王經藍耶人譯曰可愛阿難陀譯曰歡喜中陰經迦蘭陀譯者曰國名披祇之子譯曰能語迦葉結經拘鞞羅譯曰惡體羅閲城人民請佛經央瞿多羅國人譯曰體勝佛見放牛者示通經波那人譯曰水也三小劫抄經摩留人應云摩留哆譯曰山也舍羅人譯曰廣也梵摩達多譯曰淨與梵網經那難頭陀耶譯曰那難頭已歡喜也陀那者起私休經闍婆童子譯曰𫘆行明星天問慈經怛惒尼應云猷婆尼譯曰不動神呪經尸梨𭪰應云尸梨槃譯曰吉得雜經郁耆應云郁者邏譯曰長難卑提應云卑餘提譯曰彼也波知提譯曰破亦云刊披羅修應云波羅修譯曰斧也彌迦弗應云彌力伽弗多羅經曰庶子阿羅呢應云阿羅那譯曰無賊須羅陀經曰解潔譯曰好得沈摩堀應六曇摩堀多譯曰法護梨色吒譯曰仙教耶舍耶譯曰名聞樂阿梨梨色吒譯曰不仙教輸陀耶舍譯曰淨名聞也鬱多羅譯曰勝也闍梨亦云耶利譯曰有納婆波那譯曰滅也婆羅奴應云婆羅那譯曰𠌵也須闍應云修闍低譯曰好生鞞提譯曰四惟旃遮喜摩譯曰旃者動喜摩者動亦云樂阿由陀人譯曰無伴侶也成實論第一卷弗尼迦譯曰滿也第三卷違舍應云違舍者譯者曰星名也莎婆魁膾應云莎沙譯曰氣噓富樓沙譯曰丈夫第十一卷差摩伽譯曰忍也尸梨譯曰志也外國傳第二卷俱那羅譯曰不好人也佛陀多羅傳曰佛救拘羅祇傳曰親生梵摩丘羅傳曰梵種子也因那羅人譯曰天王歷國傳第三卷摩賢陀羅譯曰大天主也豆迦應云豆佐譯曰苦也波羅河應云婆羅伽譯曰勝體尸婆摩提譯曰安隱意也迷伽拔摩譯曰雲鎧比奢譯曰入也雜姓名第三十一婆蹉姓譯曰櫝也十誦三誦第三卷俱蹉姓應云屈蹉譯曰下賤波羅墮姓譯曰滿語阿支羅姓譯曰無衣舍夷拘離應云舍夷物利譯曰眠織四分律第二分第一卷彌寧跋耆應云彌那跋耆譯曰彌那者焦跋耆者種滿羅蘇摩應未羅蘇摩譯曰未羅者九蘇摩者月阿提梨譯曰不也第三分第四卷舍持羅應云山特羅譯曰除苦婆羅挫闍應云婆羅隨闍譯曰婆羅者重挫闍者語奢致羅譯曰諂曲第三十九卷竭伽譯曰姓也維提應云毗提譯曰智也普耀經第一卷迦那姓譯曰砰未三小劫抄經多盧提譯曰樹起楗陀利譯曰地持阿波譯曰水也迦淩譯者曰國名也遮波譯曰弓也般闍譯曰五也彌尸利譯曰我吉摩彌譯曰莫我句留譯曰作亦云姓善王皇帝功德經本云仁治元年八月二日申時於醍醐寺地藏院書寫了道成一交了寬保初元辛酉年八月二十五日以地藏院之本令書寫校合了賢賀五十八
