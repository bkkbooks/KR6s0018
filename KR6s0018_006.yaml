body:
  text: 雜人名第三十雜姓名第三十一雜人名第三十優尸那應云漚舍那譯曰大明星也大智論第四卷劬嬪應云劬嬪陀譯曰劬者牛亦云天亦云地嬪陀者智薩陀婆應云薩陀羅婆譯曰濕也須達那應云須陀那譯曰須者好陀那者物亦云寶也第五卷羅陀譯曰醒也第六卷目伽略子度應云物伽羅𭩬反譯曰目伽羅者杵也第十卷呵多譯曰破亦云害亦云不勝第十一卷拘牟頭譯曰白花第十四卷怵波伽應云頭波伽譯曰頭者惡婆伽者功德劬毗耶譯曰智解亦云聰明第十七卷婁陀輸應云憂陀捨譯曰大望第二十卷摩訶三磨陀譯曰大遍第二十一卷鬱多羅越人亦云鬱多亦云鬱多羅譯曰鬱多羅者此亦云勝第二十四卷首羅譯曰勇也婆離亦云婆利譯曰有力梵摩類弗應云梵摩尼佛多羅譯曰淨行第二十五卷鳩羅檀陀譯曰鳩羅者親亦是姓檀陀者罰亦云強尼陀佛度譯曰不解第二十六卷頂有周羅譯曰周羅者髻也第三十一卷伽彌應云阿伽彌輪論曰來也第三十二卷阿那伽那應云阿那伽哆論曰阿那名不伽那名來尸婆應云尸婆迦譯曰安穩亦云樂第三十三卷平伽陀應云修伽哆譯曰善逝迦郗那譯曰功德衣亦云強第三十五卷難陀婆羅譯曰歡喜力也第三十八卷珊若婆譯曰有想第四十卷鞞舍譯者曰星名也第七十五卷摩訶那伽譯曰摩者大那伽者龍亦云象也華嚴經第一卷福伽羅譯曰人也第十三卷須達拏譯曰好施第十六卷純陀應云准陀譯曰妙義大般涅槃經第一卷闡提譯曰直意作也第四卷瞿師羅譯曰聲也第六卷摩訶斯那達多譯曰與大軍也第十四卷般遮尸應云般遮尸佉譯曰五髻第十七卷鴦崛魔應云鴦崛利魔羅譯曰指鬘花也阿那分提應云阿那他邠陀亦那邠持譯曰阿那陀者孤邠陀者給富多羅應云佛多羅譯曰子也摩訶那伽譯曰大龍第二十一卷鉢楗陀應云鉢臘多楗陀譯曰鉢臘多者至楗陀者香阿坻耶應云阿體耶譯曰何者不體耶者欲取珊檀那舍應云珊檀梨舍耶譯曰珊者正檀梨舍耶者見第二十七卷祇陀譯曰勝也第二十七卷迦羅富應云迦多富譯曰臰也第二十九卷施婆羅應云施始來反婆羅譯曰薀藻彌迦羅譯曰金帶半闍羅譯曰籠亦云獄跋波譯曰父也第三十一卷瞿和離亦云瞿波離亦云物和離譯曰瞿者牛也波離者守第三十二卷坻舍亦云帝奢譯曰光亦云大舍勒譯曰衣也質多譯曰意亦云心增一阿含第一卷乾提阿藍應云乾陀阿藍譯曰香林優波掘應云優波掘多譯曰大護呵侈羅婆應云呵侈羅破譯曰呵侈者失羅破者利闍利譯曰光也須達應云須達多譯曰好與毗裘應云毗梨裘譯曰坑塹亦云重也優波離譯曰大護亦云近護殊提應云殊邸譯曰明也優迦毗舍離應云優伽羅毗舍羅譯曰優伽羅者最上毗舍羅者廣博摩呵納應云摩訶那摩亦云摩訶男譯曰大名拔陀譯曰賢亦云大毗闍先應云毗闍斯那譯曰勝軍難提波羅譯曰喜護優多羅譯曰勝也拘夷那竭摩羅應云拘尸那伽羅末羅譯曰拘尸者茅那伽羅者城末羅者力提婆達兜應云提婆多達譯曰天與婆羅留支譯曰勝樂五教反薩羅陀應云賖羅陀譯曰清明孫陀羅諦利譯曰陀羅者好諦利者女第三分阿那律應云阿那律陀譯曰無障梵摩踰譯曰淨命羅云應云羅睺譯曰障日避支應云具支歌譯曰獨覺瞿蜜應云瞿蜜多羅譯曰天死第五卷鍮婆應云私鍮𮑣譯曰塔也孫陀利譯曰可愛拘絺羅譯曰勝也第六卷優踰藍弗羅應云優陀羅今羅磨弗多羅譯曰優陀羅今羅多磨者獺戲弗多羅者子姦荼譯曰根也耶若達應云耶若達多亦云近若達多譯曰耶若者坊德達多者與優此伽應云優波伽譯曰近行優留毗譯曰木苽阿若拘鄰譯曰阿若者已知拘鄰者姓伽夷譯曰歌也優陀耶亦云優陀夷譯曰起也梵摩達亦云梵摩達哆譯曰淨與第十卷不奢蜜應云不奢蜜多羅譯曰不奢者問𣒀蜜多羅者友第十一卷優般尼蹉應云尼賖譯曰大夜尼蹉應云尼賖譯曰夜也伽羅譯曰頸也優般伽羅應云優波伽羅譯曰大頸波迦梨應云薄迦利譯曰樹皮甄陀羅應云甄那羅譯曰是人非人第十二卷比波羅耶檀那應云阿路波羅耶檀那譯曰意欲施也第十四卷阿羅婆譯曰不語毗流勒應云毗流離譯曰兩反長也第十七卷僧伽摩譯曰聚合第十九卷頭摩譯曰烟也第二十卷婆利沙迦羅婆譯曰婆利沙者雨迦羅者時婆者有也第二十三卷婆陀譯曰論義優波帝奢譯曰憂波者大帝奢者光亦云大也第二十四卷阿夷湍應云阿夷他譯曰來也婆沙應云婆婆可反沙譯曰語也婆休迦栴延應云頗樓復迦栴延譯曰頗樓復者不實迦栴延者姓素摩典應云須摩典譯曰須者好摩典者意亦云智也毗盧持應云毗盧也譯曰不相和也嗜婆伽譯曰壽者亦云命者摩醯提利應云摩顯陀羅譯曰大天主也盧迦延應云盧迦延那譯曰世法耶見第二十六卷尸利堀應云尸利堀多亦云尸利仇多譯曰吉護第二十七卷劫毗羅譯曰益也第二十九卷翅寧應云翅那譯曰護也第三十卷跋提婆羅譯曰賢力毗那經曰無畏第三十一卷修梵摩譯曰好淨第三十三卷羈舍譯曰髮也中阿含第三卷波羅窂應云波羅盧歌譯曰彼世第四卷郁加譯曰威德第九卷洗尼頻鞞娑羅譯曰洗尼者軍頻鞞者謨娑羅者力第十一卷尼彌譯曰輪也第十四卷蜱肆譯曰遣使第十六卷遮羅譯曰動也第二十一卷優簸遮羅譯曰大動麗𭪩應云麗𭪩毗譯曰細滑周那他應云修那陀譯曰好聲第二十三卷高羅婆應云拘羅婆譯曰作亦云姓第二十九卷傍耆舍譯曰共領國也須涅牟梨破群那應云涅槃多羅牟梨群濯譯曰修涅多羅者好眼牟梨者根破群那者星名第三十卷毗遮延哆譯曰勝殿那遊哆應云那由他譯者曰數名也阿羅那遮譯曰大也瞿陀梨舍哆譯曰瞿者天亦云牛陀梨舍多者見薩哆富樓奚哆應云薩埵富羅奚哆譯曰薩埵者衆生富羅者滿奚哆者意賴吒和羅亦云賴吒波羅亦云羅吒波羅譯曰賴吒者國波羅者護第三十一卷拘窂婆應云拘未欺譯曰惡友耽浮樓譯曰天樂嶽第三十三卷歌羅摩納應云歌羅摩那婆譯曰季少淨行亦云人也第三十五卷鬱瘦歌羅應云伊瘦歌羅譯曰伊瘦者箭歌羅者作第三十七卷䭮開提應云須楗陀譯曰好香梵波羅譯曰淨護阿蘭那梵摩譯曰阿蘭那者寂靜梵摩者淨婆私吒亦云婆私又譯曰婆私吒者最勝耆婆先那譯曰耆婆者命先那者軍第四十五卷跋陀阿漯貝應云跋陀羅阿漯波譯曰跋陀羅者賢阿漯婆者不坊第五十卷阿梨吒㗫帝譯曰阿梨吒者樹者㗫帝者國亦云聚弗那婆修應云富那婆修亦云那婆藪譯曰富那者滿婆修者寶第五十一卷阿寄舍那應云阿耆膩鞞舍那譯曰阿耆膩者火鞞舍那者入第五十二卷雞和哆應云枳跋多譯者曰殺魚人第五十四卷哺利多譯曰炙也第五十五卷阿羅羅譯曰無鬢第五十六卷迦羅摩譯者曰姓鬱陀羅譯曰勝也槃頭譯曰親族長阿含第一分周那亦云呪那亦云朱那譯曰碎也第三卷加陵伽譯者曰國名也毗伽陀譯曰無語遮椄譯曰光也藪婆頭譯曰善言論也陀梨舍菟應云陀梨舍那譯曰見也藪達梨舍菟譯曰好見耶輸多樓譯曰耶輸者名聞多樓者樹名摩納亦云摩那婆譯曰摩那婆者少年淨行第十三卷首迦摩納都耶應云首迦摩耶婆都耶譯曰首迦者鸚鵡摩耶婆者如上說都耶者父第十五卷跋祗末羅蘇摩譯曰跋祗者有伴末羅者力蘇摩者月須尼陀譯曰善謀略也波浮陀栴那應云波羅浮陀迦栴延那譯曰波羅浮陀者曰在迦栴延那者姓第十七卷漫提譯曰懈怠若而夜反夷毗羅梨應云若夷毗羅邏譯曰若夷者如法毗羅邏者不蜜輸屢那譯曰腹也雜阿含第一卷尸婆弗多羅亦云尸婆利子譯曰尸婆者安隱不多羅者子第九卷婆羅奢那譯曰波羅者他奢那者樂那羅譯曰行義者也摩菟闍亦云摩菟奢亦云摩菟舍阿毗曇婆沙曰意譯曰梵王生者婆羅者應云婆羅者利譯曰勝山第二十卷摩提提譯曰不香闍耶譯曰勝也第二十三卷毗闍耶譯曰無勝耆梨譯曰山也跋陀羅由陀應云跋陀羅由他譯曰賢行須陀耶譯曰共起第二十五卷修羅他譯曰好得亦云善得竭曇應云瞿曇譯者曰瞿曇者姓第三十三卷遮羅周羅那羅應云遮樓周羅那羅譯曰遮樓者光周羅者亦云小也那羅者人只尸譯曰有髮第三十三卷摩訶利應云摩訶利歌譯曰母也第三十七卷沙羅應云舍羅譯曰享屋修波羅提沙譯曰極遠彼國第四十九卷沙迦羅應云捨迦羅譯曰不斤十誦律序第一卷拘婆羅譯曰惡力亦云不勝必波羅延那譯者曰樹名也憂波伽應云憂波伽譯曰近行阿耆達應云阿耆達多譯曰阿耆者大達多者與第二卷祇陀槃那應云氏多槃那譯曰勝也第三卷阿毗羅應云阿鞞羅譯曰無怨初誦第二卷迦羅譯曰黑亦云時第四卷闡那譯曰覆藏亦云欲作俱伽梨譯曰云何時也騫陀陀驃應云騫陀他毗譯曰行林迦留陀提舍應云迦盧陀耶提舍譯曰時起說也阿視毗尼乾子譯曰阿視毗者不營資業尼乾者無繫騫陀達多譯曰行與第二誦第六卷三文達多應云婆物陀羅達多譯曰海與摩訶南釋應云摩訶那磨釋迦譯曰摩訶那磨者大名釋迦者能第十卷尼師達多應云梨師達多譯曰仙與第三誦第一卷阿奴拔摩應云阿奴波磨譯曰無以為喻第五卷摩楗提譯曰求道達摩提那譯曰法與毗羅吒應云毗賴吒譯曰勝國摩訶羅譯曰差亦云無知七法第六卷質多羅譯曰種種八法第三卷憂陀耶跋陀應云憂陀耶跋陀羅譯曰憂陀者出亦云起跋陀羅者賢雜誦第一卷薩若瞿姤路摩窂應云那闍夜瞿姤路摩羅譯曰那闍夜者等勝瞿姤路者姓羅者花第三卷瞿披應云瞿波利譯曰瞿者牛亦云地波利者守夜披應云夜波譯曰可也迦毗羅應云加比羅譯曰蒼亦云姓尼律第一卷安闍那譯者曰服藥也伊舍羅譯曰嫉垢達多摩那譯曰達多者與摩那者意阿婆跋陀童子應云阿婆跋陀羅譯曰阿婆者護跋陀羅者賢第三卷尼楗駝應云尼楗他譯曰無繫憂波離第二卷那闍譯者曰國名也僧祇律第一卷俱舍頻頭譯曰實也迦蘭陀譯曰國名阿跋吒譯曰洄復第六卷弗盧醯應云弗盧哆譯曰弗盧者國醯哆者所依止第七卷迦羅呵譯曰門諍第八卷頭磨應云頭樓摩譯曰樹亦云住第十一卷薩薄主應云薩他婆譯曰商估第十六卷須深摩亦云須尸摩譯曰須者好也尸摩者堺第十七卷梨波都應云離波多譯者曰星名也質帝隸譯者曰星名也第二十四卷渠尼譯曰有伴第三十一卷跋提譯曰賢也四分律初誦第一卷私呵毗羅𠌵師譯曰私呵者師子毗羅㖠者脫第八卷利師達多富羅那譯曰利師者仙達多者典富羅那者滿遮羅譯曰動也第二分第九卷跋遮羅譯曰光明微驎羅譯曰微驎三業滿陀羅者主樓脂譯曰樂也修樓脂譯曰好樂摩呵貴舍譯曰大等末羅譯曰力亦云姓真闍譯曰聚也阿漯卑譯曰不巧乾陀羅譯曰樹皮瞻鞞譯曰皮也拘羅婆譯者曰樹名也般羅闍譯曰籠也憂羅陀應云憂羅伽譯曰胸行瞿羅譯曰日也尼浮羅譯曰度也耶輸伽譯曰耶輸者名須伽者往亦云行第十卷那羅陀譯曰人與阿夷頭翅應云何時譯曰不勝髮也手提侈婆休應云修泥多羅婆休譯曰修者好泥多羅者眠婆休者扇毗羅吒子譯曰毗羅吒者勝國鬱鞞羅跋陀羅跋提譯曰起也憂陀延譯曰起也第五卷守籠那應云守盧那譯曰聞也賓迦羅譯曰黃亦色也第四卷私呵毗羅淖應云私呵毗羅馱譯曰師子聲也富盧醯侈譯曰目所宗歸毗蘭若譯曰深著彌沙塞律第一卷孫陀羅譯曰好也亦云可愛陀婆譯曰𫘆行第三卷富闍譯曰供養第