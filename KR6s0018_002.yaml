body:
  text: 菩薩名第七菩薩住地名第八菩薩觀行名第九辟支佛名第十比丘名第十一菩薩名第七菩薩應云菩提薩埵亦云扶薩論曰菩提者道薩埵者衆生亦云大智論大心譯曰精進亦云勇猛如是八義第一卷彌勒譯曰慈氏摩訶薩應云摩訶薩埵譯曰摩訶者大薩埵者如上説第四卷須陀須摩王譯曰須陀者間須摩者月阿遮羅菩薩譯曰不動文殊師利應云曼殊沙尸利亦云文殊尸沙論曰妙德譯曰曼珠沙者亦云藏也利者吉第六卷跋陀婆羅菩薩論曰善守譯曰賢力第七卷剌那那伽羅菩薩論曰寶積譯曰剌那者寶那伽羅者京畿那羅達菩薩應云那羅達多譯曰那羅者人達多者與毗摩羅詰應云毗摩羅詰障譯曰毗者無色也摩羅者垢詰滓者稱亦云名聞第九卷薩陀崙菩薩應云薩剌陀波羅論曰常譯曰薩剌陀者信波羅者守第二十一卷尸棄菩薩論曰妙意第三十卷須摩提菩薩應云須摩那譯曰大也第七十九卷彌帝隸力利菩薩譯曰彌帝隸者慈也第八十八卷優鉢羅華德藏菩薩譯曰優鉢羅者黛色華也華嚴經第一卷曇無竭應云曇摩伽那譯曰曇摩者法伽那者衆盧舍那菩薩譯曰盧舍那者勝眼梵王周羅菩薩譯曰周羅者小阿逸多應云阿時多譯曰無勝大般涅槃經十四卷散脂菩薩譯曰聚集大方等大集經第二十卷婆修密菩薩應云婆修密多羅婆須密經曰地觀譯曰寶友賢愚經第一卷石摩王菩薩應云善磨譯曰生也菩薩瓔珞經第一卷因陀達菩薩應云因陀羅達多亦云因提達譯曰天主與也華首經第一卷袈裟相菩薩譯曰袈裟者染衣也第二卷寶彌樓菩薩譯曰彌樓者光波羅延菩薩譯曰度彼弗波菩薩譯者曰星名也提舍菩薩譯曰言説耶舍菩薩譯曰名聞第五卷尼民陀羅菩薩譯曰地持三牟陀菩薩譯曰正喜阿疇那菩薩譯曰無減拘留孫提菩薩譯曰領持阿毗婆帝菩薩應云阿毗跋致譯曰不退十住斷結經第一卷彌姤路譯曰慈也婆須密經第一卷彌姤路力利譯曰慈力僧迦羅剎譯曰衆護阿逸彌勒應云阿時多彌勒譯曰無勝慈也第二卷阿羅彌勒譯曰勝慈第八卷颰陀和菩薩應云跋陀婆那譯曰賢林光讚經第一卷羅鄰那竭菩薩應云那鄰陀羅譯曰人王摩呵須菩和菩薩應云摩訶修菩提譯曰大好道也因坻達菩薩應云因提羅達多譯曰天王與也迦蘭應云迦蘭陀譯者曰國名也度無極經第二卷阿維三佛菩薩應云阿毗三佛陀譯曰大覺僧伽羅剎所集經第一卷陀羅尼菩薩譯曰時大通方廣滅罪莊嚴成佛經上卷梵網菩薩應云梵網賖譯曰淨分迦葉菩薩譯曰姓也釋摩男菩薩應云釋迦摩那婆譯曰釋迦者能摩那婆者年少淨行拘樓菩薩譯曰𡛠也波羈頭菩薩應云薄鷂兜譯曰薄者語也鷂兜者幢阿闍世經上卷闍耶末菩薩應云闍耶末底譯曰勝意文殊現寶藏經下卷伽羅呵達多菩薩譯曰受與持世經下卷須賴應云修羅譯曰天也須賴經那賴應云那羅譯曰人也喏那師利菩薩譯曰喏那者智師利者吉求佛本葉經曇昧摩提菩薩應云達摩摩底譯曰法意師利摩提菩薩皆應云摩底譯曰吉意俱那摩提菩薩應云求那摩底譯曰功德意也墮夜摩提菩薩譯曰慈意沙頭摩提菩薩應云娑頭摩底譯曰善意喏那摩提菩薩譯曰智意沙遮摩提菩薩應云薩遮摩底譯曰實意阿迦摩提菩薩應云呵迦摩摩底譯曰無欲意也沙羅摩提菩薩譯曰廣意薩恕摩提菩薩應云薩婆摩底譯曰一切意檀那師利譯曰施吉群那師利譯曰功德吉也羅鄰師利菩薩應云那鄰陀師利譯曰人王吉也兜沙經弗陀師利譯曰初吉涅羅師利譯曰大吉惟闍師利應云毗闍耶師利譯曰勝吉曇摩師利菩薩譯曰法吉三曼陀颰陀羅菩薩譯曰普賢曇摩迦菩薩應云曇摩迦耶譯曰法身十二因緣經遮利菩薩譯曰動也惟曰雜難經曇摩菩薩譯曰法也無極寶三昧經摩那提菩薩譯曰慢斷乾陀呵提菩薩應云乾陀利提譯曰香也阿彌陀經阿夷陀摩訶薩應云阿由陀摩呵薩譯由阿由陀者命與道樹三昧經三摩提鉢應云三摩提波﨟多譯曰三摩提者定波﨟多者至和休一經菩薩住地名第八鞞跋致譯曰退也大智論第一卷阿鞞跋致亦云阿惟越致譯曰不退鳩摩羅伽地亦云鳩摩羅浮譯曰童真第二十九卷庾迦遮羅浮迷經曰修行地也阿純難陀應云阿梨壽難陀譯曰直歡喜也帶哆浮彌譯曰過地彌勒本願待時成佛經檀陀浮彌譯曰猗地曇摩陀浮彌譯曰法與地也伽帝浮彌譯曰道地密帝浮彌譯曰友地般若浮彌譯曰智地毗舍羅彌譯曰廣地鉢帝三毗多浮彌譯曰至辨地也阿耨差婆浮彌譯曰墮忍地也阿波差浮彌應云阿博差浮彌譯曰無相違地三摩多博差摩博差浮彌譯曰等戒忍相違地闍帝叉𮪸浮應云闍帝叉夜譯曰生滅地也波偷三般菩薩法住譯曰大具足也兜沙經阿耆三般菩薩法住譯曰大具足也偷羅闍菩薩法住譯曰大王菩薩觀行名第九第一義悉檀相譯曰悉檀者熟云驗未大智論第一卷首楞嚴譯曰健相譯曰勇健兜沙經般若般三昧應云鉢剌舟般那譯曰現前定也第四卷檀波羅密應云檀那波羅密多論曰婆羅者彼岸密者到也譯曰檀那者施亦云捨尸羅論曰性善譯曰戒也羼提論曰忍辱毗梨耶論曰精進禪應云施那那可反譯曰思惟般若論曰慧也亦曰智慧陀羅尼亦云陀鄰尼論曰能持譯曰持也波羅末他論曰第一義也第四十八卷漚和拘舍羅應云漚波拘舍羅譯曰漚波者大拘舍羅者方便也第六十二卷羅摩伽三昧法門譯曰羅摩伽者遊戲也羅摩伽經第一卷漚和拘舍羅波羅密譯曰大方便究竟也兜沙經波俞迦三昧譯曰大也優婆夷底應云優波耶底譯曰方便性也阿𧽤波夷底應云阿致波耶底譯曰極方便也辟支佛名第十辟支佛譯曰辟支者緣覺亦曰獨覺大智論第二卷曇摩辟支佛譯曰曇摩者法賢愚經第十二卷修曇摩辟支佛譯曰好法迦羅辟支佛譯曰墨也法句經第二卷迦羅尸棄應云歌羅尸棄譯曰歌者時尸棄者火獨留長者財無付經比丘名第十一比丘論曰乞士亦云怖魔大智論第三卷僧亦云僧伽論曰僧伽者和合衆第一卷沙門應云沙聞那譯曰息心亦云聞説舍利弗譯者曰舍利者鳥名其母眼以舍利鳥弗者子也須菩提譯曰須者好菩提者道道亦云智也車匿應云闡陀亦云闡那譯曰應作亦云覆藏阿難譯曰歡喜摩訶俱絺羅亦云拘絺羅譯曰摩訶者大俱絺羅者勝提婆達亦云提婆達多亦云調達譯曰提婆者天達多者與俱迦離亦云瞿伽梨亦云瞿伽離譯曰云何時也阿泥盧豆亦云阿尼律陀亦云阿那律譯曰阿那律陀者無障第二卷摩訶迦葉亦云摩呵伽葉譯曰摩訶如上説迦葉者姓也憍梵波題亦云憍梵鉢提亦云伽梵波底譯曰伽梵者牛波底者主摩訶目伽連字劬律陀亦云揵連譯曰大姓論曰吾占師之子若拘律陀羅睺羅亦云羅睺羅亦云羅云譯曰羅睺者鄣月羅者除也阿若憍陳如亦云拘陳如亦云阿若拘鄰譯曰阿若憍陳如者無智也憂波利亦云憂波離亦云憂婆離譯曰憂者𬨟波利者護須鄰那迦蘭陀譯曰須者好鄰那者與迦蘭者村名也必陵伽婆蹉譯者曰必陵迦者兒名婆蹉者子也尸利崛多亦云尸𭯣多譯曰尸利者吉堀多者藏亦云護也第三卷富樓那亦云富樓那彌多羅尼子譯曰富樓那者滿彌多羅者慈女也劬提迦應云劬底迦譯曰巧語摩揵提譯曰求道蜫盧提迦應云蜫盧𤿺迦譯曰衆所宗敬婆耆子應云婆者寐亦云跋耆子譯曰教辭跋提譯曰賢也摩訶男亦云摩訶那磨摩可反譯曰大名施婆羅亦云尸婆羅譯曰薀藩阿夷陀亦云阿未多亦云阿夷哆都賀反譯曰無勝迦栴延尼子譯者曰迦栴延者姓尼者女也第四卷羼提比丘譯曰忍辱憂波毱比丘應云優波掘多亦云優婆毱提譯曰大護第十卷婆蹉弗姤路應云跋蹉弗多羅譯曰跋蹉者犢也弗多羅多子達二伽比丘亦云達尸迦亦云檀尼譯曰有物阿説示比丘應云阿鎖實譯曰馬勝摩陀羅應云摩訶陀羅譯曰大智提舍論師譯曰言説憂波提舍亦云優波帝寫論曰憂波者遂提舍者星譯曰近説羅頻珠比丘亦云羅毗譯曰感物致利養漚樓頻騾迦葉亦云優留毗亦云鬱鞞羅迦葉譯曰漚樓頻騾者木苽迦葉者姓婆蹉首羅譯曰婆蹉者犢亦云姓也首羅者勇閻婆阿羅漢亦云剡婆譯曰閻婆者禁制也第二十二卷薄拘羅比丘亦云婆鉤盧譯者曰樹名舊譯菩𭖦儀蘇摩亦云須摩譯曰月也羅婆那跋提應云羅呵反波那跋提譯曰羅婆那者醎跋提者賢也第二十三卷鴦群利摩羅亦云鴦掘摩譯曰指鬘華也第二十四卷呪利般陀伽亦云周林般時亦云拘利般特譯曰呪利者小般陀伽者路孫陀羅難陀譯曰孫陀羅者可愛亦好也難陀者歡喜須那剎多羅亦云須那剎多譯曰須者好那剎者多羅者星名也耶舍亦云耶世羈譯曰名聞隸跋多譯曰金也菴跋吒亦云奄跋私吒譯曰愛敬母也第二十五卷賓徒羅叵羅埵亦云賓頭盧頗羅墮譯曰賓徒羅者乞食叵羅埵者姓也第二十六卷摩頭波斯吒譯曰摩頭者密波斯吒者殘亦勝也鬱多羅比丘亦云鬱多樓譯曰鬱多羅者比亦云勝亦云喜第二十七卷須蔓耳比丘譯曰好意亦云好慢第二十九卷須涅多羅亦云須泥多譯曰好眼第三十一卷憂陀耶譯曰出亦云起第三十三卷訶多釋子應云訶多釋迦亦云訶多譯曰訶多打亦云害亦云不勝釋迦者能也第三十四卷阿利吒比丘亦云阿梨瑟吒亦云阿栗吒譯曰阿梨瑟吒者無環樹也第九十三卷蘇陀夷譯曰共出第九十七卷尼他譯曰詳議究摩羅耆婆譯曰究摩羅者童耆婆者命亦云壽也第九十九卷離婆多亦云梨婆多亦云離越多譯者曰星名也華嚴第三十七卷須菩提譯曰好智亦云好道難陀亦云難徒譯曰歡喜金毗羅譯曰是孔非孔鉢建提應云鉢利私建提譯曰力也大涅槃經第十卷那羅延譯曰力也耆婆譯曰命也摩鈴羅道人譯曰甜也第二十一卷須跋陀羅亦云須跋陀羅摩呵羅亦云須跋譯曰須跋陀羅者好賢摩訶羅者老也第二十三卷耶奢富那譯曰耶奢者名聞留那者滿也毗摩羅闍譯曰無垢須婆睺譯曰好肩那提迦葉譯者曰因江名也伽耶迦葉譯者曰因國名也波羅留枝譯曰婆羅者勝留枝者樂午教反第三十一卷曇摩留枝比丘譯曰法樂午教反優婆摩那譯曰譬喻阿叔迦應云阿輸迦譯曰無憂第三十六卷差摩迦羅譯曰差摩者人迦羅者作憂波扇陀亦云憂彼扇多譯曰大寂蘇坻應云收樓底多履反譯曰聞也葉婆密多譯曰棄婆者密密多者智識優多羅譯曰勝也增一阿含第一卷摩呵提婆譯曰大天目伽譯曰青豆羅吒婆羅應云羅吒波羅譯曰羅吒者國婆羅者勝賓頭盧譯曰乞亦云洛難提亦云難提伽譯曰歡喜施羅譯曰石山浮彌譯曰地也婆嗟譯曰子也陀素譯曰苦也那提應云那提訶譯曰疑也婆迦利應云跋迦利譯曰樹皮婆陀譯曰言説斯尼譯曰畢也難陀迦應云難陀譯曰歡喜優婆先蘭陀應云優婆先婆羅譯曰大歡喜也婆陀先應云跋陀斯那譯曰賢軍優頭槃應云優頭波那譯曰井林拘摩羅迦葉譯曰拘摩羅者童也婆提婆羅應云跋陀波羅譯曰賢護鴦迦闍譯曰體生迦特利應云迦陀利譯曰甘𧂒輸提應云輸弟譯曰淨除亦云校定僧迦摩譯曰橋梁質多舍利弗譯曰質多者心舍利弗如上説那羅陀譯曰火與毗盧遮應云毗盧遮那譯曰種種光明耆利摩難應云耆利摩那譯曰耆利者山摩那者慢曇彌應云彌施譯曰頑鈍比丘陀婆遮應云利那婆遮譯曰愛語陀摩譯曰寂靜須羅陀應云須賴陀譯曰善得那伽波羅譯曰龍守婆私吒譯曰最勝須夜奢譯曰好名聞也𭥇奚應云彌軻譯曰浮雲尼拘留應云尼拘盧他亦云尼拘樓陀譯曰不瞋乾荼譯曰前也第十一卷摩呵迹那應云摩呵彌陀譯曰大瞋第十三卷婆竭應云婆伽羅譯曰海也第十九卷瞿波離亦云拘波離亦云瞿波利譯曰守牛第三十一卷末佉梨應云末伽佉利亦云拔佉梨譯者曰姓荗羅譯者曰星名也破群亦云破群那亦云頗求那譯者曰星名也帝舍應云底舍譯曰光明牟利破若羊菟應云牟羅破群那譯曰牟羅者根破群那者星名也中阿含第五卷瞿尼師應云求膩師譯曰覓甚第六卷阿攝應云阿攝哆譯曰不誓第八卷拘隸譯曰種姓維摩羅應云毗摩羅譯曰毗者無也摩羅者垢邠耨應云邠君而嫁反譯曰福德邠耨加菟裊應云分他伽那譯曰邠耨者福德伽那者厚也彌醯若應云摩醯陀羅譯曰大天主也第十卷質多羅譯曰種種第二十卷烏陀夷應云優陀夷譯曰出也第二十九卷弗加羅娑利譯曰不加羅者蓮華婆梨者實也三彌提應云三彌底譯曰一切婦也第四十三卷盧夷強耆應云盧熙多彌伽譯曰盧熙多者赤強伽者河名也蹇荼譯曰斤也長阿含第一卷阿毗浮浮漏反譯曰無勝三婆婆應云三頗婆譯曰相應亦云生也扶遊應云婆遊譯曰風也鬱多摩譯曰最上毗盧應云毗樓婆譯曰可惡舒槃那應云輸槃那譯曰可愛闡弩譯曰覆也第四卷三密離提應云三美里底多履反譯曰常憶雜阿含第一卷陀娑譯曰苦亦去十第五卷差摩應云楚摩亦云仙摩譯曰安穩優波斯那亦云優波斯譯曰欲作第九卷闡陀譯曰欲作亦云霞也第十卷勒叉那譯曰護也第十七卷摩摩帝譯曰寺主迦摩譯曰愛欲第二十一卷那伽達多譯曰伽那者龍亦云山亦象達多者與梨犀達多應云梨師達多亦云利師達譯曰仙與摩訶迦應云摩河迦譯曰大身優波迦譯曰近身第二十二卷波羅楗茶譯曰守病弗迦羅娑梨譯曰弗迦羅者蓮華婆梨者實也跋提揵陀譯曰賢吉波休難提譯曰多喜波毗瘐菟應云波羅頗毗瘐譯曰大自在也安伽陀譯曰辟纓第二十五卷優波摩譯曰譬喻第二十八卷阿提目多應云阿提目多伽譯曰解脫亦云愛樂富鄰尼比丘譯曰滿安第三十四卷耶舍舍羅迦毗訶利譯曰名聞籌寺第三十六卷波耆舍亦云多耆奢譯曰自在語也瞿低迦譯曰守牛第四十七卷那提迦譯曰孔説跋迦梨譯曰樹皮那伽達多譯曰龍與第五十卷迦羅譯曰黑亦云時十誦律序第一卷摩訶盧亦云摩訶羅譯曰老也亦云無智摩訶迦羅譯曰大黑須提那譯曰好與亦云善與迦蘭陀子譯曰迦蘭者美陀者與也迦樓陀夷亦云迦留陀夷譯曰迦樓者時陀夷者起耶舍陀迦羅提譯曰耶舍陀者名聞典也迦蘭提者如上説三菩伽譯曰共供僧伽陀譯曰遍娑伽陀亦云娑竭陀亦云沙伽多譯曰娑伽陀者善來跋難陀亦云婆難陀譯曰賢喜沙羅譯曰屋宇級闍蘇彌羅譯曰汲闍者曲頸蘇彌羅者月明修磨那譯曰修者好也磨那者槾薩波伽羅譯曰薩波者蛇伽羅者頸沙羅耶輸陀譯曰沙羅者屋耶輸陀者名聞與也波利譯曰護也第三卷達尼吒亦云檀尼吒譯者曰星名也初誦第一卷輸毗陀譯曰可愛第二卷陀驃力士子譯曰陀驃者茅草也第四卷阿蘭兒應云阿蘭若譯曰寂靜處也彌多羅譯曰知識浮磨譯曰地也尸利譯曰吉也達摩譯曰法也第二誦第二卷毗訶比丘達摩提那亦云曇摩提那譯曰達摩者法提那者與般特應云般特他迦譯曰路第五卷阿耆達應云阿耆達多譯曰火也第二誦第一卷偷蘭難陀應云悉偷蘭難陀譯曰大善第四卷摩摩可反伽譯者曰星名也七法第一卷比喜陀譯曰覆第七卷意師多應云伊師多亦云一吒譯曰愛樂第八卷分坻梨師達多譯曰加坻者淨梨師達多者仙與入法第二卷般荼盧伽應云般壽盧伽譯者曰失色病第三卷迦扶陀比丘應云迦補陀譯曰鳥鳩雜誦第一卷摩伽梨俱應云末伽梨俱譯曰末伽者道梨具者覓第二卷珊闍耶毗羅荼應云珊闍耶毗蘭茶譯曰珊闍耶者勝也毗蘭荼者不作尼楗陀若提子譯曰尼揵陀者無繫若提者姓也迦求陀迦旃延譯曰迦求陀者領迦旃延者姓阿耆陀翅舍欽披羅譯曰阿耆陀者無勝翅舍欽披羅者榮髮旃陀譯曰月亦云勇蘇陀應云蘇盧陀譯曰聞也周那難提應云周羅難提譯曰小善那羅比丘譯曰萩也陀薩譯曰應與波羅譯曰護也彌多羅譯曰慈也律第一卷提舍利譯曰悔過優波提舍尼譯曰大悔提舍波那尼應云提舍波羅波陀譯曰提舍者悔過波羅波尼者今至提舍勒叉多尼譯曰提舍如上説勒叉多者護跋陀譯曰大亦云賢羅私吒譯曰國也波羅吒應云波羅剌私吒譯曰他國第二卷修闍多譯曰好生迦陀譯曰已作藍波那比丘譯曰垂也憂波離第一卷蘇陀譯曰白也善誦第一卷跋陀迦毗羅應云跋陀羅迦毗羅譯曰跋陀羅者賢迦毗羅者蒼第二卷蘇陀夷譯曰共出須尸摩譯曰好堺和修達亦云婆修達多譯曰寶與舍摩達多亦云奢摩達多譯曰靜與輸毗陀譯曰好智第四卷尸利耶婆譯曰吉行僧祇律第四卷跋處應云跋蹉譯曰犢也陀驃摩羅子應云陀﨟毗耶摩羅譯曰陀﨟毗耶者物摩羅者姓亦云力也摩醯沙達多應云摩醯鎖羅達多譯曰與大自在闥賴吒比丘應云陀﨟毗耶迦盧譯曰見也第十二卷陀驃迦盧譯曰陀﨟毗耶者物迦盧者黑第十三卷舍那譯曰樹皮第十四卷滿荼譯曰遲也第十六卷阿闍覩譯曰未生跋陀利譯曰賢也第十七卷阿浮娑譯曰長老第十九卷那夷翅譯曰軍主第二十卷瞻波比丘譯曰黃華第二十六卷樹提陀娑譯曰樹提者火陀娑者者槃頭盧譯曰赤華第三十三卷頗頭洗那應云頗求洗那譯曰頗求者無實洗那者軍也土羅譯曰土羅者火修密哆譯曰善智識也弗沙婆陀羅譯曰星賢提那伽譯曰提者方也那迦者象耆波伽譯曰命行巨舍羅應云瞿賖羅譯曰牛屋摩訶那應云摩訶那陀譯曰大聲目哆譯曰脫也巨醯譯曰屋宇耆多譯曰歌戲陀娑婆羅應云陀娑婆羅譯曰十力賴吒波羅譯曰國護迦利比丘譯曰黑亦云時跋闍比丘應云跋闍羅譯曰跋闍羅者金剛四分律第一卷迦樓比丘譯曰作亦云姓勿力伽難提比丘譯曰蔗喜水婆摩羅應云達婆摩羅譯曰達婆者茅摩羅者華三聞達多應云三勿陀羅達多譯曰海與騫荼達婆譯曰騫荼陰亦云斤也達婆者茅迦留羅提舍亦云迦留羅鞞舍譯曰伽留羅者金翅鳥也鞞舍者説陀濕婆應云尸婆譯曰不安穩也富樓婆娑譯曰滿住婆利婆娑摩那埵應云波利婆娑摩那埵譯曰波利婆娑者別住摩那埵者六日法也般陀比丘應云般他譯曰路也那迦婆羅比丘譯曰那迦者龍波羅者護阿濕卑摩訶摩南應云阿濕卑摩訶那摩譯曰阿濕卑者不巧摩訶那摩者大名聞第二分第一卷刪若譯曰想也第十二卷跋陀羅譯曰賢也迦羅富羅譯曰迦那者金富羅者滿第三卷奄婆羅婆提譯曰奄婆羅者樹名婆提者薗摩夷應云摩耶譯曰摩耶者化第八卷摩醯那應云摩醯陀羅譯曰大天主也第十卷不那婆譯曰更雜第四分第一卷陀醯羅婆婆那應云陀訶羅憂波婆那譯曰陀訶羅者小年憂波婆那者後堂第五卷伽那子比丘譯曰厚也富蘭那譯曰滿也彌沙塞律第七卷地婆比丘譯曰駃行第八卷毗羅荼比丘譯曰勇持第十三卷伽伽比丘應云褐伽譯曰姓也第十四卷不蘭迦葉譯曰滿姓第十九卷般那比丘譯曰林也第二十八卷盧醯比丘應云盧醯哆譯者曰國名也阿酬比丘應云利酬譯曰質直第三十二卷栴荼修摩那應云栴陀羅修摩那譯曰栴陀羅者月修摩羅者好意拘舍彌比丘譯者曰國名也跋陀迦葉比丘譯曰賢姓第三十四卷陀婆迦葉比丘譯曰陀婆者十亦云苦迦葉者姓也三浮陀亦云傘復多譯曰已生沙蘭比丘應云娑羅譯曰白鶴不闍宋比丘應云不闍宋摩譯曰不闍者供養宋摩者月也修摩那亦云須摩那亦云須末那譯曰好意蘇那拘應云修那歌譯曰寂靜善見律毗婆沙第一卷悉伽苻應云悉伽婆譯曰聰利帝須應云帝沙譯曰光明耶須拘迦應云耶輸拘迦羅譯曰耶輸者名聞拘伽羅者云何時也耶斯那應云耶輸斯那譯曰名聞軍也薩婆迦譯曰一切屈闍應云合闍譯曰體也須毗多亦云輸毗多譯曰可愛耶須婆那譯曰名聞林也修摩菟波應云修摩那婆譯曰善人亦云善淨行婆婆伽眉應云薄薄伽眉譯曰薄者語也薄伽眉者辨辭和伽婆應云婆伽槃譯曰有功德也栴陀跋闍應云栴陀羅跋闍羅譯曰栴陀羅者月也跋闍羅者金剛婆留那譯曰蛟也因陀堀應云因陀羅堀多譯曰天主護也僧伽密多譯曰衆親友也末闍提應云末旃持譯曰莫瞋第二卷阿由波羅譯曰阿由者命波羅者力曇摩波羅應云曇無波離譯曰法護拘多子帝須應云拘多子帝沙譯曰拘多者城帝沙者光曇無德比丘亦云達摩多羅亦云曇摩多羅譯曰法度亦云法濟帝須達多亦云帝沙達多譯曰光與伽羅須末那譯曰伽羅者𩒐須末那者好意地伽那譯曰不長迦羅須末那譯曰迦羅者黑須末那如上説帝須應云帝沙譯曰光明提婆專那伽應云周那伽譯曰碎也優波帝須應云優波帝沙譯曰大光阿婆耶譯曰無時私婆應云尸婆譯曰安穩勒棄多譯曰守護末禾摩應云末荼磨譯曰中遍須那迦鬱多羅譯曰須那迦者淨鬱多羅者勝參婆樓拔陀應云三婆羅跋陀譯曰三婆羅者或跋陀者縛鈍毗帝須應云豆毗帝沙譯曰不可説也薩婆難陀譯曰一切歡喜第三卷末多婆耶譯曰縱逸時也第四卷毗伽修摩那應云毗伽哆修摩那譯曰不妙意也那伽譯曰龍也第五卷那耆多應云那揵陀譯曰龍也𭥇耆耶亦云彌祗迦譯曰雨雲優伽婆應云優伽羅婆譯曰勇猛力也須那呵多譯曰須者好也那呵多者不害富寫提婆譯曰星天第七卷波摩阿頭摩應云波摩阿譯曰波摩者惡阿頭婁摩者非樹摩呵須摩譯曰大月婆菟迦車迦應云婆帝葛車𤿺譯曰婆帝者重也葛車𤿺者龜第八卷頭摩譯曰煙也摩呵波頭摩婆譯曰大蓮華勒佉菟應云勒佉呵莬譯曰勒佉者狐呵莬者香名阿羅毗迦譯曰小語孱那應云檀那譯曰實亦云物無迦利應云物伽也譯曰姓也騫陀毗耶譯曰香也陀達多譯曰與也迦留提舍譯曰時説須闍多賢愚經曰善生譯曰姓生第十八卷娑婆伽比丘譯曰聞也浮陀跋摩譯曰浮陀者實跋摩者鎧阿毗曇婆沙第一卷和須密譯曰婆須者好密多羅者知識瞿沙譯曰聲名毗婆闍婆提譯曰分別説也育多婆提譯曰相應説也佛陀提婆譯曰佛陀者覺亦云知也提婆者天雲摩掘部應云曇摩堀多譯曰曇摩者法掘多者説波奢譯曰繩也陀婆法師譯曰平澤曇摩難提譯曰法善摩多羅譯曰少許第七卷奢那婆藪應云奢那婆婆譯曰奢那者村亦云樹也婆者住處第十卷僧伽婆修亦云僧迦婆修譯曰僧伽者衆婆修者實亦云物也第十一卷婆檀陀譯曰大德第十五卷浮陀提婆譯曰非天第二十一卷波巴譯曰文也波羅婆闍應云波羅跋闍羅譯曰勝金剛也第二十五卷婆祗奢亦云婆耆舍譯曰語自在也聾摩奢應云盧摩奢譯曰多毛第二十六卷恆耆迦譯者曰生恆水婆奢譯曰自在摩勒迦子應云摩勘也譯曰賣華鬘也第二十八卷摩那答陀應云摩那部立哆譯曰摩那者意部立哆者飽瞿沙跋摩譯曰瞿沙者聲跋摩者鎧瞿醯迦譯曰住石窟也摩頭婆肆吒譯曰摩頭者密婆肆吒者最勝第五十四卷瞻婆比丘譯者曰國名也第五十五卷僧伽稀婆譯曰衆天八揵度第一卷醯兜摩納應云醯兜摩耶婆譯曰醯兜者因摩那婆者人亦云沙淨行第十七卷摩訶般咃迦譯曰大路跋婆芩應云跋伽婆耆譯曰跋伽者衆婆耆者語鞞婆沙第一卷舍那婆應云舍那婆娑譯曰舍那者樹名婆娑者住處婆奢譯曰自在婆耶譯曰有時第二卷陀羅難提譯曰特歡喜也第六卷跋𮜌應云跋荼譯曰大也第七卷跋修羅應云跋荼守羅譯曰大勇耆尸婆羅應云耆梨尸婆羅譯曰耆梨者山尸婆羅者蘊藻第十四卷優鉢尸婆羅應云優鉢尸婆羅譯曰優鉢者大尸婆羅如上説遮羅應云遮羅𧸐譯曰動也優婆遮羅利應云優婆遮羅𧸐譯曰大動和秀槃頭譯曰和秀者寶槃頭者親友雜阿毗曇心第一卷曇摩世利應云曇摩尸利譯曰法吉出曜經第二卷僧迦羅剎應云僧伽勒叉譯曰僧伽者衆勒叉者護第五卷佛提譯曰意也第九卷拘苫鞞譯者曰國名也第十一卷摩訶僧祇譯曰大衆第十四卷羅婆那拔提譯曰羅婆那者聲拔提者賢迦比羅譯曰蒼色羼提婆羅譯曰忍力賢愚經第一卷曇摩苾提應云曇摩跋提經曰法增第四卷鏝慈毗梨應云鏝陀毗梨耶譯曰遲緩精進檀若世質應云檀那修旨譯曰淨施尸羅世質應云尸羅修旨譯曰淨戒尸羅跋提應云尸羅跋陀羅經曰戒賢第五卷阿利耶密羅應云阿利耶密多羅經曰聖友第八卷摩呵闍迦檀應云摩訶檀那經曰大施摩訶夜移譯曰大行第九卷阿亹賊奇經曰無惱譯曰無瞋惱也第十一卷師質應云首多譯曰淨也第十二卷摩頭羅瑟質應云首旨經曰蜜勝檀彌離比丘譯曰樂法尸利躓譯曰吉意第十三卷婆世躓譯曰自在毱提譯曰護也阿巴毱提譯曰阿婆者無掘多如上説難陀毱提應云難陀掘多譯曰歡喜護也摩訶劫賓那譯曰大分別時華首經第一卷邠耨文陀尼子應云富提那漫荼尼譯曰富樓那者滿縵陀尼者嚴飾女也正法花經第一卷劫賓菟應云劫賓那譯曰分別時也優陀夷譯曰起也法花經第四卷罽賓沙門譯者曰國名也婆須密經第一卷僧伽跋橙應云僧伽跋陀羅譯曰衆賢跋難陀楴婆應云優波難陀提婆譯曰大喜天也僧伽多羅應云僧伽多羅哆譯曰衆度跋次子譯曰犢亦云姓第三卷婆那伽婆蹉應云波羅那伽婆蹉譯曰勝龍子也婆羅墮闍譯者曰姓跋陀沙梨譯曰賢護弗迦羅婆利應云弗迦羅婆底譯曰弗迦羅者蓮華婆底者有摩樓子應云摩樓伽譯者曰文名也第六卷尼犍荼譯曰無繫不那沙門譯曰滿也楗那目楗連應云割那目麒麟譯曰割那者耳目揵連者姓優波夷謨譯曰方便第九卷拔蘇盧譯曰相念第十卷因陀摩羅應云因陀羅摩羅譯曰天主垢也毗舒佉譯者曰里名也因陀摩那應云因陀羅摩那譯曰伏天主也修羅斯梨譯曰勇體百句譬喻經第六卷樓醯那沙門經曰光耀祝那沙門譯曰祝那者碎摩訶律頭應云摩訶律他譯曰大威德也瞿弘離比丘應云瞿婆離譯曰牛守披提披應云波提波譯曰燈亦云光賢劫經第一卷迦遮延譯者曰姓羼提和應云羼提婆譯曰有忍耨也第三卷摩訶金毗羅譯曰大是孔非孔也念佛三昧經第一卷剌奈婆羅應云剌那婆羅譯曰寶力輸盧那譯曰聞也陀樹比丘應云達婆譯曰茅也報恩經第四卷般特比丘應云般他歌譯曰路也僧伽羅剎比丘譯曰衆護僧伽羅剎所集經一卷難提亦云難時譯曰歡喜第二卷鴦崛𩬺應云鴦拘舍譯曰正拘第三卷披修披陀羅應云婆修陀羅譯曰寶賢披修達多應云婆修達多譯曰寶與颰陀和梨亦云颰陀羅婆梨譯曰賢護生經第三卷求那毗比丘應云求那毗羅譯曰求那者功德毗羅者勇也為黃門園老婆羅門説學經第五卷須漫羅漢應云須曼那譯曰好意披耆經曰辨辭弘道廣經第四卷舍那婆斯譯者曰舍那者樹名婆斯者住處禪經修行方便道上卷難提和經曰歡豫善權經下卷曇摩迦留比丘譯曰法時無量清淨平等覺經上卷那羅耶比丘譯曰人行阿闍世王經上卷三般師應云三般那譯曰具足遺教三昧經上卷阿拔沙門應云阿拔陀譯曰無罪下卷阿練兒應云阿蘭若譯曰寂靜夜那譯曰垂也現在佛名經第一卷刎耨叉陀亦云分那叉陀譯曰分那者滿也叉陀嚴飾比丘言志經迦毗譯曰文障摩離亦云末羅譯曰力也沙竭比丘亦云娑伽羅譯曰海也比丘功德經鬱俾迦葉譯曰大智佛本行經那羅延比丘譯曰力也菩薩藏經塞陀達多比丘譯曰片與迦樓羅提舍應云伽樓羅提舍譯曰伽樓羅者金翅鳥也提舍者説和難應云優婆難陀譯曰大喜闍焰比丘應云闍那譯曰勝也文殊師利問菩薩者經三跋諟師利比丘應三鉢提師利譯曰具足去也摩師利比丘應云摩訶師利譯曰大吉須師利比丘應云修師利譯曰好吉坻羅末應云底羅那末底譯曰度意私呵難比丘亦云私呵難陀譯曰私呵者師子難陀者歡喜摩呵陂那陀惟釰比丘譯曰摩呵波那陀者大聲惟釰者與也鉢摩迦譯曰蓮華菩薩受齋經拔智致應云拔多智譯曰起也阿彌陀經摩訶那彌譯曰大名須滿應云須摩那譯曰好意維末坻應云毗末帝譯曰疑也亦云種種意迦為拔柢應云迦毗羅拔兜譯者曰國名也那履迦葉譯者曰柑名也那翼迦葉應云伽翼譯者曰國名也摩訶㸸私譯曰大茅摩訶梵提應云摩訶梵摩提婆譯曰大淨天也陀沙比丘譯曰苦也差摩比丘喻重病經栴遮比丘譯曰動也野雞經摩訶洹迦鄰大比丘應云摩訶𮌮那迦鄰陀譯曰大林時王般舟三昧經佛陀密多應云佛陀密多羅譯曰覺友五門禪經摩羅鳩摩羅譯曰摩羅者華鬘鳩摩羅者童箭喻經須提難譯曰好喜優波離問佛經曇摩羅叉譯曰法護掘多譯曰護也商人子經摩訶揵陀衛羅譯曰摩訶揵陀者摩訶揵陀惟衛羅大香惟衛羅者雙也晝信比丘等度經僧迦耶舍應云僧伽耶舍譯曰衆名聞也雜經跋陀羅由陀譯曰賢命叉摩比丘譯曰忍也宿闍諦譯曰好生孫陀槃梨譯曰孫陀者好槃梨者根那羅譯曰人也阿耆毗譯曰阿耆者大毗者樂也阿梵和利應云阿梵摩波利譯曰不淨護也長壽王經波耶羅比丘譯曰大德佛神力救長者子經那伽婆羅譯曰龍婆羅門解知衆術經阿若都盧應云阿若都羅譯曰無親稱也法海經勒叉那譯曰護也不懷法經迦葉道人譯曰姓成實論第三卷摩醯舍婆譯曰大聞破群那比丘譯者曰星名也蘇那剎多譯曰姓星第十卷佛陀多羅譯曰佛陀者覺多羅者濟亦云度也歷國傳一卷曇摩沙應云達摩耶舍譯曰法名聞也佛陀柳支譯曰覺乘曇摩練兒譯曰法都呵利難陀羅漢譯曰呵利者師子難陀者歡喜曇摩末底道人傳曰法意第三卷本云延應二年三月二十九日於菩提寺書寫了道成同五月六日於醍醐寺地藏院校合了深圓寬保元年辛酉八月二十二日於觀智院東窗以醍醐寺地藏院之舊本遂讐校了是佛法繁昌為所願圓滿耳僧正賢賀俗齒五十八
