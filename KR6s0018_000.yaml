body:
  text: 翻梵語今此書也全部十卷飛鳥寺信行之撰集世所希也一日余登醍醐山於光臺院客亭悉曇字記三教指歸行狀記等講述之日儻閲此書深賢師之持本久收箱底蠧魚甚投携歸遂返璧之次借覽遊佛國行漢土之思偏難默止因茲令宮野常新即應謄寫功了敢正本文字不分明之趣得而可知耳況又傳寫之本虎變為狗之類亦難免後昆便覽之時得其意以披見可哉知不許他出勿忽勿忽寬保元醉年八月既望東寺定額僧第二席勸修寺淨土院席僧正賢賀俗齒五十八法﨟四十九
