  - {type: variant, offset: 5705, length: 112, content: '深賢

      延應二年二月十五日

      於醍醐寺地藏院書寫本之字不分明多多在之只如本寫之得其意可披覽也　　　　　　　　　　　道成

      同四月十日

      於同院之南面令校合了　深圓

      右全部十卷以地藏院深賢師傳飯之本遂書功校讐令收納觀智院經藏了

      寬保元辛酉年八月二十八日　僧正賢賀

      俗齒五十八', 甲: 天明七丁未十月二十三日以如來藏本寫更以延應二年二月十五日醍醐寺地藏院本校合皆文字不明只如本紙寫耳後來訂證以到三會曉是小子誓願還禮黃壤朽骨云爾台嶺遍照金剛實靈}
