body:
  text: 山名第五十一河名第五十二江名第五十三池名第五十四洲名第五十五地名第五十六水名第五十七火名第五十八風名第五十九薗名第六十林名第六十一樹名第六十二山名第五十一須彌山應云須彌樓譯曰須名好也彌樓者光大智論第一卷摩犁山譯曰無垢耆闍堀山應云耆闍崛多譯曰耆闍者鷲堀者頭譯曰耆闍鷲崛多者頭第三卷鞞婆羅應云毗婆羅譯曰少力跋恕應云嗟譯曰犢亦云姓薩多邠那應云薩多般羅那譯曰七葉求呵譯曰穴也因陀譯曰天王世羅求呵譯曰世羅者山求呵者穴薩𤿺譯曰犯也鉢波羅譯曰節也由揵陀羅山亦云由乾地譯曰由楗者雙地羅者持罽賓隸跋陀應云罽賓羅跋陀羅譯曰罽賓羅者蒼跋地羅者鞞浮羅大山譯曰大也第二十八卷斫迦羅山譯曰輪也華嚴經第一卷軻犁羅山應云軻地羅譯曰軻者穴地羅者破第二十二卷尼民陀羅山譯曰尼民者地羅者持牟真鄰陀亦云目真鄰陀譯曰脫也第二十四卷鬱提尸山譯曰日初出處摩訶目真鄰陀山譯曰大脫第二十八卷毗富羅山譯曰大也大槃涅槃經第十八卷優陀延山譯曰日出處也第二十四卷摩羅耶山亦云摩羅延譯曰魔羅者垢耶者除也第二十九卷漫陀山譯曰護亦云買頞多山譯曰行也第三十卷尸牧摩羅山譯曰殺子增一阿含第三卷波沙山亦云波沙那譯曰繩也第十三卷摩師山譯曰黑也第十四卷伊沙山譯曰自在第二十三卷毗那耶山譯曰他也優闍伽羅山譯曰覺也般荼婆山譯曰日亦云姓婆羅羅應云婆羅剌也譯曰願得中阿含第八卷毗陀山譯曰智也長阿含第十卷伽伽羅譯曰膠者第十八卷伊沙陀羅譯曰自在持也鬱禪山譯曰大勝尸鄰陀羅譯曰無大第二十一卷比尸陀山譯曰化也鬱提陀羅譯曰大持第二十二卷設首婆羅應云尸首波羅譯曰童護雜阿含第五卷摩拘羅譯曰喧閙毗那多迦譯曰揵與第十六卷優留曼荼譯曰優留大曼茶者提湖亦云實也第二十三卷楗陀摩陀摩羅譯曰香花明迦譯曰曲也亦云國名宿波羅首譯曰斧也毗婆羅譯曰無力那伽山譯曰宗也第四十五卷鞮提醯譯曰種種體也亦云四惟第五十卷摩俱羅山譯曰天冠十誦律第三誦第三卷頻闍山應云頻他譯曰射酌七法第六卷薩婆婆羅頗羅山譯曰薩波者一切婆羅者苦小薩鉢那求呵山譯曰薩鉢那者怨求呵者窟薩波燒持迦波披山應云薩婆燒治迦波彼譯曰薩婆者一切燒治迦者洋波柀者惡薩多般那舊呵山譯曰薩多者七般那者葉舊呵者窟迦尸黑山譯曰迦尸者光僧祇律第七卷枝提山譯曰聚亦云國第三十卷摩羅山譯曰行次亦云花鬘第三十二卷枳羅蘇應云枳羅婆譯曰白也第三十四卷呵梨陀山譯曰黃也四分律第二分第九卷摩頭鳩羅山譯曰摩頭者密鳩羅者種姓第十一卷拘留歡喜山譯曰拘留者作亦云姓也第二分第三卷乙師羅山應云伊沙陀羅譯曰小叉彌沙塞律第二卷槾求羅山譯曰尾也第六卷首摩羅山應云修摩羅譯曰修者好也摩羅者行次第十四卷伽耶山譯曰國名第二十卷波樓山譯曰強也第二十卷阿呼山譯曰日也第三十四卷先底般波羅山應云那帝波膩波羅譯曰那帝者家波膩者水波羅者護善見律毗沙第一卷阿休何山譯曰嚮也第二卷肩沙迦山應云蜜舍羅歌譯曰雜也車多迦山譯曰覆也支帝耶山譯曰聚也第三卷支提耶山譯曰覺也提婆鳩吒山譯曰天臺修婆鳩吒山應云首婆叉吒譯曰姓臺迦羅毗㸸山譯曰姓聲須陀蘇那譯曰白水阿沙干那應云阿鎖歌蘭那譯曰馬耳伊私耆梨山應云梨師耆利譯曰仙山第八卷質多羅山譯曰種種第十五卷念蜜奢山譯曰㫬也大方等大集經第一卷利師山譯經曰仙也賢愚經第五卷彌樓山譯曰光也法華經第六卷摩訶彌樓山譯曰光也伊蒒羅山譯曰仙人住住處百句譬喻經第一卷耆梨譯曰山也摩得勒伽經第八卷阿那斯譯曰無食處也觀佛三昧經第八卷頞那山譯曰飯亦云母普耀經第七卷脾舒離應云毗舍離譯曰廣傳僧伽羅剎所集經第三卷柘梨山譯曰動也摩伽山譯者曰星名菩薩處胎經第一卷加闍山譯曰裊也佛所行讚第二卷毗提訶山譯曰日國名也般荼婆譯曰黃蔞色也過去現在因果經第三卷遮迦和山譯曰輪也純真陀羅經下卷因沙舊山經曰帝樹石室諸佛要集經上卷目鄰山應云因真鄰陀羅譯曰曉王下卷摩梨山譯曰摩梨者有花也諸賓頭法中毗婆羅山譯曰破也尊者瞿低迦獨一思惟經佉陀羅山譯曰帆也觀虛空藏菩薩經優留曼荼山譯曰優留者大曼荼者第一商人子經檀特山應云檀陀譯曰蔭也須太拏經佉羅底翅山譯曰青也虛空藏經阿遮樓山譯曰不動呪毒楗阿摩呵行山譯曰揵陀者香摩訶衍者大乘呪賊經醯摩山譯曰金也大神將軍呪經阿羅陀山譯曰無聲三小劫抄經阿沙波山譯曰無呪術也比那山應云比那哆譯曰不高那陀利傳曰人各山也外國傳第一卷扶羅尸利傳曰裏頭山也第三卷尸梨漫陀傳曰王夫人也第四卷干吒尸羅傳曰巖石山也不婆尸羅傳曰東石山也阿婆施羅傳曰西石山也阿鞞耆梨傳曰無鬼魏峨山也支多耆利傳曰老峨神山摩尼優利傳曰珠也呼漫山應云呼摩譯曰燃火乾婆伽山應云乾闥婆譯曰樂神歷國傳第一卷支多哥梨山譯曰功德聚山金毗羅山譯曰是孔非孔河名第五十二尼連禪河應云尼連禪那亦云熙連禪譯者曰尼不也連禪那者樂著大智論第一卷波叉河應云薄叉亦云博叉譯曰胸也第七卷私陀河應云私多亦云悉陀波羅曰冷恆河亦云恆河亦云恆迦亦云迦伽譯曰天堂來也第二十八卷藍牟那應云墦牟那亦搖無那譯曰縛也薩羅由譯曰駃流阿𭥲羅婆提亦云阿𭥲羅阿夷羅和帝譯曰遲流摩醯亦云應仚譯曰歸也恆伽提河應云恆伽提婆譯曰恆伽如上説提婆者天第十五卷阿夷羅跋提河應云阿夷羅婆底譯曰阿夷羅者迅流婆底者有大般涅槃經第一卷閻摩羅譯曰雙也薩羅亦云婆羅譯曰婆羅者實摩訶譯曰婆亦云勝辛頭譯曰驗也娑婆耶應云娑羅婆阿耶譯曰娑羅婆有聞阿耶者行第十卷伊㮴末提河譯曰伊㮴者甘蔗末提醉第二十七卷毗婆舍耶河譯曰無渴難陀頂譯曰歡喜增一阿含第十五卷蘇摩譯曰月也中阿含第二卷舍勞浮譯曰箭地鬱鞞羅尼建然亦云鬱鞞羅尼建禪譯曰大時不愛鬱禪那海譯曰大勝長阿含第十八卷波羅阿譯曰勝也第二十一卷薩窂譯曰湖也雜阿含第二卷多吒迦應云鉢臘吒迦譯曰至也第十六卷婆休多譯曰多也第四十四卷伽耶薩羅應云伽耶沙羅譯曰者伽耶者國名娑羅者樹名鬱鞞羅譯曰過時第四十九卷那婆佉多河譯曰那婆者新佉多者倔第五十卷跋求摩訶應云跋求摩底亦云婆求摩譯曰跋求者好聲摩底者有十誦律序第一卷迦拘伽河譯曰腫領波浮河譯曰自在初誦律第二卷阿耆羅婆婆河應云阿耆羅婆譯曰阿耆者火羅婆者聲善誦第二卷多浮應云多簸譯曰執也第四卷修羅吒譯曰修者好也羅吒者國四分律第三分第十二卷婆呵呵譯曰除也第四分第三卷婆輸河譯曰自在第六卷傍耆羅河譯曰曲也彌沙塞律第十九卷奢多頭𭙳奢多頭樓譯曰百川流也阿毗曇婆沙第二卷毗壽婆婆應云毗壽波摩譯曰毗壽者電也波摩者譬喻拔提河應云跋提羅譯曰賢也第五十六卷漚留河譯曰大也雙卷涅槃經第一卷斯那川譯曰軍也修行本起經沙陸河亦云婆樓譯曰實也海八德經瞻婆恆伽譯曰月瞻婆者花名瞻婆比丘經拔提摩醯譯曰賢火𮠷連然鉢底小河應云熙連若婆底譯曰有金歷國傳第三卷江名第五十三阿喻闍譯曰不相應也增一阿含第二十三卷阿寅囉波帝夜江應云阿夷羅婆底譯曰阿夷羅者𫘆流婆底者有善見律毗婆沙第七卷毗尼江應云毗尼多譯曰間靜第十二卷毗德多應云毗揄多譯曰無熱毗多羅子應云鞞多羅尼譯曰下流明𠍽譯曰竹也亦云種姓究仲婆譯曰惡水毗摩應云毗摩羅譯曰無垢那提譯曰江名拘尸那地譯曰芧江也賢愚經第四卷沙鹿江應云婆樓譯曰實垣水戒經阿夷江譯曰𫘆也池名第五十四阿那跋達多池譯曰無熱大智論第二卷尸漫陀耆尼池亦云漫陀緊尼譯者曰漫陀者花名繄尼者有也第八卷阿耨達池應云阿耨達多譯曰小與華嚴經第一卷摩陀池亦云摩陀延譯曰醉也增一阿含第二十二卷鉢頭摩池譯曰赤蓮花也長阿含第十八卷跋陀池譯曰大亦云賢第二十卷那鄰尼陀譯曰蓮荷須摩竭陀池應云須摩伽池譯曰聚會雜阿含第三十八卷揭伽池譯曰姓第四十五卷須摩那池譯曰須者姓也摩那者意十誦律初誦第六卷薩卑尼池譯曰有蛇龍也善誦第四卷阿練池應云阿練若譯曰不著彌沙塞律第二十九卷迦羅池譯曰時也善見律毗婆沙第四卷那利池譯曰漏刻三小劫抄經拘絺羅池譯曰勝也雜經洲名第五十五嫗闍洲應云鬱遮譯曰高也善見律毗婆沙第三卷婆羅洲譯曰勝也慢陀洲應云曼陀譯曰最勝拘羅衛渚譯曰堓那憐羅賓洲應云那憐陀羅賓茶譯曰那憐陀羅者人主賓荼者聚第四卷楞伽洲譯曰邑也歷國傳第四卷地名第五十六浮地譯曰地也大智論第四十二卷波羅提毗應云波羅梯毗譯曰地也華嚴經第四十八卷優鼻譯曰地也出曜經第八卷水名第五十七暗藍水譯曰藍者水大智論第三十八卷波尸藍水應云婆梨藍譯曰婆梨藍者水也阿摩勒水譯曰無垢大般涅槃經第十二卷尸婆羅水譯曰無勝鉢書羅水譯曰美也波尼譯曰水也鬱持應云憂池伽譯曰水也波利譯曰水也波耶譯曰水亦云乳娑摩尼手應云娑羅摩羅譯曰止息十誦律雜誦第三卷搖蒲那水應云夜牟那譯曰樹名僧祇律第四卷婆羅水譯曰勝也彌沙塞律第十九卷恆水應云恆伽譯曰天堂來也第二十五卷鹽牟那水譯曰傳也善見律毗婆沙第十二卷阿闍婆羅譯曰羊力過去現在因果經第四卷無提水譯曰歡喜瑞應本起經二卷火名第五十八因陀羅火譯曰主也華嚴經第四十八卷風名第五十九隨藍風應云毗藍婆亦云毗藍譯曰迅猛大智論第四卷憂陀那風譯曰自説第六卷僧伽譯曰泉也長阿含第二十一卷毗濕波譯曰不功雜阿含第十一卷憂陀羅譯曰大破興顯經目鄰大目鄰譯曰目鄰者脫阿耨風譯曰小也阿耨風經波栗屠那譯曰觸也幻士仁賢經薗名第六十嵐毗尼園亦云流彌尼譯曰斷亦云盡大智論第一卷劬師羅園譯曰劬者牛師羅者頭第三卷祇樹園應云氏哆亦云祇譯曰勝也華嚴經第四十七卷釋難陀園應云釋迦難陀譯曰釋迦者能難陀者喜第三十六卷安陀園譯曰薩也增一阿含第三卷迦蘭陀園譯曰好嚴第五卷暗婆婆利園譯曰麥𧂐第六卷薩盧園應云薩羅譯曰杉也第九卷瞿師羅園譯曰嚴也第十卷檀槃那園應云檀那槃那譯曰施林尼拘屢園應云尼物屢陀亦云尼物頭譯曰無節亦曰施廣第二十三卷毗羅若園譯曰不間靜也第二十四卷羅摩譯曰戲也中阿含第八卷多羅譯曰重也第十四卷波和利應云波婆利譯曰毛衣第五十五卷樓毗譯曰可愛長阿含第四卷跋陀利園譯曰長也雜阿含第五卷阿毗闍譯曰無種天第四十三卷俱毗羅園應云俱毗陀羅譯曰破惡僧祇律第一卷求羅園譯曰力亦云姓四分律第十四卷鬱鞞羅劫波園中譯曰大穴亦云大勇劫波分別時毗羅耶女園譯曰失時也彌沙塞律第三十四卷負伽園應云負履伽譯曰庶也善見律毗婆沙第三卷摩訶那伽園譯曰大龍庶也裊也第三卷波利耶園譯曰可歡摩伽園譯曰星名也彌伽園譯曰雲也波留沙迦園譯曰堅也第五卷難陀園譯曰歡喜第十一卷瞿私多園譯曰白牛第十三卷摩羅園譯曰花也第十四卷阿那邠阿藍應云阿那他賓茶池私耶阿羅譯曰阿那他者柧賓茶陀私耶者給阿羅者園出曜經第一之內槃荼園譯色也波須蜜經第一卷那陀園譯曰聲也僧伽羅剎所集經三卷難陀洹園應云難陀波那譯曰難陀者喜婆那者林拘薩園應云拘薩羅譯曰功也生經第四卷伽鄰竹園譯者曰鳥名也持人菩薩經上卷羅迦覽傳曰里樹也外薗經第三卷阿梨覽傳曰聖園林名第六十一摩呵槃應云摩呵槃那亦云摩訶婆那譯曰摩訶者大槃那者林大智論第三卷嵐鞞尼林亦云林毗譯曰盡亦云斷第二十六卷波羅林譯曰勝也舍摩梨應云腅婆利譯曰木綿第三十三卷迦毗羅波仙人林應云迦毗羅跋私臭譯曰迦毗羅者蒼跋私臭者住處漚樓頻螺樹林譯曰木苽第四十四卷須浮摩樹林應云須浮𭓺譯曰須者姓也浮𭓺者地也第三十八卷阿羅婆伽林應云阿羅婆分譯曰阿者不也羅婆分者諸第八十四卷祇洹林應云哆槃那亦云祇多槃那譯曰氏多者勝槃那者林華嚴經第三十七卷鬱曇鉢林亦云憂曇婆羅亦云優曇鉢譯曰優者起也曇婆羅者空大槃涅槃第十七卷安陀林譯曰蔭也中阿含第二卷彌薩羅林應云彌伽羅薩譯曰彌伽者雲薩羅者杉第十四卷波婆梨菴婆林應云婆波梨菴波羅譯曰波婆梨者衣菴波羅者果名也長阿含第十二卷毗羅林譯曰莮也第十八卷毗醯勒林譯曰不畏那羅林譯曰萩也雜阿含第四卷波意利弗多羅雞林應云波吒利多羅譯曰者波利者樹名弗多羅者子山多伽耆林應云多伽耆梨譯曰多伽者曲耆梨者山亦云頭第二十九卷安闍那林譯者曰花名也陀婆闍梨迦林應云陀婆闍梨介譯曰陀婆者子澤闍梨介者火訶梨勒林譯曰天主苻來十誦律三誦第一卷尸俱盧陀林譯曰無節亦云盍惟第五卷阿摩勒林亦云菴魔勒譯曰無垢七法第六卷尸利曼荼羅林譯曰尸利者吉曼茶羅者圓僧祇律第二十九卷那利林亦云那羅譯曰觀也四分律第四分第一卷婆利林譯曰百力第三卷尸陀林亦云勝舍婆亦云尸尸婆譯曰緊實俱尸那末羅王林譯曰俱尸那者茅城末羅者姓善見律毗婆沙第一卷阿林譯曰小也彌沙塞律第四卷耆婆林譯曰今也難陀林譯曰歡喜毗梨吒毗林譯曰森第四卷菴羅林譯曰樹名阿毗曇毗波沙第十一卷多摩沙林譯曰薩也第三十五卷迦蘭陀竹林譯曰迦蘭陀者好聲鳥也第四十六卷摩訶提婆庵羅林譯曰大天果也婆利迦菴羅林譯曰婆利迦者守之護也羅者如上説第五十六卷婆羅給林應云波羅舍譯曰他樂摩得勒伽經第四卷𭖚伽耆林譯曰曲頸戒相應經婆祇尸摩林應云跋祇尸收摩羅譯曰跋祇者聚尸收摩羅者殺子求欲經陀婆闍梨迦林譯曰陀婆者平譯闍梨燒也佛見牧牛者樂道經申怒林應云申怒波譯曰實也葉喻多少經薩羅梨林譯曰杉也不淨觀經檀特羅和林應云檀荼婆羅譯曰檀茶者罰婆羅者勝善王皇功德經𭛺多陀林應云陀林摩譯曰石留外國傳第一卷曇摩羅若傳曰法林第三卷樹名第六十二菩提樹譯曰菩薩者道亦云智也大智論第一卷尸利沙樹亦云師利沙譯曰尸利沙有須也多羅樹亦云哆羅譯曰重也珂利羅亦云珂地羅譯曰河者空地羅者破尸拘盧陀樹亦云尼拘律譯曰四惟亦云無節第四卷必鉢羅樹譯者曰以菩薩樹第十二卷舍摩利樹應云睒婆利譯曰木綿阿梨吒應云何梨瑟吒譯曰無環波隸質姤樹亦云波利質多羅譯曰波利者護質多羅者種種薩羅譯曰杉也第二十三卷閻浮檀樹應云閻浮那陀譯曰閻浮者樹多那陀者江也華嚴經第三十卷憂陀伽沙羅栴檀羅婆曰憂陀伽者上沙羅者實第四十九卷那剎羅樹應云諾剎多羅譯曰星也婆翅羅樹譯曰白鷺大涅槃經第九卷尸迦羅樹譯曰不黑亦云不時波羅奢樹譯曰赤花迦尼迦樹應云在割迦羅譯曰尼割者耳迦羅作阿菽迦樹應云阿輸迦譯曰無憂波吒羅樹譯曰重也盧脂那譯曰牛黃菴摩羅樹應云菴婆羅亦云菴羅譯曰酢果第二十六卷槾伽利譯曰耕地第二十七卷鬱曇鉢樹應云憂曇婆羅譯曰優者起也曇婆羅者空也第三十卷竭摩羅應云健地摩譯曰香花增一阿含第二十九卷末羅譯曰姓亦云力長阿含第三卷婆利菴應云波婆利菴婆羅譯曰婆梨者衣菴婆羅者如上説瞻婆譯曰金色花樹波波羅羅譯曰波波者羅羅者樂修摩耶譯曰好喜波師譯曰夏生伽耶譯者曰國名也跋陀薩羅樹應云跋陀羅婆羅云跋陀安羅譯曰跋羅者賢沙羅者實雜阿含第二卷婆利耶多羅拘毗陀羅樹譯曰婆梨耶多羅奢遊戲狗毗羅者地破第十九卷婆羅鞞沙譯曰大入十誦律七法第六卷師羅樹應云尸羅譯曰石也迦毗陀樹應云迦毗陀譯曰梨也僧祇律第三十三卷阿梨陀薑譯曰黃薑四分律第九卷健陀樹譯曰地持呵梨勒譯曰天主持來彌沙塞律第十二卷阿摩勒譯曰無垢鞞醯勒譯曰無畏伊羅樹譯曰香也第十九卷摩頭樹譯曰察也第三十一卷和伽婆應云跋伽婆譯者曰姓善見律毗波沙第一卷羅多譯曰勝馬也楗陀菴羅樹譯曰香果第三卷蔓陀羅律曰練樹第四卷摩訶沙利波樹譯曰摩訶梨者大稻婆者有也波那沙樹譯曰大果第十四卷目多羅譯曰勝也第十七卷婆羅醯譯曰雲也舍摩譯曰寂靜質多羅波吒梨樹譯曰質多羅者種種波吒梨者重花阿毗曇毗婆沙第七卷婆樹子羅譯曰勝也第十二卷盧醯尼藥等譯者曰似蓮花第十四卷婆陀羅樹譯曰大也第十七卷干闍那林譯曰金也第二十七卷薩遮若摩應云薩庭尼那摩譯曰薩遮者實亦云諦尸那摩者要期質多羅咃應云質多羅羅咃譯曰質多羅者種種羅咃者車頗富沙譯曰不好也語彌尸迦婆那譯曰雜林難陀那應云難陀婆那譯曰歡喜林也千闍那應云那闍羅譯曰好也鞞婆沙等二卷伽賓闍羅應云劫賓闍羅譯曰鳥鳩伊説多譯曰樂也那梨伽羅譯曰漏列屋也摩樓樹譯曰竪也出曜經第三卷薩盧好樹譯曰實也第九卷迦羅那樹譯曰作也華首經第五卷瞿羅樹譯曰園囿十住斷結第七卷矜己進反升軀樹譯曰鸜鵡婆須蜜經第三卷剎受利樹譯曰也百句譬喻經第一卷婆吒樹譯者曰似菩提樹第四卷著波洹樹應云循婆波那譯曰好樹度無極經第八卷殃伽陀譯曰體與觀佛三昧經第一卷波陀羅譯曰破也賢劫經第三卷尸舍和樹應云升舍波譯曰實樹羅摩子譯曰戲也婆師利花樹譯曰度生念佛三昧經第一卷陀伽梨花樹譯曰卷作迦曇波花樹譯曰白花第四卷伽鳩樹應云迦鳩𫘆譯曰領也僧伽羅剎所集經第二卷迦隨羅衛樹應云迦比羅跋臭譯者曰迦比羅者仙人名跋臭住處義足經下卷蘇維屠樹應云蘇薩禪尼譯曰好亭雙卷涅槃經第一卷坻彌羅樹譯曰細也阿閦傳經下卷阿涅波他樹應云阿舍波波陀譯曰阿舍婆者馬波者腳雜經藍芘樹譯曰垂也本云仁治二年暮春十日於醍醐寺地藏院東庇書寫了為興隆佛法也密家末學東寺沙門深賢
