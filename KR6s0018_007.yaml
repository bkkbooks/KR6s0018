body:
  text: 神名第三十二鬼名第三十三龍名第三十四𠌵名第三十五馬名第三十六雜狩名第三十七鳥名第三十八魚名第三十九蟲名第四十地獄名第四十一神名第三十二楗撻婆亦云乾沓婆亦云乾沓和譯曰嚊香亦云樂嶽神大智論第二卷㼼陀羅亦云緊那羅亦云真陀羅譯曰是人非人摩醯首羅譯曰大自在也論韋紐天論曰遍問鳩摩羅天論曰童子阿修羅亦云阿須倫亦云阿須羅譯曰阿者無亦云非修羅者酒亦云天也第三卷那羅延論曰力也第四卷童龍摩亦云乇㖮摩論曰樹也第十卷毗摩質多亦云鞞摩質帝隸亦云毗摩質多羅譯曰種種疑也婆梨論曰有力羅睺羅譯曰羅睺者鄣月羅者持也富那婆藪鬼譯曰富那者滿婆藪者寶亦云地亦云物鬱怛羅亦云鬱多羅譯曰勝亦云答阿羅婆迦鞞沙迦譯曰阿羅婆迦者不斬鞞沙迦者一切第二十五卷夫人舍脂亦云式脂譯曰淨也第五十六卷恆伽神譯曰天堂來也第七十五卷睒婆利王譯曰木綿華嚴經第一卷那羅達譯曰那羅者人達者與也大涅槃經第一卷陀羅婆譯曰陀那者施婆者有也跋提達多譯曰賢與建陀應云私建陀譯曰陰狂第十卷憂摩摩可反陀譯曰大狂阿婆魔羅譯曰阿婆者無魔羅者花鬘敦浮樓應云𫆁浮樹譯曰彈弦第十七卷樓陀天譯曰可畏第二十二卷摩尼跋陀譯曰摩尼者珠跋陀者賢第二十六卷富那跋陀譯曰富那者滿跋陀者賢毗留勒譯曰長張反增一阿含第一卷毗舍羅門王亦云毗沙門譯曰毗沙門者種種聞也拘毗羅譯曰非好身也第五卷毗沙亦云毗舍譯曰提栗哆賴吒第八卷提頭賴吒應云提栗哆賴吒譯曰提栗哆者治賴吒者國也第十三卷毗留波叉譯曰非好報也拘那羅譯者曰馬名也第三十卷婆羅羅應云婆羅賴他譯曰願得中阿含第八卷魔迦羅譯曰鯨魚舍羅神譯曰箭也長阿含第十二卷毗波密應云毗波蜜多羅譯曰無朋友也因陀羅譯曰主也波羅呵須倫應云波羅阿須淪譯曰極醒第二十卷睒摩須倫譯曰醒也羅呵須倫譯曰睒摩羅者縛也那闍樓譯曰不光檀陀羅譯曰癡也醯摩跋陀應云醯摩鉢婆多亦云醯魔波泜譯曰雪山修逸路摩應云修旨路摩譯曰針也漫陀神譯曰懶也鞞盧聞應云鞞盧那譯曰勝光雜阿含第三十一卷頭賴吒楗闥婆王應云時履多賴吒譯曰治國金鞞盧應云金鞞羅譯曰是孔非孔彌沙塞律第四卷鉢婆羅神譯曰鉢婆者節羅者除也十誦律七法第五卷阿毗釋迦山神譯曰極能第二十卷阿吒二叉神譯曰阿吒者行二叉者寬善見律毗婆沙第七卷卑帝梨應云卑底梨夜論曰祖父阿毗曇毗婆沙第七卷毗舍遮神譯曰顛狂婆樓尼神譯曰灑也奢羅破羅神譯曰八腳種也羅裳伽譯曰無昧阿婆達荼應云阿婆健荼譯曰無痛柭陀那神女譯曰長也伊吒地婆神譯曰念天摩頭達陀神譯曰摩頭者蜜達陀者與鬱多利譯曰勝也畢陵伽譯者曰父名也摩頭建陀神應云摩頭私建陀譯曰密聚羅睺阿修羅王譯曰羅睺者鄣月也阿修羅如上說第十六卷毗摩質多羅阿修羅王譯曰疑種種也大方等大集經第十九卷毗婁遮那阿修羅王譯曰種種光也颰陀惒等應云颰陀婆羅譯曰賢力瓔珞經第一卷佉羅騫大阿修羅王譯曰佉羅蹇大智惡陰法花經第一卷楗馱譯曰香也第七卷首羅那羅延神譯曰勇力百句譬喻經第三卷拘鉤羅譯曰曲也普耀經第七卷維睒文應云毗睒文譯曰消息闥婆摩羅應云達波摩羅譯曰達婆者勇摩羅者花報恩經第四卷摩舍阿摩舍譯曰人非人也菩薩處胎經第一卷婆呵阿修羅王譯曰婆呵者輩第五卷設陀鄰加醯神經曰攝聲生經第二卷散脂鬼神譯曰聚也金光明經第三卷摩尼拔陀譯曰珠賢阿羅婆帝譯曰不得賓頭盧伽應云賓頭盧頗譯曰賓頭者乞食盧頗者貪那羅羅闍譯曰那羅者人羅闍者王䢶那娑婆譯曰勝一功也摩尼乾陀譯曰珠香尼乾陀譯曰無繫摩尼迦吒譯曰摩訶者大迦吒者短半支羅應云般遮羅譯曰五能車鉢羅婆譯曰輕動婆那梨神譯曰雌孫睺也曇摩拔羅譯曰法力摩竭婆羅應云摩伽羅婆羅譯曰摩伽羅者魚名婆羅者力𫃲利蜜多應曰修利蜜多譯曰修利者曰蜜多者支勒那翅奢譯曰寶髮摩訶波那譯曰大飯軍陀遮譯曰白花草也劍摩舍帝譯曰劍摩者作舍帝者百奢羅蜜帝譯曰舍羅者屋蜜帝者支醯摩拔陀譯曰醯摩者金跋陀者賢茂脂譯曰脫也波呵利子譯曰打也佉羅塞陀應云佉羅私建陀譯曰弦體栴陀栴陀利譯曰栴陀者可畏亦云惡栴陀利者不姓女鳩羅鳩羅檀提譯曰鳩羅者親親亦云姓檀提者爵陀那婆神王譯曰有施大雲經第一卷那羅王譯曰人也大通方廣懺悔莊嚴經上卷烏蘇慢經曰𭼩神修行本起經第二卷羅婆奈神譯曰𠮧也摩訶摩耶經第一卷羅婆泥神譯曰鎌刈般遮翼亦云般遮尹佉譯曰般遮者五尸佉者賢佛本行經阿臘鬼神應云阿臘婆譯曰小誤佛陀仙陀樓哆神譯曰覺流聲也大愛道泥洹經鞞闍耶藪多婆神譯曰鞞闍耶者勝藪多者聞婆者有也婆羅那佛曇神譯曰婆羅那者𠌵佛曇者覺因臺羅神應云因提羅譯曰天主婆多耆利天神應云娑多耆利譯曰樂山天神榮寶經鳩摩羅神譯曰童子佛說出生無量門經毗牟樓應云毗牟樓多譯曰無山明星天子門慈經鬼名第三十三夜叉亦云閲叉譯曰能噉大智論第二卷羅剎譯曰可畏亦曰護也闍羅王譯曰縛也鳩槃荼亦云拘辨荼譯曰冬苽第三十卷浮陀亦云部陀亦云浮泰譯曰已生亦云大身修羅應云守羅譯曰勇論曰不毗舍闍亦云毗舍遮譯曰狂也第五十四卷富樓多那應云富多那譯曰臭也伽羅夜叉譯曰伽羅者屋伽羅富單那應云迦吒富單那亦云迦富單那譯曰極臭大涅槃經第十五卷薄拘羅鬼譯曰典也第三十一卷尸婆羅鬼譯曰蘊藻增一阿含第十七卷伽羅鬼譯曰吞食第三十三卷優伽婆鬼應云優伽羅譯曰威德闍尼沙鬼經曰勝結使也長阿含第五卷跋耆夜叉譯曰跋耆者聚夜叉如上說十誦律初誦第二卷摩竭陀夜叉譯曰摩竭陀者國名亦云星名夜叉尼譯曰夜叉者如上說尼者女也善見律毗婆沙第三卷那鄰羅夜叉譯曰那鄰羅者蓮華第四卷阿羅婆迦夜叉譯曰少語修至屚摩應云修至摩譯曰修至者針摩者毛軻羅譯曰強也竭吒富且那譯曰𭔰嗅阿毗曇婆沙第十六卷阿羅毗鬼譯者曰國名也出曜經第八卷軻陀羅鬼譯曰噉也賢愚經第七卷藍婆羅剎譯曰垂也法華經第七卷吉蔗應云吉栗蔗譯曰事也富多羅譯曰臭闌毗藍婆譯曰大垂阿羅譯曰大波烏摩勒伽譯曰大殺行也阿跋摩羅譯曰無鎧婆羅夜譯曰婆羅者力婆須蜜經第二卷阿鞞扇提應云阿毗産陀譯曰大漏般闍鬼譯曰五也普耀經第三卷摩羅陀利夜叉譯曰花持念佛三昧經第一卷羯摩波羅鬼應云羯摩沙波陀譯曰羯摩沙者默波陀者勝僧伽羅剎所集經第二卷修陀利舍那鬼王譯曰好見摩訶摩耶經上卷醯茂鉢低鬼應云醯摩鉢低譯曰金珠雜經跋提梨兄鬼譯曰長長兩反跋陀羅第鬼譯曰賢也跋阿羅迦譯曰賢也跋陀羅劫磨譯曰賢也鳩摩羅譯曰童也訶悉多迦應云可悉多迦譯曰不自婆羅那鬼譯曰𠌵也毗沙夜叉鬼譯曰毒也迦奈羅譯曰無眼波奈羅譯曰能飲憚盱迦應云單歌譯曰薄也磨頭譯曰美也呵利提耶譯曰呵利者天生提耶者可與呪賊經羅摩雖竭應云羅摩那乾陀那羅譯曰羅摩者戲那乾陀那羅者龍王麻油述經摩尼鉢羅應云摩尼波羅譯曰摩尼者珠波羅者護曇無知羅應云達摩波羅譯曰法護楗陀尸呵譯曰香勝拘魔和羅應云拘摩羅婆羅譯曰童子力也簸臘復多譯曰他生無量門破魔陀羅尼經那羅延婆邏譯曰那羅延者神力婆邏者力那隸同馱羅譯曰人王度陀利沙譯曰不見可也迦羅邏譯曰除黑修婆睺譯曰好肩呵利陀鬼子母應云可梨陀譯曰黃也歷國傳第一卷毗魔鬼譯曰可畏佛陀波羅夜叉鬼王譯曰覺護龍名第三十四摩睺羅伽亦云摩伏勒譯曰大𦙄行也大智論第二卷阿波羅龍王亦云阿波羅羅譯曰阿波羅羅者無流延也第三卷阿那婆達龍王亦云阿羅婆喻多譯曰阿那婆𭊨多者無熱第五卷姑利龍王應云已利𭓺譯曰巧行亦云次第第十卷阿伽羅龍王譯曰無頸跋難陀應云因陀羅般那譯曰陀羅者天主般那者林婆伽多龍王亦云婆伽達多譯曰功德第二十一卷難陀論曰喜也譯曰歡喜毗樓沙叉龍王應云毗博叉婆羅曰不好色根華嚴經卷第一伊羅鉢多羅亦云伊羅鉢譯曰伊羅者香鉢多羅者葉第二十五卷沙伽羅龍王譯曰海也婆難陀龍王亦云優婆難陀論曰大喜也譯曰大歡喜第三十二卷伊那般那應云因陀羅般那譯曰賢喜沙竭龍王亦云娑伽羅亦云娑竭譯曰海也第三十九卷阿耨達龍王應云阿耨達多譯曰阿耨者小達多者與阿舍曰無熱第四十二卷和修吉應云婆修竪譯曰婆修者寶竪者有也大般涅槃經第一卷般稠譯曰黃萎增一阿含第三十二卷賓伽羅譯曰黃赤娘佉龍應云商佉譯曰珂也伊那婆羅應云因陀羅婆羅譯曰天主力也長阿含第十九卷提頭賴吒譯曰治國阿蘆應云阿蘆歌譯曰明也伽毗羅應云鉗毗羅譯曰深也阿波羅譯曰不護伽譯曰厚也翟伽應云瞿伽㝹譯曰地厚瞿波利龍譯曰天護雜阿含第二十二卷菴婆羅提陀應云菴婆羅提婆譯曰菴婆羅者樹名提婆者天也十誦律三誦第四卷毗達多譯曰毗者勝也達多者與雜誦第五卷耆梨龍譯曰山也摩那斯龍王譯曰大意增一第四卷迦毗羅龍王應云迦比羅譯曰蒼也阿攝波羅龍王應云阿鎖婆羅譯曰馬力伊羅白龍象譯曰疾行僧祇律第四卷婆留尼譯曰也摩尼健大譯曰摩尼者珠健大者香四分律第三卷伽寧譯曰有伴第三分第六卷瞿曇冥應云瞿曇彌譯者曰姓伽毗羅涅波羅應云鉗毗羅濕羅波譯曰鉗毗羅者深濕羅波者巧伊羅拔那龍應云伊羅跋陀那譯曰行長雨反阿毗曇毗婆沙第一卷婆修迦龍應云婆修地譯曰寶持第五十六卷伊羅槃那龍王譯曰伊羅者香婆那者林八健度第一卷次婆羅龍王譯曰毛衣華首經第一卷輪陀羅龍王譯曰善持橋陀龍王應云橋哆磨譯者曰姓德叉迦龍王譯曰視毒孫陀羅龍王譯曰可愛亦云好也漚鉢羅龍王譯曰黛色花也法花經第一卷鬱多羅龍王譯曰勝也摩得伽經第一卷㮛梨咤龍王應云提梨師咤譯曰住山火也迦羅龍王譯曰黑色伊羅龍王譯曰香也散拘龍應云啇拘譯曰珂也文鄰龍王譯者曰山名也菩薩處胎經第五卷金毗羅王譯曰是孔非孔佛所行讚第四卷迦羅迦譯曰時亦云黑阿婆羅龍譯曰無力目真鄰王譯曰勝王金光明經第二卷陀毗羅王龍大雲經第一卷辛頭龍王譯者曰河名也博叉龍王譯者曰河名也私陀龍王譯者曰河名也鉢集龍王譯曰雲也毗舍羅龍譯曰光也半闍羅龍王譯曰龍也迦迦羅龍王譯曰大黑鬱伽羅龍王譯曰大黑修行本起經第一卷伊羅漫龍王譯曰有行文殊現寶藏經上卷難頭和難龍應云難陀婆那譯曰喜林般舟三昧經婆修龍譯曰寶也佛問四童子經瞿波梨龍譯曰地護阿育王於生大信教經菴婆羅提陀龍應云菴婆羅提婆譯曰菴婆羅者樹名提婆者天也優婆塞五戒相經蕓葉阿婆羅羅傳曰不成查也外國傳第二卷須那摩龍譯曰好意歷國傳第三卷𠌵名第三十五迦羅勒應云迦羅邏譯曰赤白共合增一阿含第二十卷鳩陀延應云鳩陀耶譯曰鳩者好亦云地地耶者起婆摩那譯曰𭔰也迦泥留應云迦泥羅譯曰小也優鉢應云優鉢羅譯曰黛蓮華也鉢頭摩譯曰赤蓮華也拘牟陀譯曰地越分陀利亦云奔陀利譯曰白蓮花也摩呵那極應云摩訶那者陀羅譯曰大𠌵王也那羅延譯曰力也滿呼經曰覺也第三十一卷那羅祗梨譯曰漏山迦梨譯曰雌𠌵中阿含第三十六卷加羅梨譯曰黑𠌵布薩陀譯曰增長功德雜阿含第三卷伊羅轅𠌵應云伊羅婆那譯曰主聲雜誦第一卷跋陀和𠌵應云跋陀羅譯曰跋陀羅者火亦云賢也醯摩和𠌵應云醯摩婆多譯曰醯摩者雪婆多者山伽尼羅𠌵論曰丸𠌵阿毗曇毗婆沙第十七卷阿羅勒迦𠌵譯曰勝也摩荼𠌵應云未哆譯曰未哆者醉第二十三卷伊羅鉢那𠌵應云伊羅多羅譯曰香葉檀那波羅𠌵譯曰檀那者物波羅者守亦云護也第四十六卷奔陀利大𠌵應云分陀利子喪含不離經馬名第三十六婆羅馬王譯曰力也華嚴經第一卷婆羅舍譯曰大樂五教反增一阿含第三十一卷婆羅訶譯曰破敵雜阿含第七卷婆羅醯馬王應言婆羅訶譯曰雲也亦云破軍十誦律善誦第四卷楗陀馬譯曰香也大方等大集經第十五之內揵陟應云健他歌譯曰納也過去現在因果經第一之內蹇特馬譯曰行也修行本起經第一之內雜狩名第三十七渴伽狩譯曰屏也阿毗曇毗婆沙第四卷毗舍遮譯曰狂顛緊那羅譯曰是人非人𮜌迦羅毗師子經曰竪誓賢愚經第十二之內劫賓老羅譯口蒼也優婆塞戒經第二之內仚薜師子王應云𭕤波譯曰躑也集三乘第三之內須檀延譯曰共起須大拏經鳥名第三十八迦陵毗伽鳥應云歌羅頻伽亦云迦蘭伽譯曰迦陵者好毗伽者聲大智論第四卷迦頻闍羅鳥譯曰鳥鳩第十二卷迦樓羅王譯曰金翅華嚴經第四十卷拘真羅應云拘枳羅譯曰好聲第四十二卷迦毗伽鳥應云迦毗伽羅譯曰迦毗者聲伽羅者好楗闥婆譯曰嗅香亦云樂神大般涅槃經第一之內迦蘭陀譯曰迦蘭者好陀者與也翅羅應云𤘽翅羅譯者曰從聲為名耆婆耆婆譯曰命命娑羅娑羅鳥譯曰白鶴第二卷娑羅迦鄰提譯曰娑羅者實迦鄰者可愛提者與也第三卷迦迦應云假令譯曰為也第二十卷究究羅譯曰雞也呾呾羅譯曰𮭆也薩婆車多譯曰薩婆者一切車多者覆曼陀波譯曰停舍泥羅波夷譯曰巧羅者油婆夷者飲嗜蘭那譯曰庶察雜阿含第五卷嗜婆鳥應云時婆譯曰時婆者命善見律毗婆沙第二之內瞿枳羅鳥譯曰瞿者牛亦云地枳羅者釘大方等大集經第四卷律𠼝𭦿反㮛鸚鵡譯曰可畏賢愚經十二卷賒律㮛鸚鵡譯曰實可畏也鉢叉鳥應云博叉譯曰翅也百句譬喻經第七卷舍君陀鳥譯曰舍君陀者鳥佛所行讚第二卷鳩羅步譯曰水鳥第三卷羅婆鳥應云羅婆迦譯曰𭃅也鳩那羅鳥譯曰好眼德光太子經須桓難越鳳皇應云須槃那槃那譯曰金色麻油述經遮迦惒應云歌羅婆今譯曰𮬫鴦雜經翟跋吒鳥譯曰隨牛訶利那鳥譯曰青色魚名第三十九摩伽羅魚王亦云摩竭譯曰鯨魚大智論第七卷提迷魚亦云低米譯曰闍也十誦律七法第五卷失牧摩羅魚譯曰殺子守摩羅律曰鰐魚也譯曰好垢善見律毗婆沙第四之內蟲名第四十迦羅求羅蟲應云迦羅咎那譯曰迦羅者黑谷那者木蟲大智論第七之內摩羅毒蛇譯曰摩羅耆華鬘也大涅槃經第十一之內迦羅羅蟲譯曰迦羅羅者黑也維婆蟲應云板那伽譯曰水蛇第二十九卷瞿陀譯曰陵鯉第三十卷匕匕羅譯曰蠅也雜阿含第二卷于頭羅蟲譯曰紖也十誦律初誦第一卷薩薄應云薩婆亦云薩娑譯曰蛇也第五卷提頭賴吒蛇應云峙履哆賴吒譯曰治國彌沙塞律第十九之內怛車蛇應云怛反譯曰視毒伊羅漫蛇譯曰疾行毗樓羅阿叉蛇譯曰郭作眼也瞿曇蛇譯者曰姓也難陀跋難陀蛇譯曰歡喜大歡喜也拘樓荼譯曰眼也第三十二卷能完陀譯曰屎蟲也阿毗曇婆沙第一之內闍盧亦云闍樓蟲譯曰鮒也阿毗曇婆沙第一之內摩奢譯曰蛇蚊也第三十四卷僧奢摩應云騰奢摩譯曰𮔍也鉢勝伽蟲經曰非我婆須密經第十之內阿由勒蟲譯曰不𨥇佛藏經中卷沙伽羅目迦蟲譯曰娑伽羅者海目迦者脫修脂目迦蟲譯曰針口阿闍迦羅蛇譯曰𮫌蛇摩訶摩耶經上卷舊利尼譯曰食木雜經地獄名第四十一阿毗地獄亦云阿鼻亦云毗阿至譯曰無間大智論第七卷泥黎應云泥梨取亦云泥梨迦譯曰無可樂阿毗曇毗婆沙曰無所有也阿浮陀地獄亦云呵浮陀亦云波浮陀論曰阿浮陀者少多有孔譯曰十億第十三之內尼羅浮地獄論曰無孔譯曰百億阿羅邏譯者曰因聲為名呵羅邏亦云呵羅羅論曰寒戰聲也阿婆婆譯者曰因聲為名休休譯者曰因聲為名漚波羅譯曰此獄外辟似青蓮花譯曰似黛色花分陀利迦譯者曰似大黑蓮花摩訶波頭譯者曰似大黑蓮花波頭摩亦云鉢頭摩論曰紅蓮花譯曰赤蓮花伽樓羅地獄譯曰重龍也華嚴經第三十二之內提舍泥梨譯者曰提舍說泥梨如上說大般涅槃經第四卷瞿波離比丘大泥利應云瞿羅比丘泥梨譯曰瞿者牛亦云蛇波羅者護比丘如別卷說禘婆達白兒泥梨應云提婆達多譯曰提婆者天達多者與摩訶阿鼻譯曰大無間也增一阿含第二卷盧臘地獄應云盧羅婆譯曰可畏聲也阿毗曇毗婆沙第四十八之內阿波簸地地獄譯者曰因聲為名十住斷結經第四之內阿達多地獄譯曰不與報恩經第三卷賓咤羅地獄經曰集欲普超三昧經第四卷僧伽陀地獄譯曰合會菩薩藏經阿喻槮波梨桓泥梨應云阿喻松鉢多羅婆南譯曰鐵刀葉杖鐵城泥梨經摩訶盧獦地獄譯曰大動佛說光華經波多畔泥梨中應云波羅多波那譯曰極灸南方經迦羅秀頭泥梨應云迦羅修多羅譯曰黑繩賒摩譯曰青色摩訶衍精進度中罪報經睺睺譯者曰從聲為名摩訶波頭摩譯曰大赤蓮花本云仁治元年十二月六日申時於醍醐寺地藏院書寫了道成一交了寬保元辛酉年八月二十五日以地藏院本挍合了僧正賢賀
