body:
  text: 草名第六十三香名第六十四花名第六十五果名第六十六衣服名第六十七藥名第六十八飲食名第六十九藏名第七十寶名第七十一時節名第七十二數名第七十三草名第六十三朱利草論曰賊譯曰偷大智論第十三卷摩樓迦子譯曰𡥅也大般涅槃經第十二卷伊師迦草譯曰虎鬢優尸羅草譯曰飲第箎十誦律二誦第五卷婆婆草譯曰茅也彌沙塞第二十二卷迦尸草譯曰細秋第二十五卷文葇草應云文闍譯曰虎鬢鳩尸草譯曰細茅拘尸草譯曰長茅第二十九卷阿梨應云訶栗陀羅律曰黃薑善見律毗婆沙第五十卷盧揵譯曰黃蓮陀盧譯曰破亦云𥝷蘇摩那律曰花騰生蘇羅婆譯曰好得質多羅譯曰種種第七十卷婆梨波波云婆梨沙波律曰芬子婆闍陀婆闍那律曰陸地生也耆羅闍那律曰水中生也摩樓多受草譯者曰國名也阿毗曇毗婆沙第十六卷佉陀梨葉應云歌陀利譯曰甘蕉尸婆子應云抱波羅譯曰薀藻鞞婆沙第一卷遮羅波羅草譯遮羅者動波羅者護出曜經第十卷香名第六十四伊蘭譯曰香名大智論第一卷阿伽樓論曰密香樹名譯曰不動第十卷多伽樓論曰木香樹也譯曰不沒婆羅楗馱香譯曰婆羅者勝楗馱者香華嚴經第一卷畢迦香應云畢栗迦譯曰觸也大般涅槃經第十八卷多迦羅香譯曰根也多摩羅跋香譯曰雚葉俱哆屑應云俱瑟哆譯曰木也十誦律僧祇第三十一卷須健提譯曰好香僧祇律第三卷憂尸羅應云鬱尸羅律曰香草善見律毗婆沙第十五卷𧵍他致吒應云勿私多致多律曰雚頭香也未願乾提譯曰乾提香者出曜經第五卷憂陀羅婆羅香譯曰勝力大悲蓮華經第四卷憂陀沙羅香應云優陀羅娑羅譯曰勝寶須曼華香譯曰好意花也法花經第六卷闍提華香譯曰生亦云實波利質多羅拘陀羅樹香譯曰大遊戲地破也求羅香譯曰安息菩薩戒經第五卷多摩羅香譯曰藿香嚴淨經第四卷須牟尼婆利師香譯曰須牟尼者好仙人婆梨師者憂生數經迦羅香譯曰黑花娑羅香譯曰實色須牟尼婆梨師香譯曰須牟尼者善他裟梨師者夏生華名第六十五曼陀羅華譯曰闃花大智論第三卷漚曇婆羅樹華應云漚曇菴波羅譯曰漚曇者起菴婆羅者空第五卷須漫提花譯曰須者好也漫提者湖第九卷占匐亦云占波亦云占婆譯曰華樹論曰金色花第十卷阿輸迦論曰無憂華樹婆呵迦羅論曰爾華樹也漚鉢羅譯曰黛也第六十五卷波頭暮亦云波頭摩亦云鉢曇摩譯曰赤蓮花也拘物陀亦云物牟頭亦云拘物陀譯曰枸者地物陀者喜分陀利譯曰白蓮花也文陀羅譯曰漫花第七十八卷波師波利華應云婆利師迦波利爾波利譯曰婆梨迦者憂生波利者護花嚴經第一卷波羅奢華譯曰赤花大般涅槃經第一卷曼殊沙譯曰檻花散多尼迦譯曰寂靜婆利質多樹華譯曰婆梨者護質多者種種拘比羅樹花譯曰破地婆師花應云婆利師譯曰騰花第五卷散陀那華應云起陀那譯曰流第十卷却具娑華譯者曰占具也第十八卷阿提目多伽華譯曰脫亦云樂第十九卷波吒羅花譯曰重也婆師羅花亦云波師迦譯曰婆師迦者憂生花也摩利迦華譯曰次第須摩那花亦云須曼那譯曰好意由提迦花譯曰行也檀菟迦利華應云檀師迦利譯曰檀師者卷迦利者作修揵提花譯曰好香中阿含第十四卷摩頭揵提譯曰濡香亦云密香𮍯羅花譯曰𮍯羅者綿第四十一卷波羅羅應云波吒利譯曰重也長阿含第三卷須漫陀譯曰好小檀俱摩梨應云檀那俱摩梨譯曰檀那者施俱摩梨者童女頻浮譯曰謨式第二十卷彌離頭揵提譯曰濡香第四十三卷睒婆花應云睒婆利譯曰本綿彌沙塞律第十三卷闍提花譯曰生也善見律毗婆沙第一卷騰沙迦花譯曰𭦳也第二卷鬱波羅花譯曰代里也第七卷末利花譯曰重也摩頭花譯曰𭆜也緊首迦樹花譯曰緊者是也首迦鷃鵡阿毗曇毗婆沙第五卷阿闍花子應云阿闍伽譯曰萌䕑第八卷迦那迦花譯曰金也第四九卷迦羅尼花譯曰黑也鞞婆沙第十二卷頻頭迦羅花譯曰渧黑摩訶曼陀羅藥譯曰大圓花也大方等經第一卷摩訶曼陀殊沙花譯曰大樫沙羅花譯者曰樹名也育坻花譯曰相應波婁沙花譯曰匆也摩訶波婁沙花譯曰大忽迦迦羅花譯曰直也摩訶迦迦羅花譯曰大直拘毗遮羅華譯曰地動阿菟伽梨花譯曰弓作華首經第五卷多羅利華譯曰重也劬多羅利華譯曰衆姓阿迦花應云阿羅歌譯曰日也菩薩戒經第五卷滿願揵提花譯曰香也十住斷結經第六卷茷羅薩羅花應云茂羅沙羅譯曰根實婆須蜜經五卷那梨尼花譯曰蓮花念佛三昧經第一卷拘盧舍蓮花譯曰拘盧舍先五百弓第六卷須蔓羅花譯曰須者好也蔓羅者花菩薩處胎經第一卷彌離頭揵提花譯曰濡音佛所行讚第一卷迦尼蓮譯曰耳也毗流離䭮譯曰白實嚴淨經第三卷盧遮彌華譯曰黃花第四輪婆摩禰花譯曰可愛應云輪波應那拘藪摩花譯曰花也樓遮摩那花譯曰可樂蔓那華譯曰意也雙卷涅槃經第一卷文陀般譯曰漫也寶如來經上卷拘蘭荼華譯曰經也寶梁經第一卷文尼花譯曰仙人數經阿提摩多華應云阿提目多伽譯曰𮂳脫佛說求欲經盧遮那華譯曰眼也虛空藏經瞿羅尼華譯曰白花雜經栴那華譯曰香名也蘇至遮迦華譯曰淨論蘇樓至栴那華譯曰好樂栴如多羅華應云栴陀羅多羅譯曰星月拘毗羅華譯曰破地摩羅毗訶傳曰新花外國傳第一卷果名第六十六頗羅論曰果也大智第四十八卷闍浮果譯曰其果紫也第十二卷呵梨勒果譯曰天主持來第二十二卷菴羅果應云菴婆羅譯者曰其果酢味波盧沙果譯曰忽也第三十卷波那婆果應云波那娑譯者曰形如冬苽其味其耳第八十二卷頻婆果譯曰相思摩陀羅果譯曰醉阿摩勒果譯曰無垢大槃涅槃經第五卷迦羅迦譯曰黑也第六卷鎮頭迦譯曰柿樹尼拘陀子應云尼拘盧陀譯曰無節亦云縱廣第二十二卷佉陀羅子應云伽陀利譯曰甘䕴尸利沙果譯曰尸利者頭沙者似也第三十二卷毗醯勒果譯曰不畏增一阿含第九卷跋陀羅果譯曰賢也雜阿含第十六卷波羅果譯曰勝也第三十四卷鼻羅果應云耆羅譯曰消也出曜經第七卷毗羅果譯者曰似木苽十住斷結經第七卷柯必他果譯曰梨也百句譬喻經第二卷波羅悉多果譯曰波羅者彼悉多者觀摩得勒伽經第一卷般那果譯曰山也多勒應云多羅譯者曰樹名也觀佛三昧第一卷摩陀羅果應云摩陀那譯曰醉果集三乘名數第五卷迦陀迦果譯曰作果四百三昧經波達果應云波羅達多譯曰他與胞胎經摩頭果譯曰美也歷國傳第三卷迦多離果應云迦陀利譯曰甘蘇衣服名第六十七僧伽梨譯曰重也大智論第一卷漚多羅僧亦云鬱多羅亦云優多羅僧譯曰覆右肩衣尼師檀譯曰坐具第十二卷袈裟譯曰染衣也第十三卷迦尸輕濡衣譯曰光也第三十八卷兜羅綿譯曰綿也第八十八卷洹裟相衣應云洹衣譯曰洹裟者鵝華嚴經第四十九卷憍奢耶譯曰蟲也大般涅槃經第一卷芻摩繒綵亦云讖磨亦云蘇摩譯曰芻摩者布也迦陵伽衣譯者曰國名也迦婆羅譯曰黑毛摩訶楞伽譯曰摩訶者大楞伽者色第七卷加陵伽波和羅譯曰加陵伽者國名波和羅者衣中阿含第二十一卷波遮悉多羅那應云鉢羅賴咤悉多羅那譯曰䨱鴆褥也鞞訶提應云鞞提訶譯曰種種體也亦云罹頭鳩羅衣譯曰細布衣雜阿含第五卷拘沽婆衣譯者曰國名也婆詵私應云婆桑私譯曰衣也第三十七卷僧岐亦云僧祇友譯曰褊袒十誦序第三卷泥洹僧譯曰方衣波伽羅應云獸伽羅譯曰木皮波頭摩衣譯曰赤花初誦第一卷頭求羅衣應云頭鳩羅亦云頭頭羅譯頭鳩羅者細布迦絺那衣譯曰功德安陀衛應云安陀羅婆沙必譯曰裏衣却具衣譯曰樹花名鈎鉢多羅譯曰小鉢第三誦第四卷阿鳩羅綿譯曰無種姓也亦云無垢第五卷鳩舍羅綿譯曰功也聞闍綿譯曰虎鬢草也禪頭勒臥具應云暗兜楞伽譯曰紫也七法第一卷般藪衣譯曰羊毛七法第七卷拘賒草衣譯曰細茅婆婆草衣應云跋婆閩譯曰茅舍那衣譯曰木皮僧祇律第十八卷婆羅天被衣譯曰婆羅者勝第二十一卷婆藪天被衣譯曰婆修者實差羅波尼應云叉羅波膩亦云鉢𫆁譯曰灰水四分律第一卷鉢𫆁嵐亦云鉢𫆁婆婆衣譯者曰國名也肩那衣應云賒那譯曰樹皮衣也阿羅梨革屣應曰阿羅毗譯者曰國名也第三卷鴦伽那羅衣譯曰體也第五卷波羅臥具應云波羅婆羅那譯曰覆身衣也彌沙塞律第七卷跋那衣譯曰色也波那衣譯曰糞掃舍勒譯曰內衣尼薩耆衣譯曰捨也第二十五卷芻彌衣譯曰布衣第二十四卷婆舍那衣譯曰衣也阿呵那衣應云阿呵多譯曰新衣瞿荼伽衣譯者曰國名也鴦伽持珠鎧應云鴦他陀譯曰繫醉第二十四卷頻伽厄髮衣譯者曰國名也善見律毗婆沙第二卷鉢兜那婆吒律曰絹也譯曰鉢兜那者細波吒者絹第六卷波那衣譯曰林也婆興伽衣譯者曰國名也朱羅波梨迦羅衣律曰離碎衣也腹羅譯曰勒也迦那腹羅譯曰迦那者耳第十六卷阿羅梨草屣譯曰阿羅利者草第十七卷腹羅跋陀羅草屣應云兜羅跋羅譯曰兜羅者綿跋陀者縛真誓梨草屣譯曰真誓梨者細聲却彼育疊譯曰却波育者分別時分阿毗曇毗婆沙第八卷婆羅禁衣應云婆羅那形譯者曰國名也第二十三卷羅差應云勒叉譯曰紫色大方等大集經第十二卷劫波塗沙亦云劫俱頭沙譯曰網布摩得勒伽經第三卷兜那鉤譯曰兜那者國名也第四卷俱耽波鉤譯曰者俱耽波者國名俱脂羅釰譯曰俱脂羅者國名阿婆羅多釰應云阿婆梨吒譯曰別國迦頭鳩羅應云迦羅鳩羅譯曰黑細布也第六卷安怛婆婆應云安怛羅婆婆譯曰內衣波僧祇被譯曰波僧祇者相著觀佛三昧經第七卷安陀羅跋薩應云安陀羅跋私吒譯者曰安陀羅者國名跋私吒者家勝菩薩處胎經第一卷釋迦毗楞伽譯曰釋迦者姓毗楞伽者不好色也首楞嚴經上卷僧那僧涅譯曰莊飾鎧阿閦佛上卷三般衣應云三股那譯曰具足遺教三昧經上卷迦陵伽衣譯者曰國名也聖王七寶現上卷楞耆譯曰色也天子族光經拘攝衣譯曰璽也菩薩藏經拘彌波衣譯者曰國名也摩呵僧那僧涅記曰摩訶者大僧那者鎧僧涅者著文殊師利間菩薩署經藥名第六十八阿藍婆藥譯曰不垂華嚴經第四十九卷阿羅娑藥應云阿剌娑譯曰無昧阿伽陀藥應云阿竭陀譯曰阿伽陀者丸第七卷安陀藥譯曰根也大涅槃經第三十四卷羅散闍那譯曰羅散者鍾乳闍那者黑石十誦律序卷第二波株羅藥譯曰植苽三誦第三卷比牧且曼陀藥譯曰練葉迦盧醯尼藥應云歌附歌盧醯尼譯曰黃蓮闍波藥譯曰大麥四分律第三卷阿漏譯曰根也第七卷阿婆闍律曰烟藥善見律毗婆娑第十七卷闍比譯曰根藥賢愚經第四卷迦私藥譯曰光也菩薩戒經第七卷那提神藥譯曰江也十住斷結經第五卷安禪那譯曰眼藥金利沙亦云尸利沙譯曰沙者似頭菩薩處胎經第五卷飲食名第六十九修陀甘露譯曰修陀者四也大智論第三十卷摩頭陀婆漿譯曰摩頭者密陀婆者酢劫賓闍羅漿譯曰染涂子中阿含第二十九卷鞞羅應云破羅譯曰被羅者拌第五十七卷拘施應云拘舍譯曰茅也招梨漿應云招遮譯曰招遮者甘蕉也十誦律序第二誦毛梨漿應云光遮譯曰毛遮者酢甘蕉舍梨漿譯曰拘物地者花根也波流沙漿譯曰波流沙者忽劫必他漿譯曰劫必他者梨怛鉢那譯曰也初誦第一卷呿陀尼譯曰可噉二誦第七卷菩闍尼食譯曰可食蘇毗羅漿譯曰木葉亦云聲也三誦第三卷釋俱羅餅譯曰胡麻餅也第四卷波波羅餅譯曰享𧻓俱舍梨餅譯曰薄麻餅也八法第六卷周羅漿譯曰小也雜誦第四卷牟羅漿譯曰根也頗梨漿譯曰果也雜誦第四卷波陀摩譯曰我說善誦第一卷闍豉譯曰酒漿僧祇律三卷巔哆梨漿應云旃遮梨譯曰酢果波樓沙漿譯曰忽果波籠渠漿應云婆籠渠譯曰樹子阿陀私油譯曰莊子北周𮈫陀油譯曰練子般施蜜譯曰竹也那羅蜜譯曰萩也摩訶毗梨蜜譯曰大精進也菴羅漿譯曰酢果呵梨陀漿譯曰果薑阿提目多油譯曰脫亦云欲修修羅𭦍應云修伽羅譯曰猪也闍致譯曰聲𦬊味拔遮監譯曰好色第四十一卷毗欖鹽譯曰孔中生也迦遮鹽譯曰遮者光私多鹽譯曰白也北迦鹽應云北果譯曰熟賒陀尼應云莎陀尼譯曰可噉彌沙塞律第七卷拘留米飯譯曰作也沙梨耶譯曰白米善見律毗沙第四卷阿揵多食律曰蜜比丘食譯曰蜜也第六卷瞿羅律曰美餅第七卷修步律曰青豆蓋美也第十七卷吉羅羅律曰竹箏烏婆陀頗尼律曰薄日糖金樓伽漿譯曰根也波漏師漿譯曰忽也蘇毗鹽應云蘇毗羅譯曰好勇第十八卷鳩樓摩應云鳩樓序沙譯曰大豆摩得勒伽經第四卷烏陀那責譯曰烏陀那者飯第六卷烏沙曼陀譯曰小豆阿提目多油譯曰花名縵頭油譯曰第一軍荼蜜譯者曰軍荼者草名也布足蜜譯曰小蜂縵闍蜜應云縵闍梨譯曰縵闍梨者花葉摩訶毗梨蜜譯曰大力波波羅𧻓譯曰波波羅者摩𧻓優婆塞五戒相經藏名第七十金剛那羅延藏譯曰那羅延者力華嚴經第四十卷伊羅鉢藏應云伊羅鉢多羅譯曰伊羅者香鉢多羅者葉增一阿含第四十二卷班稠大藏譯曰黃萎色也賓伽羅藏譯曰黃赤色也蠰佉藏應云商佉譯曰珂也賓伽羅寶藏譯曰蒼色半陸迦寶藏譯曰黃榴蠰伽藏譯曰好身雜經寶名第七十一閻浮那金應云閻浮那陀亦云閻浮檀譯曰閻浮者樹名那陀者江大智論第四卷毗流離寶譯曰白也第十卷摩尼珠譯曰摩尼者珠摩羅伽陀論曰綶譯曰青珠因陀尼羅論曰青珠也譯曰天主黛珠摩呵尼羅論曰大青珠譯曰大黛珠鉢摩羅伽論曰赤光珠也譯曰赤蓮花珠越闍應云跋闍羅譯曰金剛頗梨應云頗致歌論曰白珠譯曰白珠謂水精火珠也婆羅寶譯曰勝也第十卷波羅耳所提應云波羅耳綿譯曰波羅者他耳絺者代藏第三十一卷因陀羅幢寶譯曰天王華嚴經第十一卷羅闍藏寶譯曰羅闍者王天多羅羅應云多羅哆譯曰多羅哆者度也伊那羅寶譯曰大也琉璃伊陀羅寶應云因陀羅尼羅譯曰因陀羅者天主尼羅者青寶樹提沙陀羅尸光譯曰樹提沙者蟾星人陀羅尼者持第三十八卷毗樓那寶譯曰光曜第三十九卷吉田羅莊嚴應云抧由譯曰瓔珞第四十卷彌呵羅寶應云彌阿羅譯曰金帶毗沙門寶譯曰勝聞第四十八卷摩尼婆陀夷譯曰摩尼者珠婆陀者賢長阿含第三卷僧伽施應云伽僧施羅譯曰白玉四分律第四分第三卷婆修譯曰寶也第六卷婆羅迦珠譯曰白也善見律毗婆沙第六卷婆羅耶珠譯曰懸也迦鳩陀婆羅珠譯曰迦鳩陀者𩝗婆羅者勝栴陀摩尼應云栴陀羅摩尼譯曰月珠甄叔迦寶譯曰鸚鵝法華經第七卷毗楞摩尼色亦云毗楞伽摩尼譯曰毗楞伽者不好色也摩尼者珠念摩佛三昧經第四卷毗琉璃色譯曰白寶律羅鉢多寶應云伊羅鉢多羅優婆塞戒第五卷難檀婆那譯曰歡喜杖也阿牟荼馬𭜹應云何牟羅嚴沙經第一卷尸利迦寶譯曰吉也迦羅寶譯曰黑也現在佛名經第一卷鞞蘆遮那寶譯曰種種光也釋迦毗楞迦摩尼譯曰釋迦者姓毗楞伽者不好色也摩尼者珠觀無量壽經釋迦毗楞伽寶譯曰釋迦者能毗楞伽者不好色也虛空藏經毗楞伽寶譯曰不好色也文殊師利涅槃經摩娑羅伽隸譯曰馬𭜹佛問阿須輪大有威經陀那跋吒譯曰物長陀若跋吒譯曰聲長時節名第七十二迦羅譯曰時也大智論第一卷三摩耶譯曰時分阿僧祇劫論曰阿者無僧祇者數跋陀劫應云跋陀羅亦云波陀論曰跋陀者善譯曰賢也第三十八卷劫簸譯曰分別時節剎那譯曰生藏華嚴經第三十五卷羅婆譯曰六十怛剎那名一羅婆姤路應云牟睺姤路譯曰三十羅婆名牟睺姤路禪經曰謂一日一夜羅耶經曰六十念頃名一羅婆長阿含第二十二卷摩睺多經曰三十羅那名一麻睺多三跋吒劫亦云三跋收夷律曰劫滅善見律毗婆沙第五卷毗跋收夷劫應云毗跋吒律曰劫或迦提同譯曰時月第十四卷阿留那律曰明曰恆剎那經曰二十剎那禪經下卷羅陀那三陂經曰二十剎那純真陀羅經下卷波羅林劫經曰清淨白也離兜經曰二月為一節一節名離兜相清解脫經上卷波羅劫譯曰波羅者彼羅波劫譯曰羅故也第三卷數名第七十三由旬亦云踰闍那譯曰諸者曰五百弓為拘盧舍八拘盧舍為一喻闍那大智論第一卷那由他譯曰十万頻婆譯曰百万迦陀譯曰十頻婆句盧舍亦云拘樓賖譯者曰五百弓十誦律二誦第五卷拘利那術踰旬應云拘致那由他由旬譯曰拘致者億那由他者十万由旬者四十里般舟三昧經深賢延應二年二月十五日於醍醐寺地藏院書寫本之字不分明多多在之只如本寫之得其意可披覽也道成同四月十日於同院之南面令校合了深圓右全部十卷以地藏院深賢師傳飯之本遂書功校讐令收納觀智院經藏了寬保元辛酉年八月二十八日僧正賢賀俗齒五十八
