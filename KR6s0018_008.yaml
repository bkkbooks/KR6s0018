body:
  text: 世界名第四十二國土名第四十三城名第四十四邑名第四十五聚落名第四十六村名第四十七寺舍名第四十八堂舍名第四十九處所名第五十世界名第四十二周羅千世界譯曰周羅者小大智論第七卷娑婆世界亦云婆呵亦云娑婆譯曰能忍第十卷閻浮檀世界應云閻浮那陀譯曰閻浮者樹名那陀者江華嚴經第一卷因陀羅網世界譯曰因陀羅者主羅婆界譯曰勝利善見律毗婆沙第十七之內阿槃羅界譯曰無勝阿羅闍界譯曰無王加比園界應云加比羅譯曰蒼色出曜經第十六卷袈裟相世界譯曰袈裟者深衣也華首經第二卷阿竭流香世界譯曰沈香第三卷彌樓相世界譯曰光明多伽樓香世界應云多伽羅譯曰棍香優鉢羅世界譯曰黛色花也苔蔔衆世界譯曰黃花第四卷阿樓那世界譯曰曉星第五卷刪提嵐世界應云刪提盧帝譯曰刪提者節盧帝者毛悲華經第二卷摩鍮羅境界譯曰蜜亦云羊次僧伽羅剎所集經第三之內跋秪境界譯曰聚也阿毗羅提世界譯曰不作不思功德佛所護經第一之內阿尼彌沙世界經曰不㫬若未經第一之內沙捊世界經曰恐畏修行本起經第一之內曼荼邏境界譯曰圓也禪經修行方便道下之內摩鍮境界譯者曰國名也菩薩受齊經國土名第四十三佛剎亦云剎多羅譯曰剎多羅者田大智論第一卷閻浮提譯曰閻浮者樹名提者洲也劬陀尼亦云𤘽伽尼亦云瞿耶尼譯曰劬者牛陀尼者市易第四卷鬱怛羅曰應云鬱多羅𤘽樓亦云鬱單越譯曰鬱多羅者北亦云勝亦云答𤘽樓者竹亦云姓弗婆提應云弗婆毗提訶亦云弗于逮譯曰弗婆者車毗提呵者種種身也摩伽陀國亦云摩竭提亦云默偈陀譯曰摩伽者星名陀者處也第一卷俱夷那竭國亦云俱尸那伽羅亦云𤘽尸那竭雜阿含曰草城譯曰俱尸者少茅那伽羅者城憍薩羅國應云𤘽菩薩亦云𤘽婆婆羅譯曰工功婆羅奈斯國應云婆羅那私亦云婆羅㮈譯者曰臣繞城也漚樓鞞羅國應云優樓頻螺譯曰木苽伽耶國譯曰鐵杖第四卷迦毗羅婆應云迦毗羅跋私兜亦云迦毗羅越譯曰迦毗羅者蒼跋私兜者住處彌梯羅國譯曰量也第七卷占波國亦云瞻婆譯曰花也多剎柁羅國亦云恆叉尸羅亦云得叉尸羅譯曰多剎者鑿柂羅者不第十一卷拘睒彌國應云𤘽睒毗亦云𤘽舍彌譯曰不甚靜也亦云藏有第十四卷阿頭摩國應云阿頭樓摩譯曰阿頭樓摩者無樹第二十一卷安陀羅譯曰盲也第二十五卷兜呿羅譯曰小月氏也舍婆羅譯曰裸也修利安安息譯曰修利者胡阿羅毗國譯曰少語第二十七卷毗蘭若國亦云鞞蘭若亦云毗羅然譯曰毗蘭若者不寂靜也亦云不染婆利國亦云婆羅亦云波離譯曰波利者護第二十八卷摩偷羅國亦云摩頭羅譯曰蜜亦云美第九十九卷恆伽沙國譯曰恆伽者天堂來呵尼國譯曰打亦云破華嚴經第三卷摩瑜羅國譯曰孔雀第二十四卷拘陳那耶國譯曰𤘽陳者姓那者律乾陀羅國譯曰乾者地也陀羅者持輸那國譯者曰江名也第四十一卷摩離國譯曰力亦云妹第四十九卷憂禪尼國應云優闍耶尼亦云優耶尼譯曰憂者大也禪尼者勝大般涅槃經第十之內拘舍跋提譯曰𤘽舍者小茅提拔者有第二十七卷竭闍國譯曰𠌵也迦蘭陀譯曰迦蘭者好陀者與也舍衛應云尸羅跋祗底譯曰尸羅者石跋私底者住處增一阿含第一之內跋祇亦云跋耆譯曰聚也第三卷鉢摩國譯曰淨也第六卷古波國譯曰瞋也第八卷般頭國譯曰親友第十七卷僧伽尸國亦云僧伽舍譯曰等耀第十九卷拘留沙國譯曰穢濁亦云作事第二十八卷乾陀越應云乾陀婆那譯曰香林第四十三卷須賴吒國亦云須羅吒亦云須賴娑譯曰須者好也賴吒者國婆雞帝譯曰婆者語也雞帝者憧中阿含第二卷拘樓庾亦云居樓譯曰姓亦云作第三卷伽藍國譯曰封也第九卷阿羅鞞伽羅應云阿羅波伽羅譯曰阿羅婆者不得伽羅者屋也拘舍和提應云拘舍婆提譯曰拘舍者藏婆提者論第十一卷伽私國應云加尸亦云伽尸譯曰迦尸者光第十二卷鞞陀提國譯曰鞞陀者智提者與第十四卷摩兜麗譯曰舅也第十五卷伽赦國譯曰光也第十七卷枝提庾亦云支陀譯曰枝提庾者衆𧂐第十八卷釰磨瑟曇樓譯曰釰磨者葉瑟曇者驗𤘽樓者作郁伽支羅應云郁伽羅支羅譯曰郁伽羅者猛支羅者小也那摩提譯曰那摩者名提者與也第二十八卷那難陀國譯曰不歡喜第三十三卷鬱鞞羅尼譯曰鬱者大鞞羅尼者怨阿和那應云阿波那譯曰市肆第五十卷般闍羅亦云那闍亦云般遮羅譯曰般遮羅者五能亦云五不動第五十五卷阿和檀提應云阿波檀提譯曰無罰枝提譯曰憶也跋蹉亦云跋沙亦云婆嗟譯曰犢也跋羅亦云跋陀羅譯曰賢也蘇摩譯曰月也踰尼譯曰生也劍浮譯曰好也波波可反波譯曰西也長阿含第三卷毗留提國譯曰長張雨反鴦伽譯曰體也末羅亦云滿羅譯曰力亦云姓劍浮沙譯曰好也精翅㮴國亦云釋迦譯曰能也半闍譯曰五也鞞提訶國應云毗地呵亦云鞞提譯曰種種體也亦云四維阿般提亦云阿般提譯曰無義賴吒羅譯曰國也第九卷賴吒般提應云賴吒般底譯曰賴吒者國般底者轉尖瞿多羅應云尖掘婆羅譯曰體勝第三十五卷彌絺羅國譯曰金帶第四十四卷達親那波多國應云達嚫那波陀譯曰達那者南波陀者腳十誦律序第一卷薩婆伽羅鉢婆羅譯曰一切屋無節也波羅梨弗國應云婆吒梨亦云弗多譯曰婆羅梨者樹弗多羅者子婆嗟阿婆蘭多譯曰婆嗟者犢阿婆蘭多者別邊維耶離國亦云毗舍離譯曰毗舍離者廣博初誦第二卷阿耆維國譯曰火也二誦第七卷瞻匐國譯曰花也七法第一卷迦夷國譯曰體也第四卷伽郎伽羅國譯曰伽郎者賴伽羅者頸阿尼目佉應云何耆目佉譯曰大面第五卷阿頭佉國譯曰不苦第六卷桑祇陀國應云桑祇哆譯曰桑祇哆者聚會說也七法第八卷僧迦羅叉譯曰等耀薩婆譯曰一切八法第二卷阿葉摩伽國應云阿炎摩伽陀譯曰阿炎者施摩伽陀者星名迦陵伽蘆譯曰伎述雜誦第二卷蘇彌國應云蘇彌耶譯曰可愛僧祇律第九卷弗迦羅國譯曰蓮花釋迦梨國譯曰沙也難提跋國應云難提跋陀譯曰喜長沙祇國應云娑枳多譯曰論事第十一卷阿般頭國譯曰無親友也第十五卷波羅脂國應云波羅時譯曰不勝第十八卷憂波尸婆國譯曰憂波者火也尸波者安隱第二十九卷蘇羅波國譯曰好語四分律第一卷彌尼㮴國譯者曰山名也第四卷阿濕婆譯曰不安隱也第三分第三卷婆闍國婆須密日清明譯曰出家第四分翅毗尸國應云歌毗尸譯曰何方入也第四分第三卷婆利譯曰騰也第五卷阿那頻頭國譯曰無渧彌沙塞律第七卷阿務波羅應云阿闍婆羅譯曰阿闍者羊放者守第十九卷拘舍羅譯曰善也第二十四卷阿漯波阿雲頭國應云阿漯比阿般頭譯曰阿漯比者不功阿般頭者無親第二十五卷阿婆國譯曰手澤罽那譯曰耳也阿耶譯曰似父第三十卷那蘭馱譯曰人主善見律毗婆娑第一卷鬱友國譯曰聚也楗陀羅吒國譯曰香國第二卷摩醯婆末陀羅國應云摩醯賒曼陀羅譯曰摩醯賒者大自在曼陀羅者國婆那婆私國譯曰林往阿波蘭多迦國譯曰邊國臾那世界國律曰漢地摩呵勒吒國應云摩呵賴吒譯曰大國阿羅陀國譯者曰星名也跋闍摩國譯曰金剛第三卷毗沙羅國譯曰廣也般頭摩底譯曰有親友也第五卷須離國譯曰勇也第六卷波夜伽譯曰水也婆羅那私國譯者曰江名也安阿羅彌國譯曰蔭薗第七卷那伽羅國譯曰地也阿毗曇毗婆沙第七卷拘羅婆譯曰作亦云姓高羅婆譯曰極作蘇毗地呵應云蘇毗啼呵譯曰極好身也奢吒譯曰諂也鬱多羅曼提那譯曰鬱多羅者勝提那者語也婆羅應云遮摩羅譯曰眊也遮摩羅應云阿婆羅遮摩羅譯曰阿婆羅者復遮摩羅者眊阿槃陀國譯曰護也第十六卷拘奢跋底譯曰有小第也第二十三卷婆尸譯曰有住第四十六卷修迦羅譯曰好持第五十卷曇羅國譯曰邊也鞞婆沙第九卷彌離車國譯曰五教反垢直旦應云脂那亦云震旦譯曰難地摩勒譯曰花也波勒譯曰伎也佉沙譯曰不正語也婆佉梨應云薄佉利譯曰諂曲多耆尸譯曰曲也舍衛阿那邠祁應云尸羅跋底阿那他邠陀馱譯曰尸羅跋底如上說阿那他者孤邠陀馱者份第十一卷龜茲國譯曰曲躬大方等大集經第二十卷于填國應云優填耶那譯曰後堂毗荼國譯曰智也遏波譯曰小也出曜經第十五卷耶般那譯曰縛也憂陀羅延王經劍桴譯曰好亦云勝曇蜜羅國譯曰樂法波羅梨國應云波吒梨譯者曰樹名也第十八卷持叉尸利國譯曰持叉者勤尸利者吉賢愚經第二卷毗細乾持國應云毗瘦細乾持譯曰毗瘦細者一切入也乾持者聲第三卷跋陀耆婆國應云跋陀羅時婆經曰賢壽譯曰賢命尼拘盧陀國譯曰不瞋第九卷梨師跋陀國譯曰仙賢波婆梨富羅國譯曰天力滿也第十二卷阿閦佛土應云阿閦亦云阿閦鞞譯曰不動華首經第十卷阿彌羅國譯曰樂法菩薩戒經第二卷沙訶國譯曰能忍十住斷結經第一卷周姤國周本譯曰落也婆須蜜經第一卷瞿曇彌那拘驢應云瞿曇彌那𤘽陀譯曰瞿曇彌者姓那𤘽陀者壽命第五卷阿毗羅國譯曰不精進也百句譬喻經第四卷私呵國譯曰勝也百句譬喻經第三卷尸利調國應云尸利提婆譯曰尸利者吉提婆者天迦陵頻伽國譯者曰鳥名也優婆塞戒經第五卷利師跋王國應云利師跋陀羅譯者曰仙賢報恩經第二卷綿毗利國譯曰是空不耶菩薩處胎經第五卷摩伽提國譯者曰星名也那難國應云那難陀譯曰不歡喜生經第二卷遮利國譯曰動也第五卷具留波應云瞿留波譯曰瞿者牛也留婆者色密迹經第一卷倚脾波國譯曰覓也第三卷娑樓婆國譯曰似他佛所行讚經第二卷毗提訶富梨譯曰毗提訶者四惟富梨者城阿摩勒迦波譯曰無垢相似輸盧波羅譯曰輸盧者聞波羅者護摩醯波位譯曰摩醯者地波低者主波羅那應云婆羅那尸譯曰江名也施多毗迦應云首多地歌譯曰首多者月地歌者最跋伽國譯曰種也摩羅國譯曰花也第五卷須摩國譯曰月也阿摩國譯曰不熟首羅先那國譯曰勇單夜槃耶國譯曰邊也釰蒲闍國譯曰可愛迦比羅𭤺兜應云迦比羅跋兜譯曰迦比羅者蒼色跋兜者住處也過去現在因果經一卷偷羅厥叉應云偷羅厥蹉譯曰大姓盧羅譯曰動也偷羅拘咤譯曰偷羅者大拘吒者頂頻毗娑羅譯曰頻毗者謨娑羅者勝那利國譯曰漏刻法句經第三卷鬱多羅波提國譯曰多羅者非亦云勝也波提者腳多摩羅國譯曰藿香第三卷波句國譯曰要也雙分涅槃經第一卷旃陀惟摩羅經曰日月明也純真陀羅經下卷首呵利土經曰淨貌沙竭國應云娑伽羅譯曰海也那先經上卷薩羅國譯曰池也遺教三昧經下卷三彌佛剎譯曰寂也實如來經上卷比摩大國譯曰畏也未曾有經第一卷摩羅婆耶譯曰摩羅者花婆耶者時裴扇闍國譯曰不勝第二卷彌緹羅國亦云彌梯羅譯曰分侄彌勒成佛經文荼羅國譯曰漫也法鼓經遮羅頗國譯曰行也迦葉遇尼乾經羅摩伽國譯曰戲行波斯匿王諸佛經波拘羅譯曰少力楗陀呵剎土譯曰樂音阿闍王女阿術達經鞞末拘遼剎土經曰無垢濁也拘苫毗國譯曰城也菩薩受齊經波頭洹羅鄰剎應云波頭摩槃那羅鄰譯曰波頭摩蓮花槃那者林羅鄰者受護兜沙經楗闍洹那涅羅應云楗闍槃那那沮羅譯曰楗闍藏那者林那沮羅者不黑闍踰闍國譯曰不可戰也勝鬘經阿和提國應云阿婆提譯曰不論迦栴延無常經伽紬羅竭國應云迦比羅那迦羅譯曰蒼城流離王入地獄經波羅斯大國譯曰他樂般舟三昧經摩須提國譯曰好慢提和竭國應云提婆那加羅譯曰天城阿育王經拘尸國譯曰第也觀虛空藏菩薩經波婆國譯曰淨也羅摩國譯曰戲也遮勒國應云遮羅譯曰動也毗國應云毗瘦經譯曰切入也迦毗羅國譯者曰仙人名瓶頭那羅國應云頻頭那羅譯曰頻頭者諦那羅者漏刻賴吒槃提國譯曰賴吒者因槃提者護世尊繫念經葉波國譯曰蛇也楗陀賴國應云楗他賴吒譯曰香國雜經楗陀越國應云楗陀婆那譯曰香林阿羅雞國譯曰垂髮大神將軍呪經乾陀越國應云乾楗婆譯曰嗅香亦云樂神王子法益經婆羅越國應云波羅婆底譯曰彼有佛問四童子經毗荼國譯曰智也那羅干陀國譯曰荻聚成實論第九卷康衢國譯曰栗也村婆村婆施傳曰國界外國傳第二卷國多國傳曰默然國也迦羅奢木傳曰滿鷹金國第四卷伽沙國譯曰不正語也歷國傳第一卷波盧國譯曰護也富那跋檀國傳曰豐滿第三卷乾若國譯曰藏也伽鼻國譯曰有牛婆施彊國譯曰自在行也波私國譯曰繩也第四卷阿那羅國譯曰火也城名第四十四婆羅㮈應云婆羅那和亦云婆羅㮈譯者曰江名也大智論第一卷毗舍離亦云毗耶離譯曰廣博舍婆提城應云尸羅跋兜亦云舍衛譯者曰仙人住處迦毗羅婆應云毗羅私兜亦云毗羅衛譯曰迦毗羅者蒼跋私兜者住處第三卷區祇尼大地應云區氏尼譯曰大勝富樓那跋檀大城應云富樓那跋陀羅論曰長功德城譯曰富樓那者滿跋陀羅者賢阿監車多羅大城應云阿喜車多羅譯曰阿喜者蛇車多羅者𦅄弗迦羅婆多大城應云弗迦羅婆底亦云弗迦羅譯曰弗迦羅婆底者有也婆翅多亦云婆枳多譯曰語憧拘睒鞞亦云拘深譯曰拘睒者藏鞞者有也鳩樓城譯曰鳩樓者作亦云姓也婆羅利弗多羅應云波吒利弗多羅譯者曰波吒利者樹名弗多羅者子楗闥婆城譯者曰嗅香神也亦云樂神第六卷婆羅門城譯曰心出俗外亦云淨行第八卷舍衛城應云尸羅跋底譯曰聞持夜叉城譯曰能噉花嚴經第三卷伽樓羅城譯曰金翅難提拔檀那城譯曰難提者歡喜拔檀那者壇長第二十四卷迦陵伽婆提城譯者曰迦陵伽者鳥名婆提者語第四十二卷首婆波羅城譯曰首婆者可愛波羅者護婆羅波提城譯曰婆羅者勝波提者之第四十三卷婆羅波提城應云頻歌羅譯曰夾也第四十九卷拘尸城亦云拘夷那譯曰小茅大般涅槃經第一卷優禪尼城譯曰優者大也禪尼者勝第十四卷瞻婆譯者曰花名也第二十七卷富單那城譯曰臭也第二十九卷尸波富羅城譯曰尸婆者安隱富羅者城也第三十一卷迦羅富城應云迦羅賖富羅譯曰迦羅賖者𭂷富羅者城第三十五卷蜜絺羅城譯曰解心怠增一阿含第二十一卷波羅利城應云波吒利譯曰重貯龍反中阿含第六十卷員彌城譯曰地也長阿含第三卷拘利城譯曰織也亦云樹也第四卷跋離城譯曰騰也阿婆布和城應云阿波斯譯曰無惡第五卷阿槃大天城應云阿般叉譯曰無鴦伽瞻波城譯曰鴦伽者體瞻婆者樹那難陀城譯曰不歡喜也第十二卷輸摩跋咤譯曰月長第二十卷伽尸城應云加尸譯曰光也彌綺羅城譯曰金帶雜阿含第四卷頻頭城譯曰謨式第十一卷僧迦舍城譯曰光也第十七卷波披城應云波𤿺譯曰惡也十誦律序第一卷颰陀婆提城譯曰賢語阿吒般劍譯曰鬼神城也七法第四卷婆提城譯曰論說第六卷首婆羅利弗城應云首波吒利弗多羅譯曰好樹子也第八卷首波城應云首婆譯曰首婆者可愛也增一第一卷提波跋提城譯曰提婆者天跋提者賢四分律第二分第九卷尸佉城門譯曰尸佉者勝亦云髮也第十卷波伽他城譯曰不正語也婆樓越奢應云樓割車波譯曰重龜第四分第六卷跋提羅城應云跋提譯曰賢也彌沙塞律第四卷得叉尸羅城譯曰𫠙石第八卷婆吒梨城應云跋吒梨譯曰圍繞阿毗曇毗婆沙第二十三卷波卑城譯曰惡也第四十六卷那提迦夜城譯曰那提者江迦夜者國第五十四卷尸鉗城譯曰無為鞞婆沙第九卷婆樓翅舍城譯曰婆樓者沙翅舍者髮賢愚經第八卷頭迦羅城應云頭和迦羅譯曰苦行百句譬喻經第四卷拘尸那竭大城應云拘尸那伽羅譯曰茅城婆兜釋翅搜城譯曰婆兜者位處釋翅㮴者能菩薩處胎經第一卷央伽富梨城譯曰體城佛所行讚第四卷波婆城譯曰淨也屈頭摩城譯曰少樹羅摩伽經第一卷槃頭摩跋城應云槃頭摩底譯曰有親興起行經下卷跋耆城譯曰聚也阿耨風經栴頭摩提應云栴他摩底譯曰惡意佛說光華經迦毗羅城譯曰蒼也觀虛空藏菩薩經達摩那伽羅譯曰法城縫衣經翅頭末城應云翅兜摩底譯曰有憧彌勒成佛經弗迦羅城譯曰蓮花雜經須賴吒賓伽羅譯曰須賴吒者好國賓伽羅者黃赤色也一慈園傳曰石城外國傳第一卷尸那竭傳曰新城婆屢𭍠傳曰醎土地也迦羅越傳曰入云城也不沙𢗲傳曰大夫滿城醯羅傳曰獵城第二卷卑羅傳曰大鼓城也提毗羅傳曰空孔城也沙竭羅傳曰新木城也賓奇婆羅傳曰團聚地也婆吒那竭傳曰名城阿伽留陀傳曰茅一飯城盧頡多傳曰赤云城遮留波利傳曰白疊端也阿瞿陀傳曰蚖蛇城也摩頭羅傳曰無酒城也第三卷迦拏憂闍傳曰高肩城也提羅傳曰折上城也阿羅毗傳曰曠澤城也拘摩羅波利傳曰即營城也蘇韓闍傳曰忍辱久城阿婁陀傳曰無哭城也瞿那竭傳曰常有城也婆陀漫傳曰豐益城也不那婆檀傳曰豐滿城也摩梨傳曰塗香城也耶快囊傳曰錢直城也阿波利傳曰營壁城也第四卷波頭摩傳曰蓮花城也婆留城傳曰重也比櫨羅傳曰析後城也槃耆城譯曰曲也俱羅波單傳曰𫈐城褒多梨傳曰無上城也摩訶都吒傳曰大海口城多摩那竭傳曰洋銅城也婆盧瑟城譯曰勝住歷國傳第一卷那竭呵城譯曰龍愛婆樓那城譯曰蛟也第三卷裴提舍城譯曰四惟摩訶舍城譯曰大樂五教反多留羅城譯曰樹名也煩耆城應云崩耆譯曰姓亦云曲拔吒那竭城應云拔吒那伽羅譯曰跋吒者長那伽羅城須曼鉢名城傳曰金斗城也摩頭羅城譯曰美也僧加沙城譯曰光明多摩致城應云多摩栗致譯曰樂著邑名第四十五邑蓮弗邑應云也咤利弗多羅譯曰也咤利者樹弗多羅者子華嚴經第二十四卷阿奴跋耆邑譯曰無多伴也中阿含第二十七卷跋陀羅婆提邑譯曰賢語十誦律第三誦第四卷迦耆利大邑譯曰迦屠廣耆者山僧祇律第三十卷迦蘭陀邑譯曰好聲彌沙塞律第一卷跋耆邑譯曰聚也阿荼脾邑譯曰林也第三卷婆鞞陀邑譯曰有智第五卷婆竭陀邑應云莎竭䲻陀譯曰善來優善那邑譯曰宜勝跋陀越邑應云跋陀羅婆那譯曰賢林第十二卷阿那頻邑譯曰無渧第二十六卷拘利邑譯曰織也雙卷涅槃第一卷跋陀羅婆提邑譯曰賢說優婆塞五戒相經聚落名第四十六那羅聚落譯曰那羅者荻大智論第一卷漚樓頻螺聚落譯曰木苽第三卷薩羅聚落譯者曰樹名也第二十七卷婆羅聚落譯曰婆羅者勝第八十四卷波陀聚落譯曰腳也雜阿含第二卷墮鳩羅聚落譯者曰樹名也亦云姓第十四卷跋蘭那聚落應云婆蘭那譯曰𠌵那第十四卷娑頭聚落譯曰好也第二十一卷那梨迦聚落譯曰偏刻第四十卷婆利那聚落應云波梨耶多譯曰遊戲時也第四十三卷鞞羅磨聚落譯曰種種施也第三十七卷鬱毗羅聚落譯曰過時第四十四卷那楞伽羅聚落應云那楞伽利譯者曰花名也第四十七卷摩尼周羅聚落譯曰寶𩬑亦如珠𩬑十誦律序第一卷頻頭沙羅婆羅聚落譯曰頻頭渧沙羅婆者實僧祇律第二十九卷弗迦羅聚落譯曰弗迦羅者蓮花第三十卷婆沙聚落譯曰天王四分律第三分第九卷鬱鞞羅聚落應云鬱毗羅譯曰大勇彌沙塞律第十九卷鬱鞞羅斯那聚落應云鬱毗羅斯那譯曰大勇羅也都夷婆羅門聚落應云都提譯曰判也阿羅迦聚落譯曰垂髮亦云勝也善見律毗婆沙第十二卷修舍慢伽譯曰平體普耀經第四卷毗蘭若聚落譯曰寂靜大乘方便經下卷崩伽闍譯者曰國名也戒相應經墮鳩羅聚落應云薄鳩羅譯者曰樹名也佛跡見二幡輪相經多羅聚落譯者曰樹名也文殊師利涅槃經遮羅周羅那羅聚落遮羅者動周羅者小那羅者人外道問佛歡喜大天因緣經波羅利應云波吒利譯者曰樹名也梵網經村名第四十七那羅村譯曰也增一阿含第十一卷毗提村應云毗提訶譯曰罹亦云種種身中阿含第十卷閻鬪譯曰紫色鞞婆陵耆應云鞞婆槾耆譯曰不好色也第十二卷娑羅樓羅應云娑羅魯羅譯曰娑羅者實魯羅者動第十七卷輸盧吒譯曰聞也第四十一卷阿闍羅和尼應云阿闍羅婆那譯曰不網林也舍彌譯曰寂靜第五十二卷斯那村譯曰軍亦云勇第五十六卷那陀譯曰聲也長阿含第二卷菴婆羅譯者曰果名也瞻婆譯者曰花名也第三卷楗荼譯曰香也負彌譯曰地也畢鉢村譯者曰樹名也郁伽羅村譯曰威德第十三卷佉婆提應云佉菟婆提舍譯者曰佉者偈婆提舍者說第十五卷婆羅村譯曰勝也第十七卷羅摩村譯曰戲亦云王雜阿含第二十三卷鬱毗羅大將村譯曰大穴亦云大勇四分律第二第九卷崩伽彌村中應云明伽彌中譯曰曲也第四分第八卷栴陀羅村譯曰月也善見律毗婆沙第一卷卑提寫村應云毗提寫譯曰四惟第二卷薄拘羅婆羅門村譯曰薄拘羅者樹名第三卷樓醯那村譯曰長張雨反迦蘭陀村律曰山鼠譯者曰鳥名第六卷憂加羅村譯曰無公調也第十六卷優樓頻螺村譯曰木苽阿毗曇毗婆沙第一卷波婆羅大村譯曰大力大方等大集經第十八卷拘季那羅村應云拘尸那伽羅譯曰茅城出曜經第十卷優羅提那譯曰優羅者胸提那者施雜阿含第二十一卷阿伽羅偷應云鴦伽羅偷波經曰炭塔第四十二卷毗波羅精舍譯曰勝護僧祇律第一卷俱利薗精舍譯曰織也僧祇律第一卷卑尸窟譯曰揣來摩頭羅聚林精舍譯曰蜜也第八卷招提僧堂譯曰招提者四方也彌沙塞律第十二卷遮鉢羅塔譯曰遮鉢羅者動也第二十四卷卑地寫寺應云毗地𭀄譯者曰四惟善見律毗婆沙第二卷摩醯首羅寺譯曰大自在也第三卷富婆僧伽藍應云富樓那譯曰富樓婆者東僧伽藍如上說第五卷富婆羅彌寺應云富樓婆羅彌譯曰東薗瞿曇廟譯曰薗姓第十四卷鍮波應云私鍮波譯曰塔也鞞婆沙第九卷閲叉寺譯曰能敢出曜經第五卷婆槃那寺譯曰種也第十卷僧迦摩寺譯曰橋波須蜜經第五卷遮婆羅寺應云庶歌羅經曰轉譯曰轉婆須蜜菩薩所集楗度第四阿荼毗寺譯曰林也摩得勒伽經第六卷尼持樹陀精舍應云尼拘樓陀譯曰縱廣觀佛三昧經第一卷迦羅洹寺應云迦羅婆那譯曰里林那先經上卷他毗羅鳩塔羅精舍譯曰他毗羅者長宿鳩塔羅者鳥呪毒經繁耆迦精舍譯者曰國名也雜經那摩毗訶傳曰雜寺外國傳第一卷那羅陀村譯曰荻與僧伽羅剎所集經第三卷他那摩帝村譯曰陀那者施摩帝者意佛所行讚第四卷毗細瑟吒村應云毗細聚瑟吒譯者曰毗細耶者國名瑟吒者取勝跋提村譯曰長張雨反鞞蘭若村譯曰不著迦梨摩沙村譯曰惡亦云黑毗細村應云毗師經譯曰一切入也第五卷婆跋利村譯曰班也過去現在因果經第三卷大波利村譯曰護也法鼓經下卷阿匝闍應云阿牟闍譯曰不動水沫所飄經羅摩村譯曰戲也佛神力救長者子經婆陀漫傳曰增益村也外國傳第二卷陀毗陀傳曰無通林也訶梨伽藍傳曰聖林毗醯伽覽傳曰穀種村也羅闍毗訶傳曰寺村寺舍名第四十八祇洹精舍應云氏多槃那譯曰氏多者勝槃那者林大智論第三卷梨師槃陀那精舍譯曰梨師者仙婆陀那者面伽耶祀舍譯者曰國名也金燈僧伽藍譯曰僧伽藍者衆園華嚴經第二十四卷遮和羅應云遮婆羅譯曰動也中阿含第三十五卷迦羅摩譯曰迦羅者時差摩者第四十九卷楗若譯曰衆聚第五十卷羅闍毗訶傳曰王寺提波毗訶傳曰天子寺也摩那摩傳曰𠌵凡寺也干匿伽王傳曰王小第寺那婆毗訶羅傳曰雜寺第四卷鞞梨傳曰神穀寺也提婆不多傳曰天子精舍沙毗呵等寺譯曰棄毒歷國傳第一卷波羅寺譯曰護也離越寺應云離婆多譯曰星名陀林寺應云陀林摩傳曰石留一迦延寺譯曰一道阿婆耆梨寺傳曰無畏寺也第四卷摩呵比呵寺應云摩訶毗訶羅譯曰大寺祇那比呵羅應云是名婆那毗呵羅譯曰勝林寺也堂舍名第四十九毗舍佉堂譯者曰星名生大智論第四十三卷毗摩那房譯曰殿也四分律第四分第一卷菴羅絺屋應云菴婆羅絺譯曰樹心善見律毗婆沙第一卷迦那迦庭譯曰金也第三卷健陀俱知譯曰香室香臺香殿肩伽羅母殿譯曰庶也第五卷迦梨譯曰作亦云黑善耀經第一卷遮迦越羅譯曰輪圓阿闍貰經下卷迦羅越家應云迦羅婆譯曰有時遺教三昧經上卷迦梨羅講堂譯曰濁也文殊現寶藏經上卷須梨講堂譯曰日也義足經下卷迦梨講堂譯曰時亦云作難提釋經阿陸舍羅傳曰無病舍也處所名第五十阿蘭若亦云阿練若譯曰寂靜大智論第三卷梯羅浮呵處應云施羅求呵譯曰施羅者名求呵者室華嚴經第二十四卷治耶曲處譯曰治耶者迅行那提楗椎譯曰那提者聲楗推者磬也長阿含第十卷劫摩沙應云釰摩沙譯曰除葉因陀波羅譯曰主力鬱鞞羅譯曰過時阿遊婆陀尼應云阿細波陀尼譯曰無求阿夷譯曰隨行第十卷伊車能伽羅譯曰樂耕第十二卷俱利譯曰織也第十八卷耆婆拘摩羅譯曰耆婆者命亦云壽也拘摩羅者童雜阿含第卷迦陵伽譯曰好聲亦云國名第九卷崩伽闍譯曰回也亦云國名陀毗陀譯曰不智第十卷輸盧那譯曰聞也第十二卷波羅利弗姤路應云波羅利弗多羅譯者曰波利者樹名弗多羅子第二十一卷那吒跋置迦譯曰那吒者舞跋置迦者軍第二十四卷毗蘭若譯曰不靜四分律第一卷曇摩阿蘭若處譯曰法寂靜也阿毗曇毗婆沙第二十七卷跋闍復彌應云跋闍復彌譯曰金剛地也婆須蜜經第五卷婆羅那處譯曰國名佛所行讚經第四卷涅摩羅處所譯曰無垢興起行經上卷婆羅尼蜜譯曰勝相那吒跋置迦阿蘭處譯曰那吒者舞跋置迦者軍主阿蘭若寂靜商人子經拘迦羅譯曰云阿時也摩訶術精進度中羅報經仁治二年三月五日書寫了寬保初元辛酉年八月二十六日以深賢師之本遂挍合了僧正賢賀五十八
